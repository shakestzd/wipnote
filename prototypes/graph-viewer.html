<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wipnote — Graph Viewer</title>
  <style>
    :root {
      --bg-primary:    #151518;
      --bg-secondary:  #1C1C20;
      --bg-tertiary:   #252528;
      --text-primary:  #E0DED8;
      --text-secondary:#A0A0A0;
      --text-muted:    #707070;
      --border:        #333338;
      --border-strong: #606068;
      --accent:        #CDFF00;
      --accent-text:   #0A0A0A;
      --c-feature:     #22c55e;
      --c-bug:         #ef4444;
      --c-spike:       #3b82f6;
      --c-track:       #f59e0b;
      --s-done:        #22c55e;
      --s-in-progress: #CDFF00;
      --s-todo:        #707070;
      --s-blocked:     #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      background: var(--bg-secondary);
      border-bottom: 2px solid var(--border-strong);
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    #stats {
      margin-left: auto;
      font-size: 0.65rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    #loading {
      font-size: 0.7rem;
      color: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    nav#filters {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .filter-group {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-strong);
    }
    .filter-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--border-strong);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.6rem;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { color: var(--text-primary); background: var(--bg-secondary); }
    .filter-btn.active { color: var(--accent-text); background: var(--accent); font-weight: 700; }
    #search {
      background: var(--bg-primary);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      width: 200px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }
    main#graph {
      padding: 1rem;
    }
    .type-section {
      margin-bottom: 1.5rem;
    }
    .type-section h2 {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
    }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 3px solid var(--type-color, var(--border));
      padding: 0.75rem;
      cursor: default;
      transition: border-color 0.1s;
    }
    .card:hover { border-color: var(--type-color, var(--border-strong)); }
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .card-id {
      font-size: 0.6rem;
      color: var(--text-muted);
      white-space: nowrap;
      padding-top: 2px;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      word-break: break-word;
    }
    .badge {
      display: inline-block;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .badge-status-done        { background: var(--s-done);        color: #0a0a0a; }
    .badge-status-in-progress { background: var(--s-in-progress); color: #0a0a0a; }
    .badge-status-todo        { background: var(--bg-tertiary);   color: var(--text-muted); border: 1px solid var(--border); }
    .badge-status-blocked     { background: var(--s-blocked);     color: #fff; }
    .card-meta {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-top: 0.4rem;
      flex-wrap: wrap;
    }
    .badge-priority-high   { background: #7f1d1d; color: #fca5a5; }
    .badge-priority-medium { background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-priority-low    { background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }
    .track-badge {
      font-size: 0.55rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    #empty-msg {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>wipnote Graph Viewer</h1>
    <span id="loading">Loading…</span>
    <div id="stats"></div>
  </header>
  <nav id="filters">
    <span class="filter-label">Type:</span>
    <div class="filter-group" id="type-filters">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="feature">Features</button>
      <button class="filter-btn" data-type="bug">Bugs</button>
      <button class="filter-btn" data-type="spike">Spikes</button>
      <button class="filter-btn" data-type="track">Tracks</button>
    </div>
    <span class="filter-label">Status:</span>
    <div class="filter-group" id="status-filters">
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="in-progress">Active</button>
      <button class="filter-btn" data-status="todo">Planned</button>
      <button class="filter-btn" data-status="done">Done</button>
      <button class="filter-btn" data-status="blocked">Blocked</button>
    </div>
    <input id="search" type="text" placeholder="Search titles…" autocomplete="off">
  </nav>
  <main id="graph"></main>

  <script>
    // ── Colour helpers ──────────────────────────────────────────────────────
    const TYPE_COLOR = { feature: '#22c55e', bug: '#ef4444', spike: '#3b82f6', track: '#f59e0b' };

    // ── Fetch-based graph crawler ───────────────────────────────────────────
    async function loadGraph() {
      const types = ['features', 'bugs', 'spikes', 'tracks'];
      const nodes = [];
      const parser = new DOMParser();

      for (const type of types) {
        try {
          const resp = await fetch(`.wipnote/${type}/`);
          if (!resp.ok) continue;
          const html = await resp.text();
          const doc = parser.parseFromString(html, 'text/html');
          const links = [...doc.querySelectorAll('a[href$=".html"]')];

          for (const link of links) {
            const href = link.getAttribute('href');
            if (!href || href.startsWith('?') || href.startsWith('/') || href.includes('..')) continue;
            const itemUrl = `.wipnote/${type}/${href}`;
            try {
              const itemResp = await fetch(itemUrl);
              if (!itemResp.ok) continue;
              const itemHtml = await itemResp.text();
              const itemDoc = parser.parseFromString(itemHtml, 'text/html');
              const article = itemDoc.querySelector('article[id]');
              if (!article) continue;

              nodes.push({
                id: article.id,
                type: article.dataset.type || type.slice(0, -1),
                status: article.dataset.status || 'todo',
                priority: article.dataset.priority || 'medium',
                title: (itemDoc.querySelector('h1') || {}).textContent?.trim() || article.id,
                trackId: article.dataset.trackId || '',
              });
            } catch (e) { console.warn(`Failed to load item ${href}:`, e); }
          }
        } catch (e) { console.warn(`Failed to load ${type}:`, e); }
      }
      return nodes;
    }

    // ── Kahn's topological sort ─────────────────────────────────────────────
    function topoSort(nodes, edges) {
      const inDegree = {};
      const adj = {};
      nodes.forEach(n => { inDegree[n.id] = 0; adj[n.id] = []; });
      edges.forEach(e => {
        if (adj[e.source]) adj[e.source].push(e.target);
        if (inDegree[e.target] !== undefined) inDegree[e.target]++;
      });

      const queue = Object.keys(inDegree).filter(k => inDegree[k] === 0);
      const result = [];
      while (queue.length) {
        const node = queue.shift();
        result.push(node);
        (adj[node] || []).forEach(neighbor => {
          inDegree[neighbor]--;
          if (inDegree[neighbor] === 0) queue.push(neighbor);
        });
      }
      // append any remaining nodes (cycles)
      nodes.forEach(n => { if (!result.includes(n.id)) result.push(n.id); });
      return result;
    }

    // ── State ───────────────────────────────────────────────────────────────
    let allNodes = [];
    let activeType   = 'all';
    let activeStatus = 'all';
    let searchText   = '';

    // ── Render ──────────────────────────────────────────────────────────────
    function render() {
      const q = searchText.toLowerCase();
      const visible = allNodes.filter(n => {
        if (activeType   !== 'all' && n.type   !== activeType)   return false;
        if (activeStatus !== 'all' && n.status !== activeStatus) return false;
        if (q && !n.title.toLowerCase().includes(q) && !n.id.includes(q)) return false;
        return true;
      });

      // stats bar
      const counts = {};
      allNodes.forEach(n => { counts[n.type] = (counts[n.type] || 0) + 1; });
      const statusCounts = {};
      visible.forEach(n => { statusCounts[n.status] = (statusCounts[n.status] || 0) + 1; });
      document.getElementById('stats').textContent =
        `${visible.length} / ${allNodes.length} nodes  |  ` +
        Object.entries(counts).map(([t, c]) => `${c} ${t}s`).join('  ');

      const graph = document.getElementById('graph');

      if (!visible.length) {
        graph.innerHTML = '<div id="empty-msg">No items match the current filters.</div>';
        return;
      }

      // group by type for sectioned layout
      const ORDER = ['track', 'feature', 'bug', 'spike'];
      const byType = {};
      visible.forEach(n => { (byType[n.type] = byType[n.type] || []).push(n); });

      // use topo order within each group (no cross-type edges modelled here)
      const sections = ORDER
        .filter(t => byType[t] && byType[t].length)
        .map(t => ({ type: t, nodes: topoSort(byType[t], []).map(id => byType[t].find(n => n.id === id)).filter(Boolean) }));

      graph.innerHTML = sections.map(sec => `
        <div class="type-section">
          <h2 style="color:${TYPE_COLOR[sec.type] || '#888'}">${sec.type}s (${sec.nodes.length})</h2>
          <div class="card-grid">
            ${sec.nodes.map(n => cardHTML(n)).join('')}
          </div>
        </div>
      `).join('');
    }

    function cardHTML(n) {
      const color = TYPE_COLOR[n.type] || '#888';
      const statusBadge = `<span class="badge badge-status-${n.status}">${n.status.replace('-', ' ')}</span>`;
      const priorityBadge = n.priority !== 'medium'
        ? `<span class="badge badge-priority-${n.priority}">${n.priority}</span>` : '';
      const trackBadge = n.trackId ? `<span class="track-badge">trk: ${n.trackId.slice(0, 10)}</span>` : '';
      return `
        <div class="card" style="--type-color:${color}">
          <div class="card-header">
            <span class="card-id">${n.id.slice(0, 12)}</span>
            <span class="card-title">${escapeHtml(n.title)}</span>
          </div>
          <div class="card-meta">
            ${statusBadge}
            ${priorityBadge}
            ${trackBadge}
          </div>
        </div>`;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Filter wire-up ──────────────────────────────────────────────────────
    document.getElementById('type-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      [...document.querySelectorAll('#type-filters .filter-btn')].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      render();
    });

    document.getElementById('status-filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      [...document.querySelectorAll('#status-filters .filter-btn')].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      render();
    });

    document.getElementById('search').addEventListener('input', e => {
      searchText = e.target.value;
      render();
    });

    // ── Bootstrap ───────────────────────────────────────────────────────────
    (async () => {
      try {
        allNodes = await loadGraph();
        document.getElementById('loading').remove();
        render();
      } catch (e) {
        document.getElementById('loading').textContent = `Error: ${e.message}`;
        console.error(e);
      }
    })();
  </script>
</body>
</html>
