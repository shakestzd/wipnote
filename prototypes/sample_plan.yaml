meta:
  id: plan-bc1e8c2c
  track_id: trk-9ae9e043
  title: Hooks System Optimization
  description: 'Reduce hook latency from 2-7s to <1s, eliminate duplicate code, batch
    DB queries, and close test gaps across the hook system.

    '
  created_at: '2026-04-05'
  status: draft
  created_by: claude-opus
design:
  problem: 'The hook system processes ~50 events per Claude Code session. Each invocation
    spawns a new process, opens SQLite with 9 migrations, and runs 4-7 queries. SessionStart
    alone takes 2-7s due to synchronous git subprocess calls. Total overhead: 5-15s
    per session attributable to hook latency.

    '
  goals:
  - '**SessionStart <1s** — parallelize git operations, currently sequential'
  - '**PreToolUse <100ms** — batch queries from 4-7 down to 1-2'
  - '**Zero silent failures** — 19 swallowed insert errors become auditable'
  - '**Eliminate duplication** — 3 duplicate function pairs identified'
  - '**Close test gaps** — 14 handlers with zero dedicated test coverage'
  constraints:
  - Hooks must **never block Claude** — errors always fall through to Allow
  - No external dependencies — SQLite only, no Redis/Postgres
  - Backward compatible — existing .wipnote/ databases must work without migration
  approved: false
  comment: ''
slices:
- id: feat-058c4074
  num: 1
  title: Deduplicate helper functions
  what: 'Merge resolveAgentID and resolveEventAgentID (identical bodies at tooluse_shared.go:105-120).
    Consolidate minLen/minSessionLen into one function in log.go.

    '
  why: '3 duplicate function pairs identified. Changes diverge silently over time,
    each refactor requires updating multiple copies.

    '
  files:
  - internal/hooks/tooluse_shared.go
  - internal/hooks/log.go
  - internal/hooks/session_end.go
  deps: []
  done_when:
  - resolveEventAgentID removed (compile check)
  - minLen replaces minSessionLen with same behavior
  - Zero duplication across hook files
  effort: S
  risk: Low
  tests: 'Unit: resolveAgentID returns event.AgentID when set

    Unit: resolveAgentID falls back to env

    Unit: minLen same behavior for s='''' and s=''abc''

    '
  approved: false
  comment: ''
- id: bug-9778dff9
  num: 2
  title: Fix PreToolUse subagent blocking
  what: 'PreToolUse hook blocks subagents that haven''t claimed a work item. The guard
    checks HasActiveClaimByAgent with the subagent''s UUID, but feature start sets
    ClaimedByAgentID to empty string.

    '
  why: 'Subagents spawned by the orchestrator get blocked on their first Write/Edit
    operation, breaking parallel agent workflows.

    '
  files:
  - internal/hooks/pretooluse.go
  - internal/hooks/pretooluse_test.go
  deps:
  - 1
  done_when:
  - Subagent with no claim but session feature can write
  - Subagent with no claim and no session feature is blocked
  - Existing lifecycle_test still passes
  effort: S
  risk: Med
  tests: 'Unit: PreToolUse allows subagent with session-scoped feature

    Unit: PreToolUse blocks subagent with no claim and no session feature

    Regression: lifecycle_test passes unchanged

    '
  approved: false
  comment: ''
- id: feat-fa24f938
  num: 3
  title: Parallelize SessionStart git operations
  what: 'GetGitRemoteURL blocks on critical path in writeActiveSession (session_start.go:37-51).
    Goroutine it alongside existing headCommit goroutine.

    '
  why: Cut SessionStart from 2-7s to 1-2s.
  files:
  - internal/hooks/session_start.go
  - internal/hooks/session_start_test.go
  deps: []
  done_when:
  - SessionStart completes in <1s
  - headCommit and GetGitRemoteURL run concurrently
  - GetGitRemoteURL has 500ms timeout
  effort: M
  risk: Med
  tests: 'Unit: writeActiveSession completes in <500ms with slow git remote

    Integration: SessionStart handler completes in <1s

    Unit: GetGitRemoteURL timeout of 500ms is enforced

    '
  approved: false
  comment: ''
- id: feat-8b6fdf86
  num: 4
  title: Cache DB schema migrations
  what: 'db.Open() runs 9 ALTER TABLE migrations on every hook call (schema.go:41-52).
    Add a schema_version meta table. On Open, check version — skip migrations if current.

    '
  why: Save 10-15ms per hook invocation across ~50 events per session.
  files:
  - internal/db/schema.go
  - internal/db/schema_test.go
  deps: []
  done_when:
  - Open with current schema version skips ALTER TABLE
  - First-ever Open bootstraps correctly
  - Open with cached version <5ms
  effort: M
  risk: Low
  tests: 'Unit: Open with current version skips ALTER TABLE

    Unit: Open with stale version runs migrations and updates

    Benchmark: Open with cached version <5ms

    '
  approved: false
  comment: ''
- id: feat-cfeb9377
  num: 5
  title: Batch PreToolUse database queries
  what: 'resolveToolUseContext runs 4-7 separate queries. Wrap in single read transaction.
    YOLO guards: batch hasRecentResearch + hasRecentTestRun + hasRecentDiffReview
    into one UNION query.

    '
  why: Reduce per-hook DB round-trips from 7 to 2.
  files:
  - internal/hooks/tooluse_shared.go
  - internal/hooks/yolo_guard.go
  - internal/db/queries.go
  deps:
  - 4
  done_when:
  - resolveToolUseContext uses single read transaction
  - YOLO recent-check queries batched into UNION
  - PreToolUse completes in <100ms
  effort: L
  risk: High
  tests: 'Unit: resolveToolUseContext same result with 1 query vs 4

    Benchmark: PreToolUse completes in <100ms

    Regression: all pretooluse_test and yolo_guard_test pass

    '
  approved: false
  comment: ''
questions:
- id: q-migration
  text: Migration caching strategy?
  description: db.Open() runs 9 ALTER TABLE migrations per hook invocation. Caching
    could cut 10-15ms per call across ~50 events per session. The metadata table already
    exists (schema.go:330) and could serve as the version store.
  recommended: schema-version
  options:
  - key: schema-version
    label: 'A: Schema version — Track version in meta table, skip ALTER TABLE when
      current'
  - key: pragma-only
    label: 'B: Pragma only — Only cache PRAGMA settings, always run migrations'
  - key: none
    label: 'C: No change — Keep current behavior, run all migrations every call'
  answer: null
- id: q-errors
  text: Error handling for swallowed DB inserts?
  description: 4-6 call sites use '_ = db.InsertEvent(...)'. Failures are invisible
    — no logging, no metrics, no alerting. Need to balance observability with the
    never-block-Claude guarantee.
  recommended: structured-log
  options:
  - key: structured-log
    label: 'A: Structured log — Replace _ = db.Insert with debugLog on error, silent
      to Claude but auditable in debug.log'
  - key: metric-counter
    label: 'B: Metric counter — Add an error counter metric that alerts when insert
      failures spike above threshold'
  - key: return-error
    label: 'C: Return error — Propagate insert errors to hook result. May block Claude
      on transient DB issues'
  answer: null
- id: q-sessionstart
  text: SessionStart parallelization scope?
  description: SessionStart runs GetGitRemoteURL synchronously on the critical path
    (2-7s). headCommit is already goroutined. The question is how much to parallelize
    — minimal change vs maximum restructuring.
  recommended: git-only
  options:
  - key: git-only
    label: 'A: Git only — Goroutine both git calls (rev-parse + remote get-url). Minimal
      change, proven pattern from headCommit'
  - key: full-parallel
    label: 'B: Full parallel — Parallelize git + DB open + traceparent scan. Maximum
      speedup but requires restructuring the handler'
  - key: timeout-guard
    label: 'C: Timeout guard — Add 500ms timeout to GetGitRemoteURL. Bounded latency
      without restructuring'
  answer: null
