    mitigation: Rescope to YOLO UNION batching only
  - risk: S1 merges ensureSession incorrectly
    severity: Medium
    mitigation: Keep separate, only merge resolveAgentID
  - risk: S6 error count wrong (4-6, not 19)
    severity: Low
    mitigation: Rescope to 4 high-value sites
  synthesis: 'The plan''s structure is sound: dedup first, then performance, then
    tests. Both critics found 3 factual inaccuracies and 2 scope gaps. Recommended:
    fix S1 scope, add second GetGitRemoteURL to S3, rescope S5 to UNION only.

    '
