meta:
    id: plan-2c7f1b7d
    track_id: trk-8f9bc323
    title: Native agent-teams enablement + hook payload completeness + docs update
    description: |
        Three-slice plan to (a) auto-inject `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` in HtmlGraph launchers respecting user env, (b) close the persistence gap where `teammate_name` and `team_name` DB columns exist but are never written by `InsertEvent` (CLAUDE.md's claim of "automatic teammate identity capture" is currently partially aspirational), and (c) update CLAUDE.md + orchestrator-directives-skill to reflect auto-injection and document v2.1.64+ JSON hook control payload availability. Doc-grounded — research completed via the claude-code-guide agent reviewing canonical Claude Code docs. Built on the existing `addIfUnset` env-var pattern in `cmd/htmlgraph/claude_env.go` and the existing `taskCompletionConfig` config-read pattern.
    created_at: "2026-05-04"
    status: active
    created_by: claude-opus
    version: 3
design:
    problem: |
        CLAUDE.md claims that when `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` is enabled, "HtmlGraph automatically captures teammate identity on every TeammateIdle, TaskCreated, and TaskCompleted hook." Two gaps undermine this: (1) the env var must be set manually by the user — there's no auto-enablement in the htmlgraph launchers, so users have to remember it; (2) the DB schema added `teammate_name` and `team_name` columns to `agent_events` via migrations, but `InsertEvent` in `internal/db/event_repo.go` never writes them and the `AgentEvent` model has no corresponding fields. Result: even when teams ARE enabled, the SQLite index has NULL for these columns on every row. Step-prefix attribution in HTML works (via `addTaskStep`), but DB-side queries can't filter or aggregate by teammate. Plus the documentation is missing the v2.1.64+ JSON hook control payload feature (`{"continue": false, "stopReason": "..."}`).
    goals:
        - '**Zero-friction enablement** — `htmlgraph claude` / `htmlgraph yolo` / `htmlgraph dev` automatically inject `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` so users never have to set it manually; user-set env var (any value) takes precedence so the user can opt out via `=0` or override'
        - '**Complete teammate identity persistence** — `agent_events.teammate_name` and `team_name` columns are populated on every team-hook write, completing the schema''s intent and enabling SQL queries that filter or aggregate by teammate'
        - '**Accurate documentation** — CLAUDE.md and the orchestrator skill reflect auto-injection and document the v2.1.64+ JSON control payload feature so readers know about both signaling paths'
        - '**Opt-out path** — `.htmlgraph/config.json` `agent_teams.enabled: false` disables the auto-injection for users who want hermetic isolation or are debugging team behavior'
    constraints:
        - 'Cross-harness scope: `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` is a Claude-only env var. The Codex CLI and Gemini CLI launchers do NOT need the change — agent teams are a Claude Code feature only. Confirmed by research: codex.go and gemini.go don''t share `buildClaudeLaunchEnv`.'
        - 'Backward compat: existing slice/feature step prefix attribution via `addTaskStep` continues to work; this plan adds DB-side persistence without changing the HTML write path.'
        - 'User-set env var precedence: `addIfUnset` already handles this correctly — only sets the env var if the user hasn''t. No special logic needed.'
        - 'Default-on opt-in: `agent_teams.enabled` defaults to true (auto-injection on). Opt-out is explicit `false` in config. Matches the user''s stated intent (''we should natively set it because that improves orchestration'').'
        - '**Non-goal: JSON control payload IMPLEMENTATION** — current `BlockExit2Error` + `os.Exit(2)` mechanism is correct on all Claude Code versions and works for the existing `block_task_completion_on_quality_failure` gate. Adding `{"continue": false, "stopReason": "..."}` JSON support requires refactoring `runHookNamed`''s blocking dispatch. Out of scope; only documented in CLAUDE.md as a v2.1.64+ feature available for future use.'
        - '**Non-goal: programmatic team creation** — Claude Code docs confirm teams are spawned via natural language only; no API exists. HtmlGraph''s role is observation (hooks) and coordination (gates), not dispatch.'
        - '**Non-goal: backfill of historical agent_events rows** — pre-existing rows with NULL teammate_name/team_name remain NULL. New rows after this plan ships have the values populated. A separate plan can address backfill if needed.'
        - '**Non-goal: cross-harness teammate equivalents** — agent teams is Claude-only; no story for Codex/Gemini ''team'' equivalents. Filed separately if those harnesses gain similar features.'
    approved: false
    comment: ""
slices:
    - id: slice-1
      num: 1
      title: Auto-inject `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` with opt-out via config
      what: |
        Auto-inject `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` into the env of the spawned `claude` subprocess in `htmlgraph claude`, `htmlgraph yolo`, `htmlgraph dev`. Honor user-set env var (any value, including `0`) as override. Add `.htmlgraph/config.json` opt-out toggle.

        **Implementation:**
        1. In `cmd/htmlgraph/claude_env.go` `buildClaudeLaunchEnv`, after the existing `HTMLGRAPH_PROJECT_DIR` block (~line 53), call: `env = addIfUnset(env, "CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS", "1")`. The `addIfUnset` helper already exists and only sets the var if absent or empty in the parent env.
        2. Gate the injection on the new opt-out config: read `.htmlgraph/config.json` `agent_teams.enabled` field. If explicitly `false`, skip injection. If absent or `true` (or `null`), inject (default-on).
        3. Extend the existing `taskCompletionConfig` struct in `internal/hooks/task_completion_gate.go` (or add a sibling struct in the same file) with:
           ```go
           type htmlgraphConfig struct {
               BlockOnQualityFailure bool `json:"block_task_completion_on_quality_failure"`
               AgentTeams agentTeamsConfig `json:"agent_teams"`
           }
           type agentTeamsConfig struct {
               Enabled *bool `json:"enabled"` // nil = default true; explicit false = opt out
           }
           ```
           The `*bool` pointer is the established Go idiom for "absent means default". Add a helper `isAgentTeamsEnabled(projectDir string) bool` that returns true unless explicit false.
        4. In `buildClaudeLaunchEnv`, call `isAgentTeamsEnabled(projectDir)` before the `addIfUnset` call. Branch accordingly.
      why: |
        The user's proposal: "we should natively set CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 because that improves the way htmlgraph orchestrates and manages the agents." Auto-injection eliminates the manual env-var setup step that today users have to remember per-shell or add to `.claude/settings.json`. The opt-out toggle provides a clean disable path for users who want hermetic isolation or are debugging team behavior. User-set env var precedence (already handled by `addIfUnset`) honors explicit user choice — including the value `0` to disable teams without touching config.
      files:
        - cmd/htmlgraph/claude_env.go
        - cmd/htmlgraph/claude_env_test.go
        - internal/hooks/task_completion_gate.go
      deps: []
      done_when:
        - Running `htmlgraph claude` (or `yolo` or `dev`) without `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS` set in the parent env results in `claude` running with `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` in its env
        - Running with `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=0` in the parent env results in `claude` running with `=0` (user override respected)
        - 'Running with `agent_teams.enabled: false` in `.htmlgraph/config.json` results in `claude` running WITHOUT the env var (no injection)'
        - 'Running with `agent_teams.enabled: true` (explicit) in config — same as default — env var injected'
        - 'Running with `agent_teams: {}` (object present but enabled key absent) in config — same as default — env var injected (`*bool` nil pointer treated as default-true)'
        - '`buildCodexLaunchEnv` and Gemini equivalents are NOT modified (cross-harness scope per design.constraints)'
        - Existing `claude_env_test.go` tests continue to pass
      effort: S
      risk: Low
      tests: |
        Unit:
        - TestBuildClaudeLaunchEnv_AgentTeamsAutoInjected — no parent env set, no config; assert `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` in result
        - TestBuildClaudeLaunchEnv_AgentTeamsUserOverride — parent env set to `0`; assert `=0` preserved
        - TestBuildClaudeLaunchEnv_AgentTeamsUserOverrideOne — parent env set to `1`; assert `=1` preserved (not overwritten)
        - TestBuildClaudeLaunchEnv_AgentTeamsConfigDisabled — config has `agent_teams.enabled: false`; assert env var NOT in result
        - TestBuildClaudeLaunchEnv_AgentTeamsConfigEnabled — config has `agent_teams.enabled: true`; assert env var present
        - TestBuildClaudeLaunchEnv_AgentTeamsConfigAbsentEnabled — config has `agent_teams: {}`; assert env var present (default-on)
        - TestBuildClaudeLaunchEnv_AgentTeamsNoConfigFile — no config.json at all; assert env var present
        - TestIsAgentTeamsEnabled_DefaultTrue — empty config returns true
        - TestIsAgentTeamsEnabled_ExplicitFalse — explicit false returns false

        Integration: TestLauncher_PassesAgentTeamsEnv — spawn a stub claude binary that prints its env; assert variable present in spawned env

        Regression: existing `claude_env_test.go` (`TestBuildClaudeLaunchEnv_ExplicitOptOut`, `TestBuildClaudeLaunchEnv_WithCollector`) pass unchanged
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      questions:
        - id: q-config-default-policy
          text: What's the default behavior when `.htmlgraph/config.json` lacks an `agent_teams` field entirely?
          description: |
            Three options. The user's stated intent ("native enablement improves orchestration") favors default-on. But default-on requires every existing project to opt out if they don't want teams.
          recommended: default-on
          options:
            - key: default-on
              label: default-on — absent config or absent `agent_teams` field defaults to enabled. Matches user intent. Existing projects automatically benefit.
            - key: default-off-explicit-opt-in
              label: 'default-off-explicit-opt-in — require `agent_teams.enabled: true` to enable. Conservative; does not change behavior for users who don''t update config.'
            - key: default-on-with-version-stamp
              label: default-on-with-version-stamp — default-on, but write a `.htmlgraph/AGENT_TEAMS_DEFAULT_v1` stamp the first time the launcher runs; later versions can flip default-off if needed without breaking existing users. Most defensible across version changes.
        - id: q-config-struct-location
          text: Where does the new `agentTeamsConfig` struct live?
          description: |
            Three reasonable locations. The existing pattern keeps each config reader self-contained.
          recommended: extend-existing-task-completion-gate
          options:
            - key: extend-existing-task-completion-gate
              label: extend-existing-task-completion-gate — extend `taskCompletionConfig` in `internal/hooks/task_completion_gate.go` to a top-level `htmlgraphConfig` with both fields. Single config file, single read. Minimal diff.
            - key: new-config-package
              label: new-config-package — new `internal/config/agent_teams.go` with its own struct + reader. Cleaner separation but introduces a new package for a small concern.
            - key: launcher-local
              label: launcher-local — define the struct inside `cmd/htmlgraph/claude_env.go` since the launcher is the only consumer. Pragmatic; couples config to the launcher.
    - id: slice-2
      num: 2
      title: Close the teammate-identity persistence gap in `agent_events`
      what: |
        Fix the persistence gap: `agent_events.teammate_name` and `team_name` columns exist (added by migrations in `internal/db/schema.go:123,128`) but `InsertEvent` never writes them. Result: SQL queries against these columns return NULL for every row. Add the corresponding fields to `AgentEvent` model, extend the INSERT statement, and verify hook handlers populate them on construction.

        **Implementation:**
        1. Add fields to `AgentEvent` struct in `internal/models/event.go`:
           ```go
           TeammateName string `json:"teammate_name,omitempty"`
           TeamName     string `json:"team_name,omitempty"`
           IdleReason   string `json:"idle_reason,omitempty"`
           ```
        2. Extend `InsertEvent` in `internal/db/event_repo.go`: add the three columns to the column list and parameter list. Use `sql.NullString`-style empty handling (omit-if-empty is fine since columns are nullable per schema).
        3. Extend any `SELECT *` paths or column-list reads of `agent_events` (find via grep — likely `event_repo.go` query functions) to scan the new columns.
        4. Verify hook handlers in `internal/hooks/missing_events.go` (`handleTeammateIdle`, `handleTaskCreated`, `handleTaskCompleted`) construct the `AgentEvent` with the new fields populated. The research found these hooks already extract `event.TeammateName`, `event.TeamName`, `event.IdleReason` — they just don't propagate to the DB. Wire them through.
      why: |
        CLAUDE.md claims teammate identity is captured automatically. The research confirmed that step-prefix attribution in HTML works (via `addTaskStep`), but the DB-side claim is partially false — `agent_events.teammate_name` and `team_name` are NULL on every row because `InsertEvent` doesn't include them. Closing this gap turns the dashboard's per-teammate views (and any future analytics-by-teammate queries) from impossible-by-design to working. Without this fix, slice 1's auto-enablement would expand the surface of broken-by-omission behavior. Bundling the bug fix with the enablement plan ensures a coherent shipped behavior: when teams are auto-enabled, identity is also auto-persisted.
      files:
        - internal/models/event.go
        - internal/db/event_repo.go
        - internal/db/event_repo_test.go
        - internal/hooks/missing_events.go
      deps: []
      done_when:
        - '`AgentEvent` struct has `TeammateName`, `TeamName`, `IdleReason` fields with `json:"...,omitempty"` tags'
        - '`InsertEvent` writes all three columns (empty string → NULL or empty string in DB; both acceptable since columns are nullable)'
        - '`agent_events` row inserted by a TaskCreated hook with `teammate_name=alice` returns `alice` on `SELECT teammate_name`'
        - Same for `team_name` (TaskCreated, TaskCompleted) and `idle_reason` (TeammateIdle)
        - Existing `agent_events` rows with NULL `teammate_name`/`team_name` continue to round-trip correctly (no migration of historical data per design.constraints non-goal)
        - All existing `event_repo.go` consumers (any `SELECT *` or column-list reads) updated to scan the new columns
      effort: M
      risk: Med
      tests: |
        Unit:
        - TestInsertEvent_TeammateName — insert event with TeammateName=foo; SELECT round-trip returns foo
        - TestInsertEvent_TeamName — same for TeamName
        - TestInsertEvent_IdleReason — same for IdleReason
        - TestInsertEvent_AllEmptyOmitOK — insert event with all three fields empty; SELECT returns empty strings (no NULL/empty discrepancy)
        - TestInsertEvent_LegacyNullRowsRoundTrip — row inserted by pre-fix INSERT (with NULL columns) is read correctly by new SELECT path

        Integration: TestTaskCreatedHook_PersistsTeammateName — fire TaskCreated hook with payload containing teammate_name=alice; assert agent_events row has teammate_name=alice via DB query

        Regression: existing `event_repo_test.go` tests pass unchanged; `missing_events_test.go` pass unchanged
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      questions:
        - id: q-empty-vs-null
          text: How should empty strings be persisted in the DB?
          description: |
            The new fields are optional. Some events (e.g., a regular non-team PostToolUse) won't have teammate_name. Two choices for how to write this.
          recommended: empty-string-as-empty
          options:
            - key: empty-string-as-empty
              label: empty-string-as-empty — write empty string (`''`); SELECT returns `''`. Simple Go-idiomatic round-trip. Schema columns are nullable so this also works.
            - key: empty-string-as-null
              label: empty-string-as-null — convert empty string to SQL NULL on write. More truly absent. Requires `sql.NullString` plumbing.
            - key: skip-row-if-empty
              label: skip-row-if-empty — only INSERT rows where at least one of the three fields is non-empty. Reduces noise but breaks the existing schema invariant that every event gets one row.
    - id: slice-3
      num: 3
      title: Update CLAUDE.md / orchestrator skill + (optional) `htmlgraph-teammate` subagent definition
      what: |
        Update documentation to reflect the auto-injection (slice 1) and the now-actually-persisted teammate identity (slice 2). Document the v2.1.64+ JSON control payload feature in CLAUDE.md as available-for-future-use (not yet implemented in our hooks per design.non_goals). Optionally add a HtmlGraph-specific subagent definition usable as a teammate by natural-language reference.

        **Implementation:**
        1. **CLAUDE.md update.** The existing "Agent Teams (experimental)" section needs three updates:
           - Replace the manual-setup statement with: "HtmlGraph auto-injects `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1` in `htmlgraph claude` / `yolo` / `dev`. To opt out, set `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=0` in your shell or `agent_teams.enabled: false` in `.htmlgraph/config.json`."
           - Add: "Teammate identity (`teammate_name`, `team_name`, `idle_reason`) is persisted to `agent_events` for every team-hook event, enabling SQL queries that filter or aggregate by teammate."
           - Add: "Hook control payloads — Claude Code v2.1.64+ also accepts JSON `{\"continue\": false, \"stopReason\": \"...\"}` on `TeammateIdle` and `TaskCompleted` hooks as an alternative to exit-code 2. HtmlGraph currently uses exit-code 2 (works on all versions). The JSON path may be adopted in a future plan if cleaner messaging is needed."
        2. **orchestrator-directives-skill SKILL.md update.** Same three updates as CLAUDE.md, plus: rename the existing "Set automatically by `htmlgraph claude`/`htmlgraph yolo`; no manual step required" line if it currently differs (the research found it says "Environment variable: `CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1`" as a user requirement — flip to "Set automatically..."). Update the "blocked teammates cannot be /resume'd" caveat to mention JSON payload as a non-stranding alternative when implemented.
        3. **(Optional, gated on q-teammate-subagent-definition-scope) `plugin/agents/htmlgraph-teammate.md`.** New file with frontmatter:
           ```yaml
           ---
           name: htmlgraph-teammate
           description: General-purpose teammate aware of HtmlGraph conventions (work-item attribution, slice-based planning, spec sections). Spawn via natural language: "spawn a teammate using htmlgraph-teammate to ..."
           model: sonnet
           color: cyan
           tools: [Read, Write, Edit, Bash, Grep, Glob]
           maxTurns: 50
           memory: project
           ---
           ```
           Body briefs the teammate on: HtmlGraph's work-item attribution (start before changes, complete after), slice-card planning workflow, `<section class="spec">` format (Requirement/Scenario), the orchestrator delegation pattern, and the OODA active-observer integration if relevant. ~50-line system prompt.
      why: |
        Documentation drift is a real cost: CLAUDE.md's current claim about teammate identity capture is partially false (the DB column is NULL); after slices 1+2 ship, the claim becomes accurate but the docs still say "you have to set the env var manually." Updating both files in lockstep ensures documentation matches behavior. The JSON control payload mention is informational — readers should know about the v2.1.64+ feature even if our hooks don't yet emit it. The optional teammate definition makes HtmlGraph's conventions composable into Claude Code's team workflow with one natural-language reference, removing friction for users who want to spawn teams that follow project conventions.
      files:
        - CLAUDE.md
        - plugin/skills/orchestrator-directives-skill/SKILL.md
        - plugin/agents/htmlgraph-teammate.md
      deps:
        - 1
        - 2
      done_when:
        - CLAUDE.md 'Agent Teams (experimental)' section reflects auto-injection (no manual setup), persisted teammate identity, and JSON control payload availability
        - '`plugin/skills/orchestrator-directives-skill/SKILL.md` agent-teams section matches CLAUDE.md (single source of truth for the policy, mirrored into the skill)'
        - 'If question `q-teammate-subagent-definition-scope` answer is `include-in-slice-3`: `plugin/agents/htmlgraph-teammate.md` exists with valid frontmatter and a body that briefs the teammate on HtmlGraph conventions'
        - 'If question answer is `defer-to-followon`: file a follow-on bug `Add htmlgraph-teammate subagent definition` referencing this slice as the parent context'
        - 'If question answer is `define-multiple-roles`: create at least two definitions (`htmlgraph-teammate-coder.md`, `htmlgraph-teammate-researcher.md`) with appropriately scoped tool allowlists'
      effort: S
      risk: Low
      tests: |
        Unit:
        - TestCLAUDEMD_HasAgentTeamsSection — read CLAUDE.md; assert section title and the three new content phrases (auto-injection, teammate identity persisted, JSON payload mention)
        - TestSkillFile_ValidFrontmatter — for each agent file added (depending on q answer), assert frontmatter parses with required fields (name, description, model, tools)
        - TestSkillFile_BodyMentionsConventions — agent body contains references to HtmlGraph conventions (work-item attribution, spec sections, etc.)

        Integration: not applicable for docs-only slice

        Regression: any existing CLAUDE.md or SKILL.md tests pass
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      questions:
        - id: q-docs-truth-source
          text: Should the agent-teams documentation be a single source mirrored into multiple files, or independently maintained per file?
          description: |
            The existing pattern in this repo is duplication (CLAUDE.md and orchestrator skill both have agent-teams content). Single-source would prevent drift but adds tooling.
          recommended: duplicate-with-comment
          options:
            - key: duplicate-with-comment
              label: duplicate-with-comment — both files contain the full text; add a comment at the top of each saying 'mirror this from the other when changed'. Simple; matches existing pattern.
            - key: skill-references-claudemd
              label: skill-references-claudemd — orchestrator skill links to CLAUDE.md instead of duplicating. Single source. But skills are loaded into agent context as text, so the link wouldn't be auto-followed.
            - key: extract-shared-doc
              label: extract-shared-doc — extract the agent-teams content into a separate `docs/agent-teams.md` and have both CLAUDE.md and the skill say 'see docs/agent-teams.md'. Cleanest but introduces a new docs convention.
questions:
    - id: q-teammate-subagent-definition-scope
      text: Should slice 3 include a HtmlGraph-specific subagent definition usable as a teammate?
      description: |
        Subagent definitions in `plugin/agents/` can be referenced by name in natural-language team-spawn prompts. The doc research suggests this is a high-value optional addition: define `htmlgraph-teammate.md` with HtmlGraph conventions in the system prompt, and users can spawn teammates via `"spawn 3 teammates using the htmlgraph-teammate definition to..."`. The teammate inherits the `tools` allowlist (skills/mcpServers do NOT propagate to teammates per the docs).
      recommended: include-in-slice-3
      options:
        - key: include-in-slice-3
          label: 'include-in-slice-3 — add `plugin/agents/htmlgraph-teammate.md` (~50 lines: frontmatter + system prompt body) alongside the docs updates. Small marginal cost, immediate user value.'
        - key: defer-to-followon
          label: defer-to-followon — slice 3 stays docs-only. File a follow-on bug for the teammate definition. Keeps this plan tighter; teammate definition can be designed more thoughtfully when there's a clear use case.
        - key: define-multiple-roles
          label: 'define-multiple-roles — define a small library: `htmlgraph-teammate-coder.md`, `htmlgraph-teammate-researcher.md`, `htmlgraph-teammate-reviewer.md`. Larger scope; couples this plan to a teammate-role taxonomy that may need iteration.'
      answer: null
