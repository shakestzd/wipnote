          summary: '`Decisions []SliceDecision` typed schema YAGNI — replaced with `DecisionsNotes string` (free text); single consumer (slice 1''s spec renderer) doesn''t need typed access'
        - source: opus
          severity: HIGH
          summary: Cross-slice flag ownership conflict on `htmlgraph spec generate --decisions-json` — eliminated; slice 1 reads `slice.DecisionsNotes` directly from YAML, no flag plumbing across slices
        - source: opus
          severity: MEDIUM
          summary: Gate threshold ambiguity in dual-format world — tightened to '≥1 `### Requirement:` with non-empty SHALL OR ≥1 legacy line with non-empty text'
        - source: opus
          severity: LOW
          summary: Hard-error-with-override-flag adopted (per opus LOW finding) — `--allow-spec-skip` writes audit comment to the slice/feature HTML
questions:
    - id: q-cohort-strategy
      text: What's the strategy for the 117 existing spec-less done features?
      description: |
        The plan delivers spec enforcement for FUTURE features but doesn't generate specs for the 117 already-done. Three options.
      recommended: leave-empty-tracked-as-followon
      options:
        - key: leave-empty-tracked-as-followon
          label: leave-empty-tracked-as-followon — accept the cohort gap; file a follow-on bug for backfill if/when needed. Keeps this plan tightly scoped to enforcement; the 117 features are old work and rarely re-evaluated.
        - key: marker-now-as-shell-script
          label: marker-now-as-shell-script — one-off `htmlgraph spec grandfather --all` adds `<section class="spec" data-grandfathered="true">` to every existing done feature. Adds ~50 lines to slice 3 but closes the cohort gap immediately.
        - key: backfill-via-llm-followon
          label: backfill-via-llm-followon — defer to a separate plan that uses claude -p to reverse-engineer specs from each feature's diff. Expensive but produces real data; needs its own scope discussion.
      answer: null
