    - id: slice-12
      num: 12
      title: Phase 1c — Audit existing HTML corpus to inform v1 vocabulary
      what: |
        Before the v1 schema is frozen, scan all 577 existing
        `.htmlgraph/{features,bugs,spikes,plans,tracks,sessions}/*.html`
        files and enumerate every distinct `data-*` attribute name, value
        type, and edge relationship in actual use today. Produce
        `docs/schema/v0-inventory.md` listing:
        - Per-type: every `data-*` attribute name, distinct values seen,
          and rough frequency.
        - Every distinct `<a data-relationship="...">` value (the live
          edge vocabulary).
        - Every distinct `<meta name="...">` already present in heads.
        - Every observed timestamp format (so v1's `<time datetime>` covers
          them all).
        - Hand-edited body content patterns (so the `BodyPassthrough`
          field on `schema.v1.<Type>` covers actual usage).

        Implement as `cmd/htmlgraph/audit_v0.go` — a one-shot CLI command
        that walks the corpus, parses with goquery, aggregates, and emits
        the markdown report.
      why: |
        The schema URL `https://htmlgraph.dev/v1/` becomes a permanent
        public contract once committed into 577 HTML files. A single missed
        attribute forces a v2 migration. Slice-3 (schema spec) MUST consume
        this inventory before freezing; that's why slice-3 deps on slice-12.
      files:
        - cmd/htmlgraph/audit_v0.go
        - cmd/htmlgraph/audit_v0_test.go
        - docs/schema/v0-inventory.md
        - internal/audit/scan.go
        - internal/audit/scan_test.go
      deps: []
      done_when:
        - '`htmlgraph audit-v0` runs on the working repo''s `.htmlgraph/` and produces `docs/schema/v0-inventory.md`.'
        - Inventory enumerates ≥10 distinct `data-*` attributes, ≥5 edge relationship types, ≥3 timestamp formats, and any meta-name primitives in use.
        - A reviewer (human or agent) can read the inventory and produce the v1 vocabulary list without consulting the source code.
      effort: M
      risk: Low
      tests: |
        Unit: TestScan_AggregatesAttributes — synthetic corpus, expected attribute frequencies match.
        Unit: TestScan_EmitsMarkdown — fixture corpus → markdown output matches recorded golden.
        Integration: TestAuditV0_RealCorpus — runs against `.htmlgraph/` in CI; output count > thresholds.
