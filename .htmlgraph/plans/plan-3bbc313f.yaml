meta:
    id: plan-3bbc313f
    track_id: trk-2c55adea
    title: HTML-canonical architecture migration
    description: |
        Lock in a public HTML schema (JSON-LD payload + microdata body + link rel head edges + meta-name primitives + time datetime) that makes the work-item HTML files the canonical queryable substrate. Migrate every consumer (CLI, dashboard, ingest pipeline) off SQLite as a system requirement, in six phases. SQLite is allowed back later strictly as a disposable derived speed tier — not in this plan.
    created_at: "2026-05-01"
    status: done
    created_by: claude-opus
    version: 2
design:
    problem: |
        `.htmlgraph/htmlgraph.db` has corrupted three times in nine days. The architecture claims SQLite is a "derived read index" but the codebase treats it as authoritative: ~110 Go files import `database/sql`, the entire `internal/hooks/` package persists hook events directly to SQLite tables, `internal/db/` is a 18-file repo package, and core subsystems (`internal/graph/`, `internal/agent/`, `internal/planchat/`, `internal/registry/`) depend on SQL queries. Today the OTEL activity feed shows zero spans because the DB is empty/no-schema, even though 198 spans are durably written to NDJSON for the current session. The CLI read-path is ~85% HTML-direct, but the WRITE-path and dashboard are deeply SQLite-coupled. Driver: `modernc.org/sqlite v1.37.1`. The cost-to-benefit has flipped — SQLite imposes a corruption class on every session for speed wins that current scale doesn't meaningfully require, and every new feature accidentally adds another SQLite dependency.
    goals:
        - '**Eliminate the corruption class** — losing the SQLite file becomes a sub-second nuisance (rm + rebuild from canonical HTML+NDJSON), not an incident.'
        - '**Promote HTML to genuinely canonical** — every fact in a work-item file is queryable by an explicit, versioned schema (JSON-LD payload + `<link rel>` graph + `<meta name>` filters + `<time datetime>` + microdata body), informed by an audit of the actual data-* vocabulary in use today.'
        - '**Make NDJSON canonical for events** — hook events and OTEL spans both persist to per-session NDJSON; SQLite is no longer the event store.'
        - '**Remove SQLite as a system requirement** — the binary builds, ships, and runs without the `modernc.org/sqlite` driver; enforced via build tag (`!sqlite_disabled`) that swaps the import for an error-returning stub.'
        - '**Preserve user-facing CLI and dashboard surface** — every existing command and dashboard view keeps behavior; users don''t notice the migration.'
        - '**Land a new `htmlgraph query` subcommand** — jq-style filter over JSON-LD payloads via embedded `itchyny/gojq`.'
    constraints:
        - No new runtime language deps (no Python, no Rust binary). Pure-Go embeds only.
        - Schema vocabulary versioned at `https://htmlgraph.dev/v1/`; freeze ONLY after corpus audit (slice-12) enumerates every distinct `data-*` attribute and edge type currently in use across the 577 existing HTML files.
        - Phase 0 (slices 1-2) must land first — we do not remove SQLite paths while the DB is the only thing serving the activity feed.
        - Every SQLite removal step keeps a non-SQLite fallback; the build-tag stub (slice-8 acceptance) is the binding compile-time contract.
        - Backfill of existing `.htmlgraph/*.html` files (slice-6) must be reversible (git-snapshot before write) and content-preserving (passthrough body field; post-render diff fails the migrator).
        - 'Plan blast radius extends well beyond the read-path audit: ~110 SQL-importing files, 18-file `internal/db/`, ~20-file `internal/hooks/` event-persistence layer, internal/{graph,agent,planchat,registry} all in scope. Several follow-on slices (12-16) added to cover work the original 11-slice plan missed.'
    approved: false
    comment: ""
slices:
    - id: slice-1
      num: 1
      title: Phase 0a — RCA and fix the SQLite ingestion path so OTEL spans render
      what: |
        Diagnose why `.htmlgraph/htmlgraph.db` keeps ending up empty/corrupt
        (3 incidents in 9 days, plus a current zero-byte file with no schema).
        The original "concurrent collectors" hypothesis is suspect because
        `internal/otel/receiver/writer.go` already sets `MaxOpenConns=1` and
        uses `BEGIN IMMEDIATE`. Specifically test three candidate causes:
        (a) `journal_mode=WAL` falls back to `DELETE` on the Codespaces
        filesystem (check `internal/db/pragmas.go`),
        (b) `INSERT OR IGNORE INTO sessions` swallows FK constraint
        violations on the `otel_signals` insert path, leaving the table empty
        while no error is logged,
        (c) the read-pool DSN and write-pool DSN apply different pragmas,
        causing journal-mode mismatch.
        Pick the actual cause with a reproducer; fix it; document the
        diagnosis in the commit message. The ingestion path spans
        `internal/otel/indexer/indexer.go`,
        `internal/otel/receiver/writer.go`, `internal/otel/sink/sink.go`,
        and `internal/db/otel_schema.go`.
      why: |
        Closes the immediate user-visible bug (activity feed shows no OTEL
        data) and stabilizes the baseline so the rest of the migration can
        proceed against a working dashboard. Without a correct RCA, the
        "fix" may not address the actual cause and corruption recurs.
      files:
        - internal/otel/receiver/writer.go
        - internal/otel/indexer/indexer.go
        - internal/otel/sink/sink.go
        - internal/otel/adapter/claude.go
        - internal/db/otel_schema.go
        - internal/db/pragmas.go
        - internal/storage/dbpath.go
        - internal/otel/receiver/writer_test.go
      deps: []
      done_when:
        - Activity feed in the dashboard shows OTEL spans (api_request, tool_execution, tool_result) within one cold-start of `htmlgraph serve`.
        - A regression test reproduces the corruption / empty-schema scenario and verifies the fix.
        - Running two concurrent `htmlgraph claude` sessions does not cause DB corruption (verified manually + scripted).
        - A new bug `[P1] SQLite read index ends up empty/corrupt` is filed under trk-c4615ad2 and closed by this slice's commits.
      effort: M
      risk: Med
      tests: |
        Unit: TestWriter_BatchIngest_EmptyDB_AutoMigrates — open against a fresh empty DB, batch-insert 10 spans, assert all are queryable.
        Integration: TestConcurrentCollectors_NoCorruption — spin up two collectors writing to the same DB via the WAL path; assert PRAGMA integrity_check is OK after 1k spans each.
        Regression: existing `internal/otel/receiver/*_test.go` and `internal/otel/sink/*_test.go` still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
        - source: sonnet-coder
          severity: HIGH
          summary: Concurrent-collector hypothesis may be wrong. writer.go already has MaxOpenConns=1 + BEGIN IMMEDIATE. RCA must specifically probe (a) journal_mode falling back to DELETE on Codespaces fs, (b) INSERT OR IGNORE swallowing FK constraint violations on otel_signals → sessions, before landing any fix.
        - source: researcher
          severity: MED
          summary: Ingestion chain likely runs through internal/otel/indexer/indexer.go and internal/otel/sink/sqlite/sqlite.go in addition to receiver/writer.go — file list incomplete; corruption site may be in any of the three.
    - id: slice-2
      num: 2
      title: Phase 0b — Auto-recover empty/corrupt DB at startup; add `htmlgraph recover-db`
      what: |
        In the SQLite open path (`internal/storage/dbpath.go` and
        `cmd/htmlgraph/main.go` startup), detect: (a) zero-byte DB,
        (b) PRAGMA integrity_check failure. On either, quarantine the file
        to `.htmlgraph/htmlgraph.db.corrupt-<unix>` and rebuild from
        canonical sources (replay every `.htmlgraph/sessions/*/events.ndjson`
        through the indexer; reparse all work-item HTML for the work-item
        tables). Add explicit `htmlgraph recover-db` subcommand for manual
        recovery, sharing the same code path.
      why: |
        Defensive: turns the next corruption from an incident into a slow
        startup. Also serves as the dress rehearsal for Phase 4 — proves the
        DB can be rebuilt deterministically from canonical sources, which is
        the precondition for ever calling SQLite "disposable."
      files:
        - internal/storage/dbpath.go
        - internal/storage/recover.go
        - cmd/htmlgraph/main.go
        - cmd/htmlgraph/recover_db.go
        - cmd/htmlgraph/recover_db_test.go
      deps:
        - 1
      done_when:
        - Starting `htmlgraph serve` against a zero-byte `htmlgraph.db` quarantines it and produces a fully-populated rebuild without operator intervention.
        - '`htmlgraph recover-db` exits 0 and produces an identical DB to the auto-recovery path (golden-file comparison).'
        - PRAGMA integrity_check failures during normal queries trigger a single quarantine + rebuild, not an infinite loop.
      effort: M
      risk: Med
      tests: |
        Unit: TestRecoverDB_FromZeroByte — empty file → fully-populated DB, all expected tables present.
        Unit: TestRecoverDB_FromCorrupt — write a known-bad page, assert quarantine + rebuild.
        Integration: TestStartupAutoRecover — `htmlgraph status` against a corrupt DB succeeds.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
    - id: slice-3
      num: 3
      title: Phase 1a — Author schema v1 spec, Go types, and validator
      what: |
        Consume the v0 vocabulary inventory produced by slice-12. Write
        `docs/schema/v1.md` defining the `https://htmlgraph.dev/v1/`
        vocabulary: types (Feature, Bug, Spike, Plan, Track, Session, Commit,
        OtelSpan, AgentEvent), universal properties covering EVERY data-*
        attribute observed in the live corpus (so no surprise field forces
        a v2 migration), and the link-rel relationship vocabulary mapped
        from existing `data-relationship` values (depends-on, blocked-by,
        caused-by, contained-in, part-of, references, supersedes,
        produced-by-session, produced-commit, plus any others surfaced by
        the audit). Implement `internal/schema/v1.go` with Go structs
        matching the JSON-LD shape (`@context`, `@type`, `@id` + properties)
        and an explicit `BodyPassthrough string` field on each type to
        preserve hand-edited body content verbatim across re-renders.
        Implement `internal/schema/validate.go` — given an `io.Reader`
        over an HTML file, verify presence and consistency of `<script
        type="application/ld+json">`, `<meta name="htmlgraph:*">`,
        `<link rel="...">`, and `<time datetime="...">` against the schema.
      why: |
        Establishes the public contract everything else depends on. The schema
        is the new architectural commitment; nothing else can land safely
        until it's frozen. Acts as both human documentation and a parser
        contract for tools (CLI, dashboard, external `hq`/`jq` users).
      files:
        - docs/schema/v1.md
        - internal/schema/v1.go
        - internal/schema/validate.go
        - internal/schema/validate_test.go
      deps:
        - 12
      done_when:
        - '`docs/schema/v1.md` exists, defines all listed types and properties, and lists the `<link rel>` vocabulary derived from the slice-12 v0 inventory.'
        - '`internal/schema/v1.Feature`, `.Bug`, `.Spike`, `.Plan`, `.Track`, `.Session` Go structs round-trip via `encoding/json` matching the spec, INCLUDING a `BodyPassthrough` field per type.'
        - Every distinct `data-*` attribute and edge type from the v0 inventory has a corresponding mapped property in v1 (no schema gap).
        - '`internal/schema/Validate(r) error` returns nil for a hand-authored valid example, returns specific errors (missing field, wrong type) for known-bad cases.'
      effort: M
      risk: Med
      tests: |
        Unit: TestValidate_GoldenFeature — read a fixture under testdata/v1/, assert nil error.
        Unit: TestValidate_MissingTypes — for each mandatory field, verify a clear error message.
        Unit: TestRoundTrip — marshal → unmarshal → equality for each type.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
        - source: sonnet-coder
          severity: HIGH
          summary: 'Schema URL becomes a permanent public contract once committed into the 577 existing HTML files. Fixtures alone are insufficient validation — must enumerate every distinct data-* attribute, edge type, and status value actually in use across `.htmlgraph/**/*.html` BEFORE freezing v1, otherwise a surprise field forces a v2 migration. Suggest a prerequisite slice: ''Audit existing HTML corpus to inform v1 vocabulary''.'
    - id: slice-4
      num: 4
      title: Phase 1b — Schema test fixtures (positive and negative)
      what: |
        Author `internal/schema/testdata/v1/` containing one positive fixture
        per top-level type and at least three negative fixtures (missing
        required field, conflicting JSON-LD vs. meta-name status, malformed
        datetime). These fixtures are the canonical examples that downstream
        slices' tests target. Include a `README.md` in the testdata dir
        explaining the fixture layout and how new types are added.
      why: |
        Without fixtures the validator from slice-3 has no real-world
        coverage. Fixtures also act as documentation by example for anyone
        writing migration code in slices 5-6, and as the regression bar
        for Phase 2 templater changes.
      files:
        - internal/schema/testdata/v1/feature_valid.html
        - internal/schema/testdata/v1/bug_valid.html
        - internal/schema/testdata/v1/track_valid.html
        - internal/schema/testdata/v1/session_valid.html
        - internal/schema/testdata/v1/feature_missing_status.html
        - internal/schema/testdata/v1/feature_jsonld_meta_mismatch.html
        - internal/schema/testdata/v1/feature_malformed_datetime.html
        - internal/schema/testdata/v1/README.md
      deps:
        - 3
      done_when:
        - Each positive fixture passes `internal/schema.Validate` with nil error.
        - Each negative fixture fails `Validate` with a specific, non-generic error referencing the broken field.
        - Fixture README documents file naming and how to extend with new types.
      effort: S
      risk: Low
      tests: |
        Unit: TestFixtures_AllPositiveValidate — table-driven over every *_valid.html file.
        Unit: TestFixtures_AllNegativeFail — table-driven over every other file, asserting expected error substring.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
    - id: slice-5
      num: 5
      title: 'Phase 2a — Templater refactor: derive all schema layers from one source struct'
      what: |
        Refactor every HTML emitter to render from a single
        `internal/schema/v1.<Type>` struct. The renderer derives, from
        that one struct: (a) the JSON-LD `<script>` payload, (b)
        `<meta name="htmlgraph:*">` head metas, (c) `<link rel="...">`
        head edges, (d) microdata `itemscope`/`itemprop` decoration of
        body elements, (e) `<time datetime>` for every timestamp,
        (f) the `BodyPassthrough` field rendered verbatim into the body.
        The struct is source of truth; no fact is hand-authored twice.
        Every write path runs `schema.Validate` on its output and refuses
        to write malformed HTML. Add a CI lint that fails on any
        `os.WriteFile` / `file.Write` to a `.html` path that does not call
        `schema.Validate` on the buffer first.

        Real emitters to update (audited via grep):
        `internal/workitem/{htmlwriter,edit,features,bugs,spikes,plans,sessions,tracks,specs,collection}.go`,
        `internal/hooks/session_html.go`,
        `cmd/htmlgraph/{workitem_create,workitem_modify,workitem_edges}.go`,
        `cmd/htmlgraph/{plan_create,plan_mutations,plan_finalize,plan_finalize_yaml,plan_yaml_cmds,plan_promote_slice,plan_typed_sections,plan_migrate_orphans,plan_template,plan_wire,plan_yaml_extras}.go`,
        `cmd/htmlgraph/{cleanup,migrate,migrate_attribution}.go`,
        `cmd/htmlgraph/{api_plans,api_transcript}.go`,
        `cmd/htmlgraph/{reindex,reindex_files,reindex_helpers,reindex_sessions,reindex_trailers}.go`.
        Also update the templates in `plugin/templates/` (bug, chore,
        feature, spike) to align with the new schema.
      why: |
        Removes the duplication-and-drift class permanently. Once this lands,
        "the HTML schema" is a real architectural invariant rather than a
        style guide. Validation at write time turns schema regressions into
        test failures rather than corrupted artifacts.
      files:
        - internal/schema/render.go
        - internal/workitem/htmlwriter.go
        - internal/workitem/edit.go
        - internal/workitem/features.go
        - internal/workitem/bugs.go
        - internal/workitem/spikes.go
        - internal/workitem/plans.go
        - internal/workitem/sessions.go
        - internal/workitem/tracks.go
        - internal/workitem/specs.go
        - internal/workitem/collection.go
        - internal/hooks/session_html.go
        - cmd/htmlgraph/workitem_create.go
        - cmd/htmlgraph/workitem_modify.go
        - cmd/htmlgraph/workitem_edges.go
        - cmd/htmlgraph/plan_mutations.go
        - cmd/htmlgraph/plan_yaml_cmds.go
        - cmd/htmlgraph/plan_finalize_yaml.go
        - cmd/htmlgraph/plan_promote_slice.go
        - cmd/htmlgraph/cleanup.go
        - cmd/htmlgraph/migrate.go
        - cmd/htmlgraph/migrate_attribution.go
        - cmd/htmlgraph/reindex.go
        - cmd/htmlgraph/reindex_files.go
        - cmd/htmlgraph/reindex_helpers.go
        - cmd/htmlgraph/reindex_sessions.go
        - cmd/htmlgraph/reindex_trailers.go
        - cmd/htmlgraph/api_plans.go
        - cmd/htmlgraph/api_transcript.go
        - plugin/templates/bug-template.html
        - plugin/templates/chore-template.html
        - plugin/templates/feature-template.html
        - plugin/templates/spike-template.html
      deps:
        - 3
        - 4
      done_when:
        - Every emitter calls a single `htmltemplate.Render(struct)` entry point.
        - Every emitter validates output via `schema.Validate` before writing; CI test asserts no emitter bypasses the validator.
        - Generated HTML for a sample Feature struct contains JSON-LD with the same `status` as the rendered `<meta name>` and the body microdata; mismatch is impossible by construction.
      effort: L
      risk: High
      tests: |
        Unit: TestRender_FeatureMatchesSchema — render a sample Feature, validate output, assert specific selectors.
        Unit: TestRender_NoDuplication — given a struct with `status="x"`, mutate the struct and re-render; assert all five layers updated.
        Integration: TestEmitterWriteRefusesInvalid — corrupt a render path to emit a missing-field HTML; assert write returns error.
        Regression: existing `internal/workitem/*_test.go`, plan render tests, and snapshot tests still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
        - source: researcher
          severity: DANGER
          summary: 'All listed render.go files are fictional. Real emitter paths are: internal/workitem/htmlwriter.go, internal/hooks/session_html.go, cmd/htmlgraph/workitem_create.go, cmd/htmlgraph/workitem_modify.go, cmd/htmlgraph/plan_mutations.go, cmd/htmlgraph/plan_yaml_cmds.go. Hook-emitted session HTML in particular would be silently skipped by current file list.'
        - source: sonnet-coder
          severity: DANGER
          summary: Slice scope is severely under-counted. Beyond the listed paths, HTML write/re-render also happens in reindex_files.go, workitem_edges.go, plan_promote_slice.go, ingest.go, and others. The 'no emitter bypasses validator' done_when is unverifiable without an exhaustive grep for os.WriteFile / file.Write calls targeting `.htmlgraph/**/*.html`.
        - source: sonnet-coder
          severity: HIGH
          summary: commitPlanChange regeneration loop and hook handlers write HTML outside the listed file set. Add a CI lint that fails on any write to a .html path that does not call schema.Validate on the buffer.
    - id: slice-6
      num: 6
      title: Phase 2b — Backfill migration of 577 existing `.htmlgraph/*.html` files
      what: |
        Implement `htmlgraph migrate-html --to v1`: iterate every file under
        `.htmlgraph/{features,bugs,spikes,plans,tracks,sessions}/*.html`
        (577 files in the working repo). EXTRACT facts from the existing
        `data-*` attribute scheme that's actually on disk today
        (`data-status`, `data-type`, `data-since`, `data-relationship`,
        and others enumerated in the slice-12 v0 inventory). NOT from
        JSON-LD or microdata, which don't yet exist on disk.

        Populate a `schema.v1.<Type>` struct including its `BodyPassthrough`
        field — capture every byte of body content not mapped to a known
        field, so hand-edits and freeform notes round-trip verbatim.
        Re-render via the new templater (slice-5) and write back.

        Rollback: before the first write, the migrator runs `git stash push -u`
        on `.htmlgraph/` (or commits a snapshot to a `pre-v1-migration` branch)
        so any failed migration can be reverted with one git command.

        Modes:
        `--dry-run` prints semantic diffs and exits 0/1 based on diff cleanliness
          without writing.
        `--write` performs the rollback snapshot, then iterates with fail-loud
          on any file where the post-render whitespace-normalized body differs
          from the original.
        `--check` validates that every file under `.htmlgraph/` already passes
          `schema.Validate` (used in CI to assert the migration converged).

        Add a CI job that runs `htmlgraph migrate-html --dry-run` against the
        committed `.htmlgraph/` snapshot in this repo (the repo dogfoods
        itself) and uploads the diff as an artifact for human review BEFORE
        the write path is enabled.
      why: |
        Without backfill, the codebase has two HTML formats: schema-compliant
        (new emissions) and pre-schema (existing). The dual-format burden
        defeats the whole plan. Backfill collapses the world to a single
        format before Phase 3 reads can rely on it.
      files:
        - cmd/htmlgraph/migrate_html.go
        - cmd/htmlgraph/migrate_html_test.go
        - internal/migrate/v0_to_v1.go
        - internal/migrate/v0_to_v1_test.go
        - internal/migrate/rollback.go
        - internal/migrate/testdata/legacy/
        - .github/workflows/ci.yml
      deps:
        - 5
        - 14
      done_when:
        - '`htmlgraph migrate-html --dry-run` produces a clean semantic diff for the working repo''s `.htmlgraph/` (status, edges, timestamps preserved; passthrough body byte-identical after whitespace normalization).'
        - After `htmlgraph migrate-html --write`, `internal/schema.Validate` returns nil for every file under `.htmlgraph/{features,bugs,spikes,plans,tracks,sessions}/`.
        - 'CI artifact: dry-run diff is uploaded for human review on every PR that touches `internal/migrate/` or `internal/schema/`.'
        - 'Idempotent: running migrate-html twice produces zero diff on the second pass.'
        - 'Rollback verified: a manual test confirms `git stash pop` (or branch checkout) restores all 577 files to pre-migration state byte-for-byte.'
      effort: L
      risk: High
      tests: |
        Unit: TestMigrate_FeatureSemanticPreserved — load legacy HTML, migrate, assert schema struct fields match expected.
        Unit: TestMigrate_Idempotent — run migrate twice, second pass produces zero diff.
        Integration: TestMigrate_FullCorpus — migrate the real `.htmlgraph/` (in CI sandbox), assert all files validate.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
        - source: sonnet-coder
          severity: DANGER
          summary: 'The migrator must read the EXISTING format (data-* attributes: data-status, data-type, data-created, data-relationship, data-since), not JSON-LD or microdata which don''t yet exist on disk. Plan as written reads from the wrong source. Add: pre-commit git snapshot of every file as rollback; --dry-run pass against actual corpus committed in CI artifacts before write path is enabled.'
        - source: sonnet-coder
          severity: HIGH
          summary: Hand-edited body content (task notes, agent comments, freeform inline HTML) has no canonical field mapping and will be silently dropped or mangled by re-render. Add an explicit 'passthrough body' field to schema.v1.<Type> that round-trips arbitrary inner HTML verbatim. Fail-loud on any post-render diff after whitespace normalization.
    - id: slice-7
      num: 7
      title: Phase 3a — `internal/htmlparse` JSON-LD fast path + ParseLinks + ParseHeadMeta
      what: |
        Add three new exported functions to `internal/htmlparse`:
        (1) `ParseJSONLD(r) (*schema.v1.<Type>, error)` — extracts the
        first `<script type="application/ld+json">` and unmarshals.
        (2) `ParseLinks(r) ([]Link, error)` — head-only stream parse for
        `<link rel="..." href="...">` tags.
        (3) `ParseHeadMeta(r) (map[string]string, error)` — head-only stream
        parse for `<meta name="htmlgraph:*" content="...">`.
        All three short-circuit on `</head>`. Existing `ParseFile` continues
        to work via goquery for legacy callers and body-content extraction.
        Benchmark JSON-LD parse vs full parse and document the win.
      why: |
        The fast paths are the perf justification for not needing SQLite for
        the common queries. ~1ms-per-file JSON-LD parse vs ~10ms goquery
        means a 200-item snapshot is ~200ms instead of 2 seconds —
        acceptable for CLI use, generous for dashboard cold-start.
      files:
        - internal/htmlparse/jsonld.go
        - internal/htmlparse/links.go
        - internal/htmlparse/head_meta.go
        - internal/htmlparse/jsonld_test.go
        - internal/htmlparse/links_test.go
        - internal/htmlparse/head_meta_test.go
        - internal/htmlparse/bench_test.go
      deps:
        - 4
      done_when:
        - All three functions return correct results on every fixture from slice-4.
        - Head-only parsers stop at `</head>` (verified by benchmarking a 1MB body — parse time independent of body size).
        - 'Documented benchmark in `bench_test.go`: JSON-LD path ≥5× faster than goquery on a real Feature file.'
      effort: M
      risk: Low
      tests: |
        Unit: TestParseJSONLD_AllFixtures — table-driven over schema fixtures.
        Unit: TestParseLinks_HeadOnly — file with malicious gigantic body parses in < 5ms.
        Bench: BenchmarkParseJSONLD vs BenchmarkParseFile_GoQuery on a real Feature.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
    - id: slice-8
      num: 8
      title: Phase 3b — Migrate SQLite-using CLI commands; introduce `sqlite_disabled` build tag stub
      what: |
        Rewrite the SQLite-dependent CLI command read paths to use HTML +
        NDJSON + git directly:
        (1) `trace`: scan commits via `git log` + path-filter; read
        produced-by-session and produced-commit `<link rel>` edges from
        work-item heads.
        (2) `lineage`, `lineage_tree`: BFS over work-item heads using
        `htmlparse.ParseLinks`; resolve neighbor IDs via href basenames.
        (3) `session list/show`: scan `.htmlgraph/sessions/*.html` head metas
        and per-session NDJSON; sort by `htmlgraph:created`.
        (4) `status`: drop `dbpkg.CommitAttributionRate`; recompute on demand.
        (5) `statusline`: drop SQL queries; read from work-item HTML.
