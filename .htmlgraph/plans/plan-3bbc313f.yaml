        `task_tracking.go`, `tooluse_shared.go`, `track_event.go`,
        `transcript_assistant.go`, `transcript_user_prompt.go`,
        `user_prompt.go`, `yolo_guard.go`.

        Migrate all hook event writes to the per-session NDJSON sink
        (`internal/otel/sink/ndjson/ndjson.go`). Each hook handler emits
        a typed event record (`{kind: "log", native: "hook_*",
        session_id, prompt_id, ...}`) via the sink's append-only path.
        The dashboard activity feed (slice-10) reads the same NDJSON for
        both hook events AND OTEL spans — they cannot diverge.

        Today's hook handlers also create rows in the `sessions` table.
        Replace with: write `<meta name="htmlgraph:created">` to a session
        HTML file at hook session_start; subsequent updates touch the same
        file via the schema-aware writer (slice-5).
