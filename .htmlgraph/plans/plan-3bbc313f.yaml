          graph engine. Migrate to read directly from work-item HTML
          `<link rel>` edges; cache parsed graphs in-memory in a session-
          scoped struct.
        (b) `internal/agent/ensure.go` — agent registry persistence.
          Migrate to a small JSON file at `.htmlgraph/agents.json` (which
          already exists for some metadata).
        (c) `internal/planchat/backend.go` — plan feedback persistence.
          Plan feedback is already partially in `internal/db/plan_feedback.go`;
          migrate that store to per-plan `<feedback>` JSON-LD nested in
          the plan's HTML, or a sidecar `.htmlgraph/plans/<id>.feedback.jsonl`.
        (d) `internal/registry/registry.go` — host/project registry.
          Migrate to a JSON file at `~/.local/share/htmlgraph/registry.json`
          (or platform-equivalent).

        For each package, document the migration choice (in-memory cache
        vs JSON sidecar vs HTML embedding) in the package's
        `doc.go` so future readers understand WHY.
      why: |
        Slice-11 cannot delete SQLite while these four packages still
        import `database/sql`. They were missed in the original plan
        because the read-path audit only enumerated CLI commands, not
        internal packages. This slice closes the gap.
      files:
        - internal/graph/algorithms.go
        - internal/graph/dsl.go
        - internal/graph/pattern.go
        - internal/graph/querybuilder.go
        - internal/graph/sessions.go
        - internal/graph/doc.go
        - internal/agent/ensure.go
        - internal/agent/doc.go
        - internal/planchat/backend.go
        - internal/planchat/doc.go
        - internal/registry/registry.go
        - internal/registry/doc.go
      deps:
        - 7
      done_when:
        - '`grep -r ''database/sql'' internal/{graph,agent,planchat,registry}/` returns zero matches.'
        - Each package's doc.go explains the new persistence model.
        - Lineage/trace graph queries (used by slice-8 and slice-10) still produce correct results — golden-file parity test passes.
        - Existing tests under each package pass; new tests cover the JSON-sidecar and HTML-embedding paths.
      effort: L
      risk: High
      tests: |
        Unit: TestGraph_BFSOverHTMLLinks — fixture HTML corpus, assert traversal order matches old SQL-based result.
        Unit: TestAgent_EnsureFromJSON — register agent, reload from JSON, assert identity.
        Unit: TestPlanchat_FeedbackRoundTrip — write feedback, reload, assert content.
        Unit: TestRegistry_HostJSON — register host, reload, assert identity.
        Regression: full lineage/trace test suite passes with the new graph engine.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
questions:
    - id: q-vocab-url
      text: Should the schema vocabulary URL be `https://htmlgraph.dev/v1/` or something namespaced (e.g. `https://schema.htmlgraph.dev/v1/` or a github.io URL)?
      description: |
        The vocabulary URL becomes a public contract. Using the bare domain keeps it short and brand-aligned but reserves the path for future expansion. A subdomain leaves the apex free for marketing. A github.io URL avoids any DNS commitment but ties the schema to hosting choices.
      recommended: bare-domain
      options:
        - key: bare-domain
          label: 'A: `https://htmlgraph.dev/v1/` — short, brand-aligned, reserves path for expansion'
        - key: subdomain
          label: 'B: `https://schema.htmlgraph.dev/v1/` — explicit namespace, leaves apex free'
        - key: github-io
          label: 'C: `https://shakestzd.github.io/htmlgraph/schema/v1/` — no DNS commitment'
      answer: null
    - id: q-phase5-defer
      text: Confirm Phase 5 (browser-as-query-engine) is out of scope for this plan?
      description: |
        Phase 5 is the higher-payoff but higher-risk follow-on: the dashboard becomes self-sufficient against a static HTML snapshot, with an in-tab IndexedDB index. Including it triples the plan size; deferring it means we ship a working SQLite-removal sooner and re-plan Phase 5 later. The plan as written defers it.
      recommended: defer
      options:
        - key: defer
          label: 'A: Defer — separate plan after Phase 4 lands'
        - key: include
          label: 'B: Include now — add 3 more slices for manifest endpoint, in-tab index, IndexedDB persistence'
      answer: null
    - id: q-block-sqlite-flag
      text: Should `--block-sqlite` be a runtime flag, a build tag, or both?
      description: |
        Critic feedback: a runtime flag cannot intercept transitive sql.Open calls in 12+ internal packages. Only a build tag that replaces the driver import with an error-returning stub gives a compile-time guarantee. The runtime flag is still useful for local development ("does removing this code path actually work?") but the binding contract should be the build tag.
      recommended: build-tag
      options:
        - key: flag
          label: 'A: Runtime flag only — easier to develop, but unenforceable'
        - key: build-tag
          label: 'B: Build tag only — compile-time guarantee, harder to A/B'
        - key: both
          label: 'C: Build tag for CI/release; runtime flag for development'
      answer: null
    - id: q-add-corpus-audit-slice
      text: Add a new slice (slice-12) for HTML corpus audit before freezing v1 schema?
      description: |
        Critic feedback: the schema URL `https://htmlgraph.dev/v1/` becomes a permanent public contract once committed into the 577 existing HTML files. Today's files use ad-hoc data-* attributes (data-status, data-type, data-since, data-relationship). Without auditing every distinct attribute and value actually in use, the v1 vocabulary will miss real fields and force a v2 migration soon after launch. The new slice would: parse all `.htmlgraph/**/*.html`, enumerate every distinct data-* attribute and edge type, produce a `docs/schema/v0-inventory.md` that informs slice-3.
      recommended: "yes"
      options:
        - key: "yes"
          label: 'A: Add slice-12 (corpus audit) as prerequisite to slice-3'
        - key: "no"
          label: 'B: Skip — accept that v1 may miss fields and require v2 sooner'
      answer: null
    - id: q-add-plugin-regen-slice
      text: Add a new slice for plugin port regeneration after schema lands?
      description: |
        Critic feedback: htmlgraph ships the same plugin to Claude Code, Codex CLI, and Gemini CLI via `htmlgraph plugin build-ports`. The Codex and Gemini trees embed `system-prompt.md` which references the architecture (including the SQLite read index). Slice-11 updates AGENTS.md and CLAUDE.md but does not regenerate the per-target plugin trees. Without this, the deployed plugin docs will still reference SQLite after the migration.
      recommended: "yes"
      options:
        - key: "yes"
          label: 'A: Add slice-13 (plugin port regeneration) as final step after slice-11'
        - key: "no"
          label: 'B: Skip — handle as part of slice-11 with a single command in done_when'
      answer: null
    - id: q-add-ci-infra-slice
      text: Add a new slice for CI infrastructure prerequisite?
      description: |
        Critic feedback: existing `.github/workflows/ci.yml` is a single flat quality-gates job with no matrix or workflow_call support. Slices 6 (migrator corpus test) and 8 (block-sqlite suite) require new CI jobs that the current infra cannot host. Either extend ci.yml in those slices or add a prerequisite slice. A prerequisite slice is cleaner — the CI work blocks the work that depends on it.
      recommended: "yes"
      options:
        - key: "yes"
          label: 'A: Add slice-14 (CI infrastructure) as prerequisite to slices 6 and 8'
        - key: "no"
          label: 'B: Fold the CI work into slices 6 and 8 themselves'
      answer: null
