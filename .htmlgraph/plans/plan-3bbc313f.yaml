        Gives users and downstream scripts a stable shell-scriptable
        interface that doesn't require a new CLI subcommand for every read
        pattern. Replaces ad-hoc shell pipelines and prevents feature-creep
        pressure on the core CLI surface. Also serves as a power-user
        escape hatch when the dashboard doesn't expose a needed query.
      files:
