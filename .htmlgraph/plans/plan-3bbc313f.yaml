        The hook-event persistence layer is the single largest unaccounted-
        for SQLite consumer in the codebase. Slice-11 cannot delete SQLite
        while hook handlers continue writing to `agent_events`. By
        converging hook events and OTEL spans on the same NDJSON sink,
        the activity feed bug (the original symptom of this conversation)
