      title: Phase 3c — `htmlgraph query` subcommand (gojq over JSON-LD)
      what: |
        Add `htmlgraph query <jq-expr> [paths...]`: extracts JSON-LD from
        every HTML file in the given paths (default `.htmlgraph/**/*.html`),
        pipes them through an embedded `github.com/itchyny/gojq` filter, and
        emits JSONL on stdout. Supports `--type feature` shorthand to scope
        to a single work-item type. Default output is one JSON object per
        file; `--slurp` collects into an array. Document common recipes in
        `docs/cli/query.md` (find all P1 bugs, lineage tree as JSON, etc.).

        Note: `cmd/htmlgraph/query.go` does NOT currently exist (verified
        via `ls cmd/htmlgraph/query*`); this is a new-file slice. Critic
        feedback that suggested it might be partially implemented appears
        to have been wrong.
