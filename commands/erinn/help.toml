### Output Format:

## Erinn AI Commands

### Session Management
- `/erinn:start` - Start session, see status, choose what to work on
- `/erinn:end` - End current session gracefully
- `/erinn:status` - Quick status check

### Feature Management
- `/erinn:feature-add [title]` - Add a new feature
- `/erinn:feature-start <id>` - Start working on a feature
- `/erinn:feature-complete [id]` - Mark feature as complete
- `/erinn:feature-primary <id>` - Set primary feature for attribution

### Utilities
- `/erinn:init` - Initialize Erinn AI in project
- `/erinn:serve [port]` - Start dashboard server
- `/erinn:track <tool> <summary>` - Manually track activity

### CLI Commands
You can also use the CLI directly:
```bash
erinn --help
erinn status
erinn feature list
erinn session list
```

### Dashboard
View progress in browser:
```bash
erinn serve
# Open http://localhost:8080
```

