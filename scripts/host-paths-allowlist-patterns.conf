# host-paths-allowlist-patterns.conf
# Glob patterns for files that are allowed to contain host-local absolute paths.
# Lines beginning with '#' and blank lines are ignored.
# Patterns use shell glob syntax (fnmatch) matched against repo-relative paths.
#
# This file is the tracked companion to scripts/host-paths-allowlist.txt
# (literal per-file allowlist, not tracked due to *.txt gitignore rule).
# Both files are loaded by check-host-paths.sh --full.
#
# Policy: allowlist only where the path content is intentional and not a real leak.
# Real leaks should be scrubbed; add an entry here only after deliberate review.

