version: 2

project_name: wipnote

builds:
  - id: wipnote
    main: ./cmd/wipnote
    binary: wipnote
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: wipnote
    builds:
      - wipnote
    name_template: "wipnote_{{.Version}}_{{.Os}}_{{.Arch}}"
    format: tar.gz

checksum:
  name_template: "wipnote_{{.Version}}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: shakestzd
    name: wipnote
  name_template: "Go v{{.Version}}"

git:
  tag_sort: -version:refname

snapshot:
  name_template: "{{incpatch .Version}}-next"
