version: 2

project_name: erinn

builds:
  - id: erinn
    main: ./cmd/erinn
    binary: erinn
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: erinn
    builds:
      - erinn
    name_template: "erinn_{{.Version}}_{{.Os}}_{{.Arch}}"
    format: tar.gz

checksum:
  name_template: "erinn_{{.Version}}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: shakestzd
    name: erinn
  name_template: "Go v{{.Version}}"

git:
  tag_sort: -version:refname

snapshot:
  name_template: "{{incpatch .Version}}-next"
