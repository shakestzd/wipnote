version: 2

project_name: wipnote

builds:
  - id: wipnote
    main: ./cmd/wipnote
    binary: wipnote
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: wipnote
    builds:
      - wipnote
    name_template: "wipnote_{{.Version}}_{{.Os}}_{{.Arch}}"
    format: tar.gz

checksum:
  name_template: "wipnote_{{.Version}}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: shakestzd
    name: wipnote
  name_template: "Go v{{.Version}}"

brews:
  - name: wipnote
    repository:
      owner: shakestzd
      name: homebrew-wipnote
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/shakestzd/wipnote
    description: "Local-first observability and coordination platform for AI-assisted development"
    license: MIT
    install: |
      bin.install "wipnote"
      bin.install_symlink "wipnote" => "wn"
    test: |
      assert_match version.to_s, shell_output("#{bin}/wipnote version")

git:
  tag_sort: -version:refname

snapshot:
  name_template: "{{incpatch .Version}}-next"
