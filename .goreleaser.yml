version: 2

project_name: wipnote

builds:
  - id: wipnote
    main: ./cmd/wipnote
    binary: wipnote
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: wipnote
    builds:
      - wipnote
    name_template: "wipnote_{{.Version}}_{{.Os}}_{{.Arch}}"
    format: tar.gz
    # Phase A of the marketplace-to-bundled-plugin migration: ship the plugin
    # tree alongside the binary in every release tarball so the two stay
    # atomically in sync. Phase B will flip `wipnote claude` to load from this
    # bundled tree via --plugin-dir; until then this is purely additive.
    files:
      - src: "plugin/**/*"
        dst: plugin
        info:
          mode: 0644
      # Override mode for executable shell scripts under hooks/bin so they
      # remain runnable after extraction. The previous entry would otherwise
      # rewrite them as 0644.
      - src: "plugin/hooks/bin/*.sh"
        dst: plugin/hooks/bin
        info:
          mode: 0755
      # Phase A also bundles the Codex CLI and Gemini CLI harness trees so
      # all three harnesses ship in lockstep with the binary. Phase B will
      # flip the `wipnote codex` and `wipnote gemini` launchers to load from
      # these bundled trees; until then this is purely additive.
      - src: "packages/codex-marketplace/**/*"
        dst: codex-marketplace
        info:
          mode: 0644
      - src: "packages/gemini-extension/**/*"
        dst: gemini-extension
        info:
          mode: 0644

checksum:
  name_template: "wipnote_{{.Version}}_checksums.txt"
  algorithm: sha256

# Keyless cosign signing of the checksums file via GitHub Actions OIDC.
# The signature (.sig) and certificate (.pem) are uploaded alongside the
# checksums.txt as release assets. End users can verify with:
#   cosign verify-blob \
#     --certificate wipnote_VERSION_checksums.txt.pem \
#     --signature  wipnote_VERSION_checksums.txt.sig \
#     --certificate-identity-regexp '^https://github.com/shakestzd/wipnote/' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     wipnote_VERSION_checksums.txt
# Cosign must be installed on the runner — see the workflow's "Install Cosign" step.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  github:
    owner: shakestzd
    name: wipnote
  name_template: "Go v{{.Version}}"
  # Allow workflow reruns to overwrite assets uploaded by a previous failed
  # attempt; without this, retries after a partial-success run hit 422
  # already_exists and abort before downstream steps (e.g. Homebrew tap push).
  replace_existing_artifacts: true

brews:
  - name: wipnote
    repository:
      owner: shakestzd
      name: homebrew-wipnote
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/shakestzd/wipnote
    description: "Local-first observability and coordination platform for AI-assisted development"
    license: MIT
    install: |
      bin.install "wipnote"
      bin.install_symlink "wipnote" => "wn"
      (share/"wipnote").install "plugin"
      (share/"wipnote").install "codex-marketplace"
      (share/"wipnote").install "gemini-extension"
    test: |
      assert_match version.to_s, shell_output("#{bin}/wipnote version")

git:
  tag_sort: -version:refname

snapshot:
  name_template: "{{incpatch .Version}}-next"
