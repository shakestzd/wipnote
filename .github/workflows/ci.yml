name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -short ./...
      - name: Acceptance harness (CI-safe, fake binaries)
        # Runs the small CI-safe subset of the parallel-launcher acceptance
        # harness (plan-1670cacd slice-10, feat-7835351a). Uses fake DB rows
        # and the existing API handlers — no real harness binaries, no network.
        # The larger stress harness (TestSQLiteContentionStress) is opt-in:
        #   go test -run TestSQLiteContentionStress -count=3 ./cmd/wipnote/
        # See docs/runbook/launcher-isolation.md for the full release gate.
        run: |
          export TMPDIR=/tmp
          go test -short -run 'TestParallelHarnessLineage|TestParallelHarness_MainStaysClean|TestMultiHarnessIngestion' ./cmd/wipnote/
