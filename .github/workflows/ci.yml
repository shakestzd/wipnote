name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build htmlgraph binary
        run: go build -o htmlgraph ./cmd/htmlgraph/
      - name: Verify docs/code-areas.md is up to date
        run: |
          ./htmlgraph code-areas --format markdown > docs/code-areas.md.gen
          diff -q docs/code-areas.md docs/code-areas.md.gen
