prompt = '''
# /wipnote:status

Check project status and active features

## Usage

```
/wipnote:status
```

## Parameters



## Examples

```bash
/wipnote:status
```
Show project progress and current feature



## Instructions for Claude

### Implementation:

**DO THIS:**

1. **Get comprehensive status:**
   ```bash
   wipnote status
   wipnote find features --status in-progress
   ```

2. **Extract key metrics from output:**
   - Total features, completed count, in-progress count
   - Completion percentage
   - Active features with their titles

3. **Present a summary** using the output template below.

4. **Recommend next steps** based on status:
   - If no active features → Suggest `/wipnote:recommend`
   - If active features exist → Show their progress
   - If features done → Acknowledge progress
   - Suggest `/wipnote:plan` for new work

### Output Format:

## Project Status

**Progress:** {done_count}/{total_nodes} ({percentage}%)
**Active:** {status['in_progress_count']} features in progress

### Current Feature(s)
{active_features with titles and step progress}

### Quick Actions
- Use `/wipnote:plan` to start planning new work
- Use `/wipnote:recommend` to get recommendations
- Run `wipnote serve` to open dashboard

'''
