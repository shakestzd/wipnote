prompt = '''
# /wipnote:spike

Create a research/planning spike

## Usage

```
/wipnote:spike <title> [--description TEXT] [--track ID]
```

## Parameters

- `title` (required): Spike title (e.g., "Research authentication options")
- `--description` (optional): Description text for the spike
- `--track` (optional): Track ID to link to


## Examples

```bash
/wipnote:spike "Research OAuth providers"
```
Create a spike

```bash
/wipnote:spike "Investigate caching strategies" --description "Focus on Redis vs Memcached"
```
Create a spike with description

```bash
/wipnote:spike "Plan data migration" --track trk-abc123
```
Spike linked to a track



## Instructions for Claude

### Implementation:

Run spike create, passing `--description` and `--track` when provided:

```bash
erinn spike create "{title}" [--description "{description}"] [--track {track_id}]
```

Then immediately start the spike:

```bash
erinn spike start {id}
```

Present the spike ID and title from CLI output using the output template below.

### Output Format:

## Spike Created and Started

**ID:** {id}
**Title:** {title}
**Status:** in_progress
**Timebox:** {timebox_hours} hours

### Steps
{steps}

Spike is active. Complete the steps to finish planning.

'''
