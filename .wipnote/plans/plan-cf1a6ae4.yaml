        - Clear all launch blockers in priority order
        - Ensure no claim-breaking bugs survive to launch day
        - Ship v0.59.0 with correct Homebrew formula and gh-pages docs
        - Have blog post, demo video, and launch post ready to publish
    constraints:
        - Do not push to origin/main until rename (feat-913bf7a6) is complete and build passes
        - All quality gates (go build, go vet, go test with TMPDIR=.gotmp/tmp) must pass before tagging
