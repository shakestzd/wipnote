          - TestBashDestructiveGuard_ForcePush — git push --force, -f, --force-with-lease to main → categorized as 'force-push'
          - TestBashDestructiveGuard_AllowsNormalGit — git push, git push origin feature-branch → allow
          - TestBashDestructiveGuard_AllowsHtmlGraphCLI — htmlgraph commands containing 'force' as a substring → allow
