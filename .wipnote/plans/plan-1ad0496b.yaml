meta:
    id: plan-1ad0496b
    track_id: trk-68655b2a
    title: Automode support — permission-mode auto + HtmlGraph guardrails
    description: |
        Add 'htmlgraph auto' as a sibling subcommand to 'htmlgraph yolo' that launches Claude Code with --permission-mode auto (Anthropic's classifier-based destructive-pattern blocker, v2.1.111+) while still applying the HtmlGraph PreToolUse guard suite. Extend the bash guard to catch patterns automode catches (curl|bash, force-push), subscribe to the new PermissionDenied hook for classifier-denial telemetry, add a consecutive-deny circuit breaker so stuck-agent retry loops escalate, and document the full mode matrix.
    created_at: "2026-04-18"
    status: draft
    created_by: claude-opus
    version: 6
design:
    problem: |
        Anthropic shipped --permission-mode auto in Claude Code v2.1.111 (2026-04-16): a classifier model pre-reviews each tool call and blocks destructive patterns (curl|bash, force-push, mass deletion, IAM grants, etc.). HtmlGraph's PreToolUse guards are orthogonal — domain-specific work-discipline controls automode has no concept of. There are gaps on both sides:

        1. **No first-class `htmlgraph auto` subcommand.** The `launchClaudeAuto()` helper at cmd/htmlgraph/claude.go:195 IS reachable today — but only via `htmlgraph claude --auto` (claude.go:79-82). There is no standalone subcommand that gives auto-mode users the same UX as `htmlgraph yolo`: tmux session management, --init, --track/--feature scoping, distinct help text, and parity with the yolo flag surface.

        2. **Strict-mode gate is mode-blind.** isYoloFromEvent() at internal/hooks/yolo_guard.go:25 only returns true for `bypassPermissions`. Auto mode falls through, so the 5 guards that gate on ctx.IsYoloMode — worktree isolation, TDD-commit, budget, UI screenshot, diff-review — silently disengage in auto mode. (Work-item attribution and research-first guards are always-on and would fire under auto mode either way; see pretooluse.go:103-127.)

        3. **Bash guard misses automode's blocklist.** bashFileWritePattern at pretooluse.go:343 catches sed/redirects/rm/mv/dd but not curl|bash, wget|sh, git push --force, tee, cp. Users without Max+ access have zero deterministic protection from these patterns.

        4. **No classifier telemetry.** When automode's classifier denies a tool call, we have no record. We can't measure denial rates, tune our deterministic guards against classifier behavior, or build downstream features that react to denials.

        5. **Stuck-agent retry loops.** A denied PreToolUse returns the block; the agent retries indefinitely with minor variations, burning tokens and obscuring root cause.

        6. **No mode matrix docs.** Users don't know when to pick `htmlgraph yolo` vs `htmlgraph auto` vs `htmlgraph claude` vs raw `--permission-mode` flags.
    goals:
        - '**Layered defense in one command** — `htmlgraph auto` launches Claude with `--permission-mode auto` AND activates the 5 yolo-gated guards (worktree, TDD-commit, budget, UI screenshot, diff-review) plus the always-on guards (work-item, research-first). Verified by: invoking the command produces both classifier blocks and HtmlGraph hook blocks for the appropriate tool patterns.'
        - '**Bash guard parity with automode blocklist** — A new `bashDestructivePattern` (sibling to `bashFileWritePattern` at pretooluse.go:343) catches `curl|bash`, `wget|sh`, `git push --force` (and `-f`), `tee` to non-`.htmlgraph/` paths, and `cp` to source files; verified by table-driven tests.'
        - '**Classifier-denial telemetry** — Every `PermissionDenied` hook event is recorded in `agent_events` with `event_type=''permission_denied''`, the denied tool name, an input summary, and the deny reason; queryable via the dashboard.'
        - '**Stuck-agent escalation** — After N consecutive `PermissionDenied` events for the same session (default 3, no successful tool_call between them), the next PreToolUse is hard-blocked with a circuit-breaker message instructing the user to intervene. Counter is a SQL aggregate against agent_events (durable, reproducible across session restarts).'
        - '**User-facing mode matrix** — A reference doc explains default vs `--permission-mode plan` vs `auto` vs `bypassPermissions` vs `htmlgraph yolo` vs `htmlgraph auto`, including which guards apply in each.'
    constraints:
        - Plugin source-of-truth rule — hook event matrix is declared in `packages/plugin-core/manifest.json`; `plugin/hooks/hooks.json` is generated by `htmlgraph plugin build-ports`. Never hand-edit generated files.
        - Hook state rule — gates must be reproducible across session restarts; the circuit breaker counter must read from durable state (`agent_events` SQL query), not in-memory session state.
        - 'Hooks must not write to stderr — debug output goes to `debug.log`. Allow returns `&HookResult{Continue: true}` (Go) which serializes to `{}` JSON; deny returns `&HookResult{Decision: "block", Reason: "..."}`.'
        - '`event_type` CHECK enum lives in TWO synchronized locations: `internal/db/schema.go:124-129` (CreateAllTables) and `:494-497` (the `agentEventsCheckConstraintDDL` constant used by the existing `migrateAgentEventsAddCheckConstraint` rebuild at :532). Both must be updated together.'
        - '`HTMLGRAPH_GUARDS_OFF=1` (pretooluse.go:21) is a global kill switch — every new guard, including the destructive-bash guard and the circuit breaker, must respect it.'
        - Existing index `idx_agent_events_session_ts_desc ON agent_events(session_id, timestamp DESC)` at schema.go:419 already covers the circuit-breaker's `count permission_denied for session_id since timestamp X` query — no new index needed.
        - automode requires Anthropic Max+ plan — `htmlgraph auto` must fail gracefully when the user lacks access (parse classifier-disabled error from claude CLI, or document as a pre-flight requirement); slice 1 must define what 'graceful' means.
        - Existing 5 features (feat-2d2dfc12, feat-9c14a3ef, feat-fdad254b, feat-e86dbcdb, feat-85ef5a6b) are already filed on trk-68655b2a — slices map 1:1 via `slice.feature_id` so finalize is idempotent and reuses them rather than creating duplicates (per cmd/htmlgraph/plan_finalize.go:317).
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-2d2dfc12
      num: 1
      title: htmlgraph auto subcommand — UX parity with yolo, full guard suite under auto mode
      what: |
        Add `cmd/htmlgraph/auto.go` exposing `htmlgraph auto` as a Cobra command, registered as a sibling to `yoloCmd()` under `claudeCmd()` (see `cmd/htmlgraph/claude.go:97` for the registration pattern). Mirror yolo's flag surface from `yolo.go:59-68`: `--dev`, `--init`, `--continue`, `--no-worktree` (default depends on Q2 below), `--tmux`, `--track`, `--feature`, `--resume`. The command body delegates to the existing `launchClaudeAuto()` helper at `cmd/htmlgraph/claude.go:195` — which already sets `EnableAutoMode: true` and `PermissionMode: "auto"`. Note: `htmlgraph claude --auto` already calls this helper (claude.go:79-82); slice 1 adds the standalone subcommand for symmetry with `yolo`, distinct tmux session naming (`htmlgraph-auto`), and feature/track scoping. Extend `isYoloFromEvent()` at `internal/hooks/yolo_guard.go:25` to also return true when `event.PermissionMode == "auto"`. This activates the 5 yolo-gated guards in auto mode: worktree isolation (yolo_guard.go:321,343), TDD-commit (yolo_guard.go:247), budget (yolo_guard.go:271), UI validation (yolo_guard.go:652), and diff-review (yolo_guard.go:415). Update `cmd/htmlgraph/yolo.go:64-65` flag help if needed. Add a pre-flight check that detects the `claude` CLI returning "auto mode requires Max plan" and exits with a clear error message before proceeding.
      why: |
        The `launchClaudeAuto()` helper exists and works, but only via `htmlgraph claude --auto` — which loses the work-item/track/feature ergonomics, tmux integration, and worktree management that yolo provides. A first-class `htmlgraph auto` subcommand gives users a one-line entry point to "autonomous Claude with classifier protection plus HtmlGraph guards." The `isYoloFromEvent` extension is the single point that gates the 5 strict-mode guards; missing it means auto-mode sessions silently bypass TDD/budget/UI/diff/worktree enforcement (work-item and research-first are always-on regardless and would already fire — verified at pretooluse.go:103-127).
      files:
        - cmd/htmlgraph/auto.go
        - cmd/htmlgraph/auto_test.go
        - cmd/htmlgraph/claude.go
        - cmd/htmlgraph/yolo.go
        - internal/hooks/yolo_guard.go
        - internal/hooks/yolo_guard_test.go
      deps: []
