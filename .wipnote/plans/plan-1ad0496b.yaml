        - Behavior in default vs strict modes matches the answer to Q-bash-guard-default-mode.
        - When the guard blocks, the reason cites the matched pattern category (e.g. 'pipe-to-shell', 'force-push') so users understand what tripped.
        - '`HTMLGRAPH_GUARDS_OFF=1` disables the guard entirely (no warn, no block).'
        - All existing pretooluse tests still pass.
      effort: S
      risk: Low
      tests: |
