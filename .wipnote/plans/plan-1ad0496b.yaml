        - Handler calls `recordSimpleEvent` and inserts an `agent_event` row with `event_type='permission_denied'`, `tool_name`, `input_summary`, `tool_input`, `output_summary` (the deny reason), and `session_id`.
        - 'Handler returns `&HookResult{Continue: true}` (serializes to `{}`) — never blocks.'
        - '`htmlgraph hook permission-denied` accepts a CloudEvent on stdin and exits 0 on success.'
