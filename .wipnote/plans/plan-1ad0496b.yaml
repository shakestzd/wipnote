        - Test `TestIsYoloFromEvent_AutoMode` asserts that `event.PermissionMode == "auto"` returns `true`; `TestIsYoloFromEvent_BypassPermissions` and `TestIsYoloFromEvent_Default` confirm existing behavior is preserved.
        - Pre-flight check returns a non-zero exit with a clear message when claude CLI reports auto-mode is unavailable (Max+ plan required).
        - Worktree-default behavior matches the answer to Q-worktree-default (see questions).
        - '`go build ./... && go vet ./... && go test ./...` all pass.'
      effort: M
      risk: Med
      tests: |
