    - id: slice-3
      feature_id: feat-fdad254b
      num: 3
      title: PermissionDenied hook → agent_events telemetry
      what: |
        Add `permission_denied` to the `event_type` CHECK enum in BOTH locations: `internal/db/schema.go:124-129` (CreateAllTables) and `:494-497` (`agentEventsCheckConstraintDDL` constant). Add a new copy-and-swap migration following the exact pattern at `internal/db/schema.go:532` (`migrateAgentEventsAddCheckConstraint`): create new table with extended CHECK, copy rows, drop old, rename, gated by a metadata key so it runs once per database (not on every Open). Create handler in `internal/hooks/permission_denied.go` mirroring `PermissionRequest` at `internal/hooks/missing_events.go:238`. The handler should call the existing `recordSimpleEvent()` helper at `missing_events.go:19` rather than open-coding `db.InsertEvent`. It returns `&HookResult{Continue: true}` (telemetry only — does not block; the deny already happened upstream). Register in `cmd/htmlgraph/hook.go` via `hookSubcmd("permission-denied", ..., hooks.PermissionDenied)` (mirror the registration at hook.go:68 for PermissionRequest). Add to `packages/plugin-core/manifest.json:hooks.events` array (mirror the entry at manifest.json:86) with `targets: ["claude"]` (auto mode is Claude-only). Regenerate `plugin/hooks/hooks.json` via `htmlgraph plugin build-ports --target claude`.
      why: |
        Without recording PermissionDenied events we have no visibility into what the classifier is blocking, no data to tune our deterministic guards, and no foundation for the circuit breaker (slice 4) to count. Mirroring the existing `PermissionRequest` handler keeps the implementation idiomatic and reuses the proven copy-and-swap migration pattern. The `recordSimpleEvent` helper exists for exactly this case — single-insert telemetry handlers — and using it keeps the code consistent.
      files:
        - packages/plugin-core/manifest.json
        - internal/db/schema.go
        - internal/db/schema_test.go
        - internal/hooks/permission_denied.go
        - internal/hooks/permission_denied_test.go
        - cmd/htmlgraph/hook.go
        - plugin/hooks/hooks.json
      deps: []
      done_when:
