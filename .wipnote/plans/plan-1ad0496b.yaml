          - TestPermissionDenied_ReturnsContinue — result is {Continue: true}; never blocks
          - TestPermissionDenied_HandlesMissingFields — graceful when reason/tool_name absent
        Migration test (internal/db/schema_test.go):
          - TestMigrateAddPermissionDenied_FreshDB — fresh db has new enum
          - TestMigrateAddPermissionDenied_ExistingDB — existing db (seeded with old schema + sample rows) migrates cleanly without data loss; metadata key set after run
          - TestMigrateAddPermissionDenied_Idempotent — second Open() does NOT re-run the migration
        Integration: end-to-end via `htmlgraph hook permission-denied` with sample CloudEvent fixture; verify row inserted.
        Regression: existing event_type values still INSERT successfully; `migrateAgentEventsAddCheckConstraint` test still passes.
      approved: false
      comment: ""
    - id: slice-4
      feature_id: feat-e86dbcdb
      num: 4
      title: Consecutive-deny circuit breaker — escalate stuck-agent retry loops
      what: |
        Create `internal/hooks/circuit_breaker.go` with a `checkCircuitBreaker(ctx, db) (*HookResult, error)` function. It is called from `PreToolUse()` in `pretooluse.go` AFTER context resolution but BEFORE expensive guards. The check is gated on `ctx.IsYoloMode` — circuit breaker is only meaningful in strict modes (yolo/auto), and gating avoids adding a DB query to every default-mode tool call. Also respect `HTMLGRAPH_GUARDS_OFF=1` (pretooluse.go:21).

        Implementation: query agent_events using the existing index `idx_agent_events_session_ts_desc` (schema.go:419). Count `event_type='permission_denied'` rows for the current session_id since the most recent successful tool_call (or the session start, whichever is more recent). When count >= `circuitBreakerThreshold` (named constant, default 3), return `&HookResult{Decision: "block", Reason: "Circuit breaker tripped: N consecutive permission denials in this session. Pause and review with the user before retrying. Reset by: <answer to Q-circuit-breaker-reset>."}`. The reset mechanism is determined by Q-circuit-breaker-reset.

        Add a SQL helper `db.CountConsecutiveDenials(sessionID string) (int, error)` to `internal/db/event_repo.go` so the query is testable in isolation. NO new index is required — the existing `idx_agent_events_session_ts_desc` covers the query.
      why: |
        Today a denied PreToolUse simply returns the block, and the agent retries indefinitely with minor variations — burning tokens, spinning forever, and obscuring the root cause. The circuit breaker forces a hard stop after a small number of denials so the user can intervene. Reading from `agent_events` (slice 3) keeps the gate reproducible across session restarts (per the hook state rule). Gating on `ctx.IsYoloMode` keeps default-mode latency unaffected.
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/circuit_breaker.go
        - internal/hooks/circuit_breaker_test.go
        - internal/db/event_repo.go
        - internal/db/event_repo_test.go
      deps:
        - 3
      done_when:
        - After 3 PermissionDenied events for the same session_id with no successful tool_call between them, the 4th PreToolUse returns `{"decision":"block","reason":"Circuit breaker ..."}`.
        - 'A successful (non-denied) tool_call resets the counter (verified by integration test: deny, deny, allow, deny, deny → not blocked on the 5th call).'
        - '`circuitBreakerThreshold` is a named constant for easy tuning.'
        - Counter query is a SQL aggregate against `agent_events`, not in-memory state.
        - Check is skipped when `ctx.IsYoloMode == false` (no DB query in default mode) and when `HTMLGRAPH_GUARDS_OFF=1` is set.
        - Reset mechanism implemented per the answer to Q-circuit-breaker-reset.
        - 'Latency benchmark: PreToolUse latency in strict mode increases by less than 5ms p95 with circuit breaker enabled (existing index covers the query).'
        - All quality gates pass.
      effort: M
      risk: Med
      tests: |
        Unit (internal/hooks/circuit_breaker_test.go):
          - TestCircuitBreaker_BelowThreshold — 2 denials → no block
          - TestCircuitBreaker_AtThreshold — 3 denials → block on the 4th call
          - TestCircuitBreaker_ResetByAllow — deny,deny,allow,deny,deny → no block (5th call passes)
          - TestCircuitBreaker_PerSession — denials in session A do not affect session B
          - TestCircuitBreaker_DefaultModeSkipped — ctx.IsYoloMode=false → no DB query, no block
          - TestCircuitBreaker_GuardsOff — HTMLGRAPH_GUARDS_OFF=1 disables completely
          - TestCircuitBreaker_ResetMechanism — drives Q-circuit-breaker-reset (parameterize once decided)
        Unit (internal/db/event_repo_test.go):
          - TestCountConsecutiveDenials_Query — returns expected counts for various seeded fixtures
          - TestCountConsecutiveDenials_UsesIndex — EXPLAIN QUERY PLAN shows idx_agent_events_session_ts_desc is used
        Integration: end-to-end via fixture-driven PreToolUse calls with seeded agent_events.
        Regression: Existing PreToolUse tests pass; latency benchmark documented.
      approved: false
      comment: ""
    - id: slice-5
      feature_id: feat-85ef5a6b
      num: 5
      title: Mode matrix docs — yolo vs auto vs default
      what: |
        Document the full permission-mode surface. Location decided by Q-docs-location below. Cover: (1) Anthropic flags — `default`, `plan`, `acceptEdits`, `auto`, `bypassPermissions` — what each enables/blocks; (2) HtmlGraph wrappers — `htmlgraph claude` (default), `htmlgraph claude --auto` (auto, no UX scoping), `htmlgraph yolo` (--permission-mode bypassPermissions + 5 yolo guards), `htmlgraph auto` (--permission-mode auto + 5 yolo guards); (3) which guards apply in each mode (matrix table — separate the always-on guards from the mode-gated guards); (4) when to use which (decision tree); (5) PermissionDenied telemetry surface (where to find it, how to query); (6) circuit-breaker behavior and reset. Update `AGENTS.md` and `CLAUDE.md` with a short pointer to the canonical doc (so agents reading those files know where the matrix lives).
      why: |
        Without docs, users will misuse modes — running yolo when auto is safer, or vice versa. The matrix is especially important once `htmlgraph auto` ships, because users now have a meaningful choice between two autonomous modes (Max+ classifier-protected vs deterministic-guards-only). Docs depend on slice 1 so the table reflects the actually-shipping subcommand surface.
      files:
        - docs/blog/posts/yolo-mode.md
        - docs/permission-modes.md
        - AGENTS.md
        - CLAUDE.md
      deps:
        - 1
        - 2
        - 3
        - 4
      done_when:
        - Matrix table lists all 5 Anthropic permission modes × all HtmlGraph guards (always-on vs strict-mode-gated) × resulting behavior.
        - 'Decision tree answers: ''I want to run autonomously and I''m on Max+'' → htmlgraph auto; ''I want to run autonomously without Max+'' → htmlgraph yolo; etc.'
        - PermissionDenied telemetry section explains how to query/view denials.
        - Circuit-breaker behavior, threshold, and reset mechanism documented.
        - AGENTS.md and CLAUDE.md include a one-line pointer to the canonical doc.
        - Cross-links between blog post and dedicated reference doc (per Q-docs-location).
      effort: S
      risk: Low
      tests: |
        Manual: read-through with a fresh user perspective; verify matrix accuracy by cross-referencing slices 1-4.
        Optional automated: a docs-link checker if one is part of CI; otherwise rely on human review at finalize.
      approved: false
      comment: ""
questions:
    - id: q-strict-mode-rename
      text: Should `isYoloFromEvent` be renamed to `isStrictModeFromEvent` (or similar) when extended to recognize `auto`?
      description: |
        Today the function name implies a specific mode (yolo). Extending it to also return true for auto mode arguably misleads readers — yolo is colloquial and historically tied to bypassPermissions. The design critic flagged "extend-only" as the weak option because the function will be wrong 50% of the time once auto ships. Rename adds ~50-100 lines of mechanical churn (a dozen `IsYoloMode` field references plus call sites). We could also defer the rename until a third strict mode appears.
      recommended: rename-now
      options:
        - key: extend-only
          label: 'A: Extend only — keep `isYoloFromEvent` name; add a doc comment explaining it returns true for any strict autonomous mode (yolo OR auto). Lowest blast radius; defers rename until justified by a 3rd mode. Risk: function name actively misleads readers in auto-mode code paths.'
        - key: rename-now
          label: 'B: Rename now — rename to `isStrictModeFromEvent` and `IsStrictMode` across all call sites. Cleanest semantics. Adds ~50-100 lines of mechanical churn to slice 1 but the name is correct for the foreseeable future. Recommended by design critic.'
        - key: dual-helpers
          label: 'C: Dual helpers — keep `isYoloFromEvent` for backwards compat, add `isStrictModeFromEvent` that wraps it + auto check. Avoids churn but bifurcates the concept; future contributors won''t know which to call.'
      answer: null
    - id: q-bash-guard-default-mode
      text: Should the new destructive bash guard hard-block in default mode, or only in strict (yolo/auto) modes?
      description: |
        Patterns like `curl|bash` are dangerous regardless of mode, but a hard-block in default mode would be a behavior change for existing `htmlgraph claude` users. Strict-mode-only is conservative but means non-Max+ users get no deterministic protection unless they opt into yolo. Hard-block-everywhere matches automode's behavior for Max+ users and gives consistent UX. A middle path is to log + show a one-line warning in default mode, hard-block in strict.
      recommended: warn-default-block-strict
      options:
        - key: warn-default-block-strict
          label: 'A: Warn in default, block in strict — non-disruptive for existing default-mode users; deterministic protection in yolo/auto. Matches the layered-defense philosophy. Warning must include the matched pattern category and file:line for actionability.'
        - key: block-everywhere
          label: 'B: Block everywhere — strongest protection; opinionated default; potential breaking change for users with legitimate `curl|bash` workflows (rare in practice but exists).'
        - key: block-strict-only
          label: 'C: Block in strict only, no warn in default — minimal change; users in default mode see no signal. Weakest option; design critic flagged this as effectively no protection for non-Max+ users in default.'
      answer: null
    - id: q-circuit-breaker-reset
      text: How should the consecutive-deny circuit breaker be reset?
      description: |
        Once tripped, the circuit breaker blocks all PreToolUse calls in the session. Options: automatic reset after K minutes of session inactivity, manual reset via a CLI command, reset on next user prompt (UserPromptSubmit hook is already subscribed per manifest.json:69), or hybrid. UserPromptSubmit is natural (user has clearly intervened) but a confused user spamming the same prompt won't be re-blocked until 3 more denials. Hybrid gives best UX but highest implementation cost.
      recommended: hybrid
      options:
        - key: user-prompt
          label: 'A: Reset on next UserPromptSubmit — natural UX; UserPromptSubmit hook is already wired (manifest.json:69, hook.go:53). Risk: spamming same prompt evades safety mechanism.'
        - key: manual-cli
          label: 'B: Manual CLI reset — explicit `htmlgraph session reset-circuit-breaker`. Safest but adds friction; users may not know the command exists.'
        - key: time-window
          label: 'C: Time-window reset — counter only counts denials in last K (e.g. 5) minutes. Self-healing but agents can spin around the window edge.'
        - key: hybrid
          label: 'D: Hybrid — UserPromptSubmit reset + 5-minute time window + manual CLI escape hatch. Best UX safety blend; design critic recommended this. Highest implementation cost but each mechanism is small.'
      answer: null
    - id: q-permission-denied-storage
      text: Add `permission_denied` to the agent_events CHECK enum, or store denials in a separate table?
      description: |
        The agent_events table has a CHECK enum on event_type at TWO synchronized locations (schema.go:124-129 and :494-497). SQLite doesn't support modifying CHECK constraints in-place — adding a new value requires a copy-and-swap migration. The existing `migrateAgentEventsAddCheckConstraint` at schema.go:532 IS the established pattern; this would just be a second invocation with the new enum value. Alternative: a dedicated `permission_denials` table — no migration to existing schema, but slice 4 must JOIN or UNION two tables to count denials.
      recommended: extend-enum
      options:
        - key: extend-enum
          label: 'A: Extend the CHECK enum — single source of truth, simpler queries (slice 4 just queries agent_events), and reuses the proven `migrateAgentEventsAddCheckConstraint` pattern. Migration cost is one-time per database and idempotent via metadata key.'
        - key: separate-table
          label: 'B: Separate `permission_denials` table — no migration to existing schema, but slice 4 must JOIN agent_events for session-aware counts. Bifurcates event data; harder to query in dashboard.'
        - key: relax-check
          label: 'C: Drop the CHECK constraint entirely — most flexible but loses validation; new event_type strings can be inserted accidentally. Design critic flagged this as too permissive.'
      answer: null
    - id: q-docs-location
      text: Where should the mode matrix documentation live?
      description: |
        The yolo blog post (`docs/blog/posts/yolo-mode.md`) already has a yolo-vs-auto comparison. Options: extend that post with an "auto mode" section (keeps comparison together, blog format gets dated), create a dedicated reference doc `docs/permission-modes.md` (canonical, durable, but requires cross-linking), or both. Per CLAUDE.md, docs that influence user-facing behavior should live close to source.
      recommended: dedicated-plus-blog-link
      options:
        - key: dedicated-plus-blog-link
          label: 'A: Dedicated `docs/permission-modes.md` reference + update blog post to link it. Canonical doc lives long; blog stays as the launch announcement. AGENTS.md/CLAUDE.md get one-line pointers.'
        - key: extend-blog
          label: 'B: Just extend `yolo-mode.md` with auto section. Lowest effort; keeps narrative together; doc decays as the blog post ages.'
        - key: agents-md-only
          label: 'C: Document in `AGENTS.md` and `CLAUDE.md` only. Closest to agent eyes but invisible to human users browsing the site.'
      answer: null
    - id: q-worktree-default
      text: Should `htmlgraph auto` mandate a worktree by default (matching yolo), or run in-place?
      description: |
        Feasibility critic flagged this as a HIGH risk: extending `isYoloFromEvent` to return true for auto activates the worktree guard (yolo_guard.go:321,343) — so users launching `htmlgraph auto` on `main` would immediately hit a worktree block on their first Write/Edit. Yolo mandates a worktree because `bypassPermissions` is destructive-by-default and isolation is essential. Auto mode has classifier protection — the worktree may be redundant from a safety standpoint, though still useful for branch isolation. Choices: mandate worktree (consistent with yolo, may surprise auto users), make it opt-in via `--worktree` flag (auto runs in-place by default; classifier handles destructive ops), or make worktree guard mode-aware (mandatory in yolo, off in auto).
      recommended: mandate-worktree
      options:
        - key: mandate-worktree
          label: 'A: Mandate worktree (default on, matches yolo) — consistent UX between strict modes; classifier + worktree = belt-and-suspenders; users on main are forced to pick a feature branch (good discipline). Surfaces a worktree block immediately if user forgets.'
        - key: opt-in
          label: 'B: Opt-in worktree — auto runs in-place by default; users add `--worktree` if they want isolation. Lower friction for one-off auto sessions; relies on classifier to catch destructive ops.'
        - key: mode-aware-guard
          label: 'C: Mode-aware worktree guard — mandatory in yolo (existing behavior preserved), off in auto. Requires reworking the worktree guard to check ctx.PermissionMode rather than ctx.IsYoloMode. Most surgical; biggest blast radius (touches the guard, not just the launcher).'
      answer: null
