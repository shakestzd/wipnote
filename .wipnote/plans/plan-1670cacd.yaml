    - id: slice-10
      num: 10
      title: Parallel stress harness and release gates
      what: |
        Build an end-to-end stress harness and production release gate for the new
        launcher model. The harness layers git-isolation, lineage, and
        parallel-launcher assertions onto the existing SQLite-contention fixture
        (plan-ae0c37b2 slice-10, `cmd/wipnote/sqlite_contention_test.go`,
        feat-156e0a1a) — it does NOT build a standalone contention harness (the
        SQLite-contention dimension is shipped and out of scope here).

        The harness should start multiple fake or real harness sessions in parallel:

        - Claude, Codex, and Gemini roots in one canonical project
        - multiple subagents per root
        - overlapping work-item claims
        - one session resumed/continued
        - one stale collector/worktree scenario
        - one noexec temp-root profile check

        Validate git state, event capture, dashboard APIs, lineage, and cleanup
        commands. Add CI-safe versions using fake harness binaries and mark
        environment-sensitive socket/process tests so they run in the right mode.
      why: |
        The whole feature exists to make parallel agentic development safe. Unit
        tests cannot prove that concurrent CLIs, subagents, collectors, and
        dashboard views coordinate correctly. A stress harness gives production
        deployment a concrete readiness signal.
      files:
        - scripts/stress-launch.sh
        - cmd/wipnote/launch_run_test.go
        - cmd/wipnote/multiharness_test.go
        - cmd/wipnote/api_tree_test.go
        - cmd/wipnote/api_otel_test.go
        - internal/childproc/childproc_test.go
        - .github/workflows/ci.yml
        - docs/runbook/launcher-isolation.md
      deps:
        - 5
        - 7
        - 8
        - 9
      done_when:
        - Stress harness proves local main stays clean while parallel sessions edit isolated branches/worktrees.
        - Dashboard APIs show all parallel root and subagent sessions under one canonical project.
        - Lineage output links work item, root session, subagents, branches/worktrees, and commits.
        - CI and release runbooks include a small production acceptance harness and a documented larger stress harness.
        - Environment-sensitive socket/process tests declare the profile they require and use exec-capable temp roots.
        - Git-isolation and lineage assertions build on (not duplicate) the contention fixture from plan-ae0c37b2 slice-10.
      effort: L
      risk: High
      tests: |
        Unit: fake harness helpers cover deterministic event emission and exit modes.
        Integration: TestParallelLauncherIsolation starts multiple harness roots and validates git/dash/lineage state.
        Regression: full Go quality gates pass in an exec-capable environment.
        Manual: pre-release run of stress-launch against devcontainer and host profiles.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
