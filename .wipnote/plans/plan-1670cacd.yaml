          severity: MED
          summary: Split release validation into a practical production acceptance harness plus a broader stress harness.
        - source: observability-critique
          severity: LOW
          summary: Include temp-root execution policy in stress/profile validation so noexec mounts do not masquerade as launcher failures.
questions:
    - id: q-default-policy
      text: What should be the initial rollout default for isolated worktree launches?
      description: |
        Immediate default maximizes safety but may surprise existing users. A warning-only release reduces surprise but allows divergence to continue.
      recommended: config-gated-default
      options:
        - key: config-gated-default
          label: Config-gated default — enable in devcontainer/local dev first, warn elsewhere
        - key: immediate-default
          label: Immediate default — all mutating launches use managed worktrees unless --in-place
        - key: warning-only
          label: Warning-only — detect dirty main but do not change launch location
      answer: config-gated-default
    - id: q-claim-collisions
      text: How should simultaneous claims on one work item behave?
      description: |
        Parallel CLIs may intentionally collaborate on a feature, but accidental duplicate claims should be visible before two agents edit the same surface.
      recommended: warn-and-record-collaboration
      options:
        - key: warn-and-record-collaboration
          label: Warn and record collaboration — visible collision, no hard block
        - key: hard-exclusive
          label: Hard exclusive — block second mutating launcher unless forced
        - key: allow-silent
          label: Allow silently — attribution only, no collision UX
      answer: warn-and-record-collaboration
    - id: q-session-continuity
      text: Should session continuity use `session_family_id` or existing `continued_from`?
      description: |
        A new family id is explicit and dashboard-friendly. Reusing continued_from is smaller but may make root-family grouping harder for parallel resumes.
      recommended: session-family-id
      options:
        - key: session-family-id
          label: Add session_family_id — explicit root grouping
        - key: continued-from-only
          label: Use continued_from only — minimal schema change
      answer: session-family-id
