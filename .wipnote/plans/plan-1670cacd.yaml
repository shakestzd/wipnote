meta:
    id: plan-1670cacd
    track_id: trk-a30e8df4
    title: Launcher isolation, deployment modes, and parallel attribution
    description: |
        Design production-ready launcher isolation across Claude, Codex, and Gemini: default branch/worktree behavior, devcontainer versus host deployment modes, and robust attribution/event capture for parallel CLIs and subagents.
    created_at: "2026-05-08"
    status: finalized
    created_by: codex
    version: 6
design:
    problem: |
        wipnote can currently launch multiple AI CLIs directly from a mutable checkout. That is convenient, but it allows long-running local stacks, generated plugin changes, work-item bookkeeping, and merged upstream work to accumulate on local main. The result is avoidable divergence, hard-to-review commits, and fragile reconciliation after PR merges. The obvious fix is to launch mutating sessions in isolated branches or worktrees by default, but that changes the shape of project identity, session continuity, active-session fallback state, event capture, subagent attribution, and dashboard grouping. The design must also account for the difference between production host installs and devcontainer sessions, where ports, bind addresses, filesystem permissions, plugin paths, and temp execution policy differ.
        Note: collector/event-writer concurrency (parallel NDJSON flush, SQLite busy-timeout hardening, indexer checkpoint monotonicity) is owned and solved by plan-ae0c37b2's single-writer queue (`internal/db/writequeue/`); not in scope here.
    goals:
        - '**Protect main** — mutating Claude, Codex, and Gemini sessions do not dirty or diverge local main by default.'
        - '**Preserve observability** — dashboard sessions, event trees, NDJSON, SQLite indexes, and lineage remain grouped under one canonical project even when execution happens in worktrees.'
        - '**Coordinate parallelism** — multiple CLIs and their subagents can run concurrently in the same project without clobbering attribution, active-session fallback state, collectors, branch names, or work-item claims.'
        - '**Deploy safely** — host installs, devcontainers, local plugin development, and production launcher paths have explicit mode detection, defaults, and test coverage.'
        - '**Migrate incrementally** — existing yolo/worktree helpers, session rows, and dashboard APIs are reused and hardened without breaking current users.'
        - '**Feed visibility surfaces** — launcher/session/claim identity becomes the substrate consumed by cross-session file visibility and Kanban work-board status in plan-c3bbb1ed.'
    constraints:
        - 'Canonical project identity must remain the main repo root containing .wipnote, not an arbitrary linked worktree path. DELIVERED SUBSTRATE: write-time path normalization for storage is enforced by plan-2133adf2 (paths.NormalizeToRepoRelative, ResolveViaGitCommonDir); this plan scope is launcher-side env construction (slice-3).'
        - Fresh worktrees are execution directories only; event storage and dashboard project grouping stay anchored to the canonical root.
        - The launcher must offer an explicit in-place escape hatch for intentional local-main work.
        - 'Branch naming must remain compatible with existing work-item completion and lineage conventions until explicit metadata replaces branch-name inference. DELIVERED SUBSTRATE: branch-name-completion transition is delivered by plan-83f909bc slice-3 provenance gate (feat-7b593272); this plan does not re-implement it.'
        - Devcontainer defaults must bind dashboard services to 0.0.0.0:8088, while host installs keep the production default of 127.0.0.1:8080.
        - 'No implementation slice may rely solely on global mutable fallback files when parallel CLI sessions are expected. DELIVERED SUBSTRATE: SQLite single-writer contention is solved by plan-ae0c37b2 single-writer queue; this plan does not re-implement it.'
        - Dashboard work-board and wipnote who visibility belong in plan-c3bbb1ed, but this plan must expose the stable identity/claim/session fields those views consume.
        - 'Cross-plan provenance: slice-3 depends on plan-2133adf2 (feat-edbc978b, feat-3973e948); slice-5 depends on plan-83f909bc (feat-7b593272); slices 9/10 depend on plan-ae0c37b2 (feat-2c631aa9, feat-156e0a1a, feat-f3bcbcef).'
        - 'Surviving critical path: slice-1 (launcher mode contract) -> slice-2 (gated worktree launch) -> slice-4 (session-family). Slices 1, 4, and 8 are kept unchanged in intent.'
    approved: true
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-d0c910ec
      num: 1
      title: Launcher mode contract and environment detection
      what: |
        Define a shared launcher mode contract used by Claude, Codex, Gemini, yolo,
        and dashboard terminal launch paths. Add an `internal/launcher/mode` package
        or equivalent small helper that computes:

        - execution mode: `isolated-worktree`, `in-place`, or `read-only`
        - runtime mode: `host`, `devcontainer`, or `ci`
        - plugin mode: `installed`, `local-dev`, or `generated-port`
        - dashboard bind defaults for the runtime mode
        - temp execution policy for tests and helper subprocesses

        Wire the helper into launcher preflight code without changing default
        behavior yet. Emit a structured plan/preview object for callers so later
        slices can switch defaults safely.
      why: |
        The branch/worktree policy should not be duplicated independently in every
        harness launcher. A shared contract lets production deployment, devcontainer
        behavior, and tests reason from the same inputs before any risky default
        changes are introduced.
      files:
        - internal/launcher/mode/mode.go
        - internal/launcher/mode/mode_test.go
        - cmd/wipnote/claude.go
        - cmd/wipnote/codex.go
        - cmd/wipnote/gemini.go
        - cmd/wipnote/yolo.go
      deps: []
      done_when:
        - A shared helper reports launcher execution/runtime/plugin mode without mutating the repository.
        - Claude, Codex, Gemini, and yolo launchers can log or expose the computed mode in dry/preflight paths.
        - Devcontainer mode selects bind default 0.0.0.0:8088 while host mode selects 127.0.0.1:8080.
        - Existing launcher behavior remains unchanged until later slices explicitly flip defaults.
      effort: M
      risk: Med
      tests: |
        Unit: TestDetectRuntimeMode_HostDevcontainerCI covers marker files and env vars.
        Unit: TestDashboardBindDefaults covers host versus devcontainer bind/port.
        Regression: existing launcher command construction tests still pass.
        Integration: a launcher preflight test asserts all three harnesses return a mode object without starting a CLI.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: promoted
      questions:
        - id: q-devcontainer-detect
          text: Which signal should define devcontainer mode?
          description: Reusing the existing detector keeps the contract consistent with dashboard bind-address resolution already in production.
          recommended: reuse-existing-detector
          options:
            - key: reuse-existing-detector
              label: Reuse existing detector — /.dockerenv, CODESPACES, REMOTE_CONTAINERS (already in defaultDevcontainerDetector)
            - key: explicit-env-override
              label: Explicit env var — WIPNOTE_LAUNCH_MODE=devcontainer overrides auto-detect
            - key: filesystem-probe
              label: Filesystem probe — check for .devcontainer/ directory in repo root
    - id: slice-2
      feature_id: feat-47997082
      num: 2
      title: Gated isolated worktree launch plumbing and dirty-main guard
      what: |
        Add the launch planning and guard machinery needed for mutating launchers
        to run in managed worktrees, but do not flip host production defaults
        unconditionally in this slice. For devcontainer/local-dev profiles the
        plan may default to managed worktrees behind an explicit config gate; for
        host production profiles it starts as warn-only until doctor/migration and
        session-family hardening have landed.

        Note: `wipnote yolo` already implements worktree-per-track/feature with
        `--no-worktree` (`cmd/wipnote/yolo.go`). This slice generalizes that model
        to claude/codex/gemini and adds the dirty-main guard — it does not build
        worktree plumbing from scratch.

        Reuse existing `internal/worktree` and command-level worktree helpers.
        Add explicit flags:

        - `--worktree` / `--no-worktree`
        - `--in-place` as an alias for intentional local checkout mutation
        - `--base <branch>` for advanced users
        - `--work-item <id>` as a harness-neutral spelling for feature/bug/track

        Add a dirty-main guard that explains the managed-worktree recommendation
        and refuses mutating in-place launch only when the configured rollout mode
        says enforcement is enabled. The mode contract must record whether the
        launch used isolation, warn-only, or explicit in-place override.
      why: |
        This introduces the main divergence prevention mechanism without
        surprising host users before migration tooling exists. It keeps local main
        able to fast-forward in gated environments and gives production users a
        visible warning path before enforcement.
      files:
        - internal/worktree/worktree.go
        - cmd/wipnote/worktree_helpers.go
        - cmd/wipnote/claude.go
        - cmd/wipnote/codex.go
        - cmd/wipnote/gemini.go
        - cmd/wipnote/yolo.go
        - cmd/wipnote/terminal_handlers.go
      deps:
        - 1
      done_when:
        - Launcher planning can select managed-worktree, warn-only, or explicit in-place mode from profile/config.
        - Devcontainer/local-dev profiles can opt into managed-worktree defaults without changing host production defaults.
        - Launching with `--in-place` preserves existing behavior and records that the user opted out of isolation.
        - Dirty protected branches produce a clear warning or refusal according to rollout mode.
        - Worktree branch names remain deterministic and compatible with existing work-item branch conventions.
      effort: L
      risk: High
      tests: |
        Unit: TestLauncherPlan_DefaultsToWorktreeOnMain validates command planning without starting a harness.
        Unit: TestLauncherPlan_InPlaceEscapeHatch validates explicit in-place mode.
        Integration: TestWorktreeLaunch_PreservesCanonicalRoot starts a fake harness in a managed worktree.
        Regression: existing yolo worktree reuse and branch-already-exists tests still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: promoted
      questions:
        - id: q-default
          text: Should host production start in warn-only mode while devcontainer/local-dev starts config-gated worktree-by-default?
          description: Matches the surviving critical path (slice-1→2) and the deployment-critique that forbids flipping host defaults before migration tooling exists.
          recommended: yes-as-framed
          options:
            - key: yes-as-framed
              label: Yes — host production warn-only, devcontainer/local-dev config-gated worktree-by-default
            - key: worktree-everywhere
              label: Worktree-by-default everywhere — all mutating launches isolated immediately
            - key: warn-only-everywhere
              label: Warn-only everywhere — detect dirty main but never change launch location
      critic_revisions:
        - source: deployment-critique
          severity: HIGH
          summary: Do not flip host launcher defaults before doctor/migration tooling exists; make this slice config-gated and warn-only for host profiles.
        - source: observability-critique
          severity: HIGH
          summary: Do not enforce fresh-worktree defaults before canonical identity and per-session fallback/session-family hardening are available.
    - id: slice-3
      feature_id: feat-6164aa2d
      num: 3
      title: Canonical project identity across worktrees
      what: |
        Scope: launcher-side env construction only. When a harness is launched from
        a managed worktree, ensure `WIPNOTE_PROJECT_DIR` is set to the canonical
        main repo root (not the worktree path) by consuming the existing
        `internal/paths` normalizer (`paths.NormalizeToRepoRelative`,
        `ResolveViaGitCommonDir`) when constructing launcher env for worktree
        launches.

        Do NOT introduce a parallel identity type (`ProjectIdentity{CanonicalRoot,
        ExecutionRoot}` or equivalent). The write-time path normalization for
        `sessions.project_dir`, DB cache keys, NDJSON event paths, SQLite
        cache-key normalization, and divergence-guard canonical comparison are
        delivered by plan-2133adf2 slices 1 and 4 (feat-edbc978b, feat-3973e948).
        This slice's boundary is strictly the launcher env construction step that
        ensures downstream hook/storage code receives the right canonical root in
        the environment.
      why: |
        Worktree-per-launch is safe only if worktrees do not become separate
        projects. Plan-2133adf2 delivers the storage/write-time normalization;
        this slice closes the remaining gap in launcher env construction so that
        `WIPNOTE_PROJECT_DIR` is correct before any hook or collector starts.
      files:
        - cmd/wipnote/claude.go
        - cmd/wipnote/codex.go
        - cmd/wipnote/gemini.go
        - cmd/wipnote/yolo.go
      deps:
        - 1
        - 2
      done_when:
        - All harness launchers set `WIPNOTE_PROJECT_DIR` to the canonical root resolved via `paths.ResolveViaGitCommonDir` when the CWD is a linked worktree.
        - No new `ProjectIdentity` type or parallel identity abstraction is introduced; existing `internal/paths` normalizers are reused.
        - Existing project resolution and cache path tests still pass.
      effort: S
      risk: Med
      tests: |
        Unit: TestLauncherEnv_WorktreeCanonicalRoot verifies WIPNOTE_PROJECT_DIR resolves to main repo root when CWD is a linked worktree.
        Regression: existing project resolution and cache path tests still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: promoted
    - id: slice-4
      feature_id: feat-a225ce7c
      num: 4
      title: Session-family continuity and per-session fallback state
      what: |
        Replace the project-global active-session fallback with a concurrency-safe
        session-family model.

        Add or wire:

        - `session_family_id` or robust use of existing `continued_from`
        - per-session fallback files under `.wipnote/sessions/<session_id>/`
        - a project-level index of active session families instead of one
          `.active-session` last-writer-wins file
        - harness-neutral resume correlation for Claude, Codex, and Gemini
        - persisted launcher-session to harness-session bridges for all three
          launchers, not just Claude's Rosetta event path

        Keep backward compatibility for old `.active-session` reads during a
        migration window, but prefer per-session state when present.
      why: |
        Parallel CLI sessions and subagents cannot rely on one global active
        session file. The dashboard needs continuity across resumes and child
        sessions, while hooks need a stable fallback identity when harness-specific
        env propagation is incomplete.
      files:
        - internal/models/session.go
        - internal/db/session_repo.go
        - internal/db/schema.go
        - internal/hooks/session_start.go
        - internal/hooks/runner.go
        - internal/hooks/subagent_start.go
        - cmd/wipnote/api_tree.go
        - cmd/wipnote/api_otel.go
      deps:
        - 3
      done_when:
        - Parallel root sessions no longer overwrite one another's fallback identity.
        - Claude, Codex, and Gemini launchers each persist resume/continue linkage into a harness-neutral session family field.
        - Old `.active-session` fallback remains readable but is no longer the primary parallel-session mechanism.
        - Dashboard event tree can group by session family when requested while preserving per-session drilldown.
      effort: L
      risk: High
      tests: |
        Unit: TestActiveSessionIndex_ParallelFamilies verifies two roots can coexist.
        Unit: TestSessionFamily_ContinuedFrom links resumed sessions without relying on harness-specific IDs.
        Integration: TestEventTree_SessionFamilyGrouping creates root plus subagent sessions and asserts tree continuity.
        Regression: existing Claude Rosetta session_start behavior still works.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: promoted
      questions:
        - id: q-family-field
          text: Should we add `session_family_id` or standardize on existing `continued_from`?
          description: continued_from is a single-parent FK (internal/models/session.go:40, internal/db/schema.go:159) insufficient for N-session family grouping; session_family_id does not exist anywhere in the codebase.
          recommended: add-session-family-id
          options:
            - key: add-session-family-id
              label: Add session_family_id — explicit root grouping for N parallel/resumed sessions
            - key: reuse-continued-from
              label: Reuse continued_from — minimal schema change, single-parent link only
            - key: hybrid
              label: Hybrid — derive family_id transitively from continued_from at query time
      critic_revisions:
        - source: observability-critique
          severity: HIGH
          summary: Specify concrete Codex and Gemini resume/family write paths; dashboard inference alone would leave session continuity harness-skewed.
    - id: slice-5
      num: 5
      title: Parallel attribution and claim coordination
      what: |
        Harden work-item attribution for concurrent parallel root CLIs and their
        simultaneous subagents. Scope is limited to:

        - concurrent claim collision-vs-collaboration UX when two root CLI sessions
          claim the same work item simultaneously
        - subagent out-of-order attribution: hook handlers write best-effort events
          even when parent records arrive later
        - identity/claim fields exported for plan-c3bbb1ed: claim owner, session
          family, harness, work item, and execution root exposed in /api/features,
          `wipnote who`, Kanban cards, and dashboard session/file panels

        Out of scope (delivered by other plans):
        - Branch-name-completion transition: delivered by plan-83f909bc slice-3
          provenance gate (feat-7b593272); completion no longer requires branch-name
          inference is already true post plan-83f909bc.
        - Dedup and reconcile concerns: delivered by plan-83f909bc slices 5/6
          (feat-f93fe770 `wipnote reconcile`); do not re-implement here.

        Prefer existing claim machinery and lineage edges. Claude TaskCreated/
        TaskCompleted, Codex TaskStarted/TaskComplete, and Gemini tool/session
        events must either map into the same canonical step/progress fields when a
        work item is active or be explicitly reported as unsupported so the
        dashboard does not imply live step tracking.
      why: |
        Worktree isolation prevents git conflicts, but it does not solve
        attribution conflicts. Parallel Claude, Codex, and Gemini sessions can all
        spawn agents at once. The system needs to know who owns which work, how
        child sessions relate to roots, and whether simultaneous claims are
        intentional collaboration or accidental collision.
      files:
        - internal/workitem/claim.go
        - internal/db/claim_repo.go
        - internal/db/lineage_repo.go
        - internal/hooks/subagent_start.go
        - internal/hooks/missing_events.go
        - internal/hooks/posttooluse.go
        - cmd/wipnote/claim.go
        - cmd/wipnote/lineage.go
      deps:
        - 4
      done_when:
        - Two root CLI sessions claiming the same work item produce a visible collision or collaboration state.
        - Subagent events retain parent/session/work-item attribution even when event ordering is out of order.
        - Lineage output shows root CLI, child agents, branch/worktree, commits, and work item in one chain.
        - Claim/collaboration state is available to `wipnote who`, /api/features, Kanban cards, and dashboard session/file panels.
        - Step/task lifecycle events are attributed to session family, work item, and harness, or a visible unsupported-state is available per harness.
      effort: L
      risk: High
      tests: |
        Unit: TestClaimCollisionPolicy covers exclusive and collaborative claim modes.
        Unit: TestSubagentAttribution_OutOfOrderParent preserves child events before parent insert.
        Integration: TestParallelHarnessClaims starts fake Claude/Codex/Gemini roots against one work item and asserts lineage.
        Regression: existing `wipnote lineage`, `trace`, and `history` tests still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      questions:
        - id: q-claim-policy
          text: Should same-work-item parallel sessions be blocked by default, warned, or allowed as collaboration?
          description: Consistent with top-level q-claim-collisions answer and slice-5 scope; a hard block would prevent intentional parallel collaboration which is a core use case.
          recommended: warn-and-allow-collaboration
          options:
            - key: warn-and-allow-collaboration
              label: Warn and allow — visible collision with attribution, no hard block; second claimant recorded with timestamp
            - key: hard-exclusive-lock
              label: Hard exclusive — block second mutating session unless --force-claim is passed
            - key: allow-silent
              label: Allow silently — attribution only, no collision UX
      critic_revisions:
        - source: observability-critique
          severity: MED
          summary: Tighten transition away from branch-name completion; metadata-based completion must be live before arbitrary fresh-worktree branch names are allowed.
        - source: codex
          severity: MED
          summary: Cross-session visibility plan plan-c3bbb1ed consumes claim/session/step identity here; slice now exports those fields explicitly for `wipnote who`, /api/features, and Kanban.
    - id: slice-7
      num: 7
      title: Dashboard worktree/session-family UX
      what: |
        Update dashboard APIs and UI to make isolation visible without fragmenting
        the project view. Add API fields and UI affordances for:

        - canonical project root versus execution worktree
        - branch/work-item/session-family badge on active sessions
        - collision or collaboration status for work-item claims
        - stale collector and stale worktree warnings (collector/stale warnings are
          framed around plan-ae0c37b2's writer-queue and collector-status APIs,
          not the deleted slice-6 assumptions)
        - filters by harness, work item, branch, session family, and execution root
        - explicit default grouping semantics for sessions list, activity feed,
          and event tree: canonical project first, session family second,
          individual session drilldown third
        - Work/Kanban board identity fields consumed by plan-c3bbb1ed: active
          CLI/session/model on cards, step progress, conflict/overlap status,
          recently moved/reassigned markers, and track-level active/stale/
          collision counts

        Keep the first screen operational, not explanatory: the dashboard should
        show what is running, where it is running, what it is editing, what work
        item it belongs to, and why it is attributed there. Full file-overlap and
        Kanban rendering behavior is delivered by plan-c3bbb1ed; this slice
        guarantees the launcher/session-family API fields are available.
      why: |
        Isolation only helps if the operator can see it. When several CLIs and
        subagents run in parallel, the dashboard must answer "which branch,
        worktree, session, and work item does this activity belong to?" without
        forcing users to inspect git state manually.
      files:
        - cmd/wipnote/api.go
        - cmd/wipnote/api_feed.go
        - cmd/wipnote/api_tree.go
        - cmd/wipnote/api_otel.go
        - cmd/wipnote/dashboard/js/app.js
        - cmd/wipnote/dashboard/components/event-tree.js
        - cmd/wipnote/dashboard/css/components.css
      deps:
        - 4
        - 5
      done_when:
        - Dashboard active sessions display harness, canonical project, execution root, branch/worktree, work item, and session family.
        - Sessions list, activity feed, and event tree have documented defaults for project/family/session grouping.
        - Claim collisions and stale collectors are visible as operational warnings (sourced from plan-ae0c37b2 writer-queue and collector-status APIs).
        - Dashboard APIs expose the stable session-family, claim, and execution-root fields needed by plan-c3bbb1ed Kanban and `wipnote who` views.
        - Work/Kanban board API payloads can associate each active work item with owner session, harness/model, claim/collision state, and execution root.
        - Existing single-session dashboard views remain readable and unchanged in normal host installs.
      effort: L
      risk: Med
      tests: |
        Unit: TestSessionsAPI_IncludesExecutionRootAndFamily validates response fields.
        Unit: dashboard JS component tests render worktree/session-family badges without layout overflow.
        Integration: TestDashboardParallelSessionsAPI builds a fake multi-harness event graph.
        Regression: existing activity feed and event-tree tests still pass.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      critic_revisions:
        - source: observability-critique
          severity: MED
          summary: Pin down dashboard grouping semantics and required API fields instead of leaving family grouping as an optional view.
        - source: codex
          severity: MED
          summary: Dashboard UX now reserves the Work/Kanban identity data contract consumed by plan-c3bbb1ed, while leaving detailed card rendering to that visibility plan.
    - id: slice-8
      num: 8
      title: Host, devcontainer, and production deployment profiles
      what: |
        Add explicit deployment profile plumbing for launcher isolation:

        - host production install
        - devcontainer development
        - local plugin development via `wipnote codex --dev` and equivalents
        - CI/test mode

        Define per-profile defaults for dashboard bind/port, plugin source,
        generated port rebuilds, cache location, temp execution root, worktree
        root, cleanup behavior, and rollout mode. Add only the docs needed to make
        this behavior reviewable; full runbook and migration documentation are
        completed in the migration slice.
      why: |
        A safe launcher default in a devcontainer can be wrong on a host install.
        The product needs clear deployment behavior so isolation does not break
        production users, and production deployment does not accidentally depend
        on devcontainer-only paths or volumes.
      files:
        - .devcontainer/devcontainer.json
        - .devcontainer/README.md
        - install.sh
        - scripts/deploy-all.sh
        - scripts/devcontainer-verify.sh
        - packages/plugin-core/README.md
        - docs/reference/cli.md
        - README.md
      deps:
        - 1
        - 2
        - 3
      done_when:
        - Profile plumbing distinguishes host versus devcontainer dashboard defaults and launcher behavior.
        - Install/deploy scripts do not require devcontainer-only paths or assumptions.
        - Devcontainer verification checks launcher mode, port convention, and exec-capable temp root.
        - Host production remains warn-only/config-gated until migration tooling and release runbooks are present.
        - Devcontainer bind-default selection (0.0.0.0:8088) is consistent with plan-ae0c37b2 slice-4's `wipnote status` fstype/journal-mode diagnostics; this profile output does not duplicate that status output.
      effort: M
      risk: Med
      tests: |
        Unit: script shell checks for devcontainer and deploy scripts.
        Integration: TestLauncherProfiles validates host/devcontainer/CI profile outputs.
        Regression: plugin build ports still produce Claude, Codex, and Gemini artifacts.
        Manual: run devcontainer verification and host `wipnote serve` smoke test before release.
      approved: false
      comment: ""
      approval_status: pending
      execution_status: not_started
      questions:
        - id: q-rollout
          text: Should production releases flip the worktree default immediately or ship warning-only first?
          description: Staged rollout matches q-default and the deployment-critique gating requirement that doctor/migration tooling must exist before host defaults are enforced.
          recommended: staged-rollout
          options:
            - key: staged-rollout
              label: Staged — warn-only first, then config-gated opt-in, then default-on after doctor gate passes
            - key: immediate-flip
              label: Immediate flip — worktree default on in first release
            - key: opt-in-only
              label: Opt-in only — never flip default; users must set config explicitly
      critic_revisions:
        - source: deployment-critique
          severity: MED
          summary: Keep behavior/profile plumbing separate from full documentation and release runbooks so rollout gates are reviewable.
    - id: slice-9
      num: 9
      title: Migration, cleanup, and compatibility tooling
      what: |
        Add migration and cleanup commands for users with existing divergent local
        main states and stale worktrees.

        `wipnote launcher doctor` is the primary deliverable. It:
        - detects local main ahead/behind origin with dirty worktree
        - lists stale managed worktrees and provides safe prune guidance
        - reports launcher/worktree-divergence diagnostics (canonical root mismatch,
          split canonical root across sessions)
        - delegates orphan-session cleanup to `wipnote cleanup orphan-sessions`
          (delivered by plan-ae0c37b2 slice-11, feat-2c631aa9 — do not re-implement)
        - delegates session-exit reconciliation to `wipnote reconcile`
          (delivered by plan-83f909bc slice-5, feat-f93fe770 — do not re-implement)
        - adds only launcher/worktree-divergence diagnostics on top of the
          delegated commands
        - prints non-destructive remediation steps by default
        - provides compatibility handling for old sessions without session families
        - contains the rollout gate that allows host production to move from
          warn-only to worktree-by-default once doctor checks pass

        Out of scope (shipped):
