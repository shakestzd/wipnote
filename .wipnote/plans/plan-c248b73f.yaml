    risks:
        - risk: Env var hypotheses (CODEX_SESSION_ID etc) are unverified — runtime detection may silently return human
          severity: High
          mitigation: 'Slice 2 PRECONDITION: capture live sessions and inspect printenv before writing detect.go. Fall back to parent-process-name heuristic if env vars are missing. Add htmlgraph doctor command for debugging'
        - risk: MCP Go library decision blocks slice 3 — no existing dependency, building from scratch is significant work
          severity: High
          mitigation: 'Slice 3 PRECONDITION: ADR-style decision recorded before implementation. Vet mark3labs/mcp-go OR scope from-scratch effort honestly (likely 500-800 LOC of framing/handlers)'
        - risk: Schema migration pattern mismatch — plan referenced non-existent migrations/ dir
          severity: Medium
          mitigation: Fixed in slice 1 file list — uses inline ALTER TABLE in internal/db/schema.go per existing pattern
        - risk: Real session fixtures not scheduled as their own task — slices 4 and 5 implicitly depend on capturing them
          severity: Medium
          mitigation: Both slices now have explicit PRECONDITION done_when items requiring fixture capture and CONTRIBUTING.md procedure
        - risk: MCP versioning will rot if tool signatures change without negotiation
          severity: Medium
          mitigation: 'Slice 3 PRECONDITION: schema_version handshake; tool signatures immutable within major version'
        - risk: Codex hook matchers are doc-fragile — silent miss if Codex adds new SessionStart variants
          severity: Low
          mitigation: Slice 6 test enumerates known matchers; fail loudly on drift. Link to Codex hook docs in code comments
        - risk: .codex/config.toml [features] codex_hooks=true may interact with danger-full-access in unexpected ways
          severity: Low
          mitigation: Slice 6 manual smoke test with both flags set before commit
        - risk: Copilot session-state format may include binary assets or VS Code-specific layouts — parser scope explosion
          severity: Medium
          mitigation: Slice 5 PRECONDITION captures real session and documents format BEFORE parser is written
    synthesis: |
        The plan is architecturally sound — single foundation, per-runtime packaging on top, honest support matrix. Critique surfaced four classes of issues, all addressed in the revised YAML:
        1. UNVERIFIED ASSUMPTIONS — env var names, MCP library availability, session storage paths.
           Each is now an explicit PRECONDITION done_when in the affected slice rather than a silent assumption.

        2. CODEBASE PATTERN MISMATCH — migrations/ directory doesn't exist; slice 1 file list and column-vs-reuse
           decision corrected. Skill name corrected.

        3. UNDER-RATED RISKS — slice 2 Low→Med (env var verification can fail), slice 3 Med→High (greenfield MCP).
        4. DEFERRED SCOPE MADE EXPLICIT — cross-runtime session continuity declared OUT OF SCOPE for v1 in
           design.constraints rather than left ambiguous.

        No slices were dropped or renumbered. No new slices added (fixture capture is folded into the affected slice's preconditions rather than spawning a separate slice). The Q2/slice 3 contradiction is resolved by adding a NOTE to slice 3 stating that file-list assumes the recommended option and must be revised if Q2 is overridden.
        Three remaining gaps were deliberately NOT addressed in this revision because they are scope expansions rather than corrections: cross-runtime session linking (now explicitly deferred), telemetry/error reporting for hook/MCP failures (worth a follow-up plan), and CLI/plugin version drift (worth a follow-up). These should be tracked as separate features after v1 ships.
