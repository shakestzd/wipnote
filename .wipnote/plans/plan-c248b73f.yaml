questions:
    - id: q-runtime-package-layout
      text: Where should each runtime's packaging tree live?
      description: |
        Each input plan picked a different convention. The Codex plan proposes plugins/htmlgraph-codex/. The Copilot plan proposes packages/copilot-plugin/ AND repo-local .github/. The Gemini plan proposes packages/gemini-extension/. We can pick one convention for all three (cleaner), or honor each runtime's idiom (more native-feeling per-runtime). Mixing conventions makes the repo harder to navigate but matches each ecosystem's docs.
      recommended: hybrid-by-distribution
      options:
        - key: unified-plugins-dir
          label: 'All under plugins/: plugins/htmlgraph-codex/, plugins/htmlgraph-gemini/, plugins/htmlgraph-copilot/ — symmetric, easy to script across, but conflicts with Gemini''s packages/ idiom and Copilot''s .github/ repo-local'
        - key: unified-packages-dir
          label: 'All under packages/: packages/codex-plugin/, packages/gemini-extension/, packages/copilot-plugin/ — matches the Gemini and Copilot plans, but conflicts with the Codex plan''s plugins/ suggestion'
        - key: hybrid-by-distribution
          label: 'Hybrid (RECOMMENDED): plugins/<runtime>/ for distributable bundles + .github/ and .codex/ for repo-local dogfooding. Three distribution dirs share the plugins/ prefix; repo-local files live where each runtime''s docs say they should'
        - key: native-per-runtime
          label: 'Each runtime uses its own native location: .codex/, .github/, .gemini/ — minimal but fragments distribution and makes shared CI scripts harder'
      answer: null
    - id: q-mcp-binary-shape
      text: How should the MCP server be packaged and invoked?
      description: |
        Codex and Copilot both want the MCP server to be the structured tool layer. We can either build it into the existing htmlgraph binary as htmlgraph mcp serve (zero new install steps, but couples MCP to every CLI release), or ship a separate htmlgraph-mcp binary (cleaner separation, but two binaries to install). The constraint says one binary is preferred, but ask before locking in.
      recommended: subcommand
      options:
        - key: subcommand
          label: 'Subcommand of htmlgraph (RECOMMENDED): htmlgraph mcp serve — zero new install, single binary, MCP versioning tracks CLI versioning. Plugin .mcp.json files reference the existing binary'
        - key: separate-binary
          label: Separate htmlgraph-mcp binary — cleaner separation of concerns, can ship MCP-only updates independently, but doubles the install footprint and requires plugin install to fetch a second artifact
        - key: library-only
          label: Library only, no built-in server — provide an internal/mcp/ package and let downstream embedders run their own. Minimal but pushes work to every plugin
      answer: null
    - id: q-cloudevent-refactor
      text: How should the CloudEvent struct be generalized for non-Claude runtimes?
      description: |
        internal/hooks/runner.go CloudEvent has Claude-shaped fields (PermissionMode, Source values like compact, AgentType). We can either (a) generalize the struct itself by adding a Runtime field and making Claude-specific fields optional, (b) keep CloudEvent as Claude's shape and add per-runtime structs that the host adapter converts into a generic envelope, or (c) keep CloudEvent as the lingua franca and let runtime adapters lossy-convert into it. Option (c) is cheapest but loses runtime-specific signal that the dashboard might want later.
      recommended: generalize-with-optional
      options:
        - key: generalize-with-optional
          label: 'Generalize CloudEvent in place (RECOMMENDED): add Runtime field, mark Claude-specific fields as optional/nullable. Single struct, downstream code reads Runtime to know which optionals are populated. Lowest churn'
        - key: per-runtime-structs
          label: 'Per-runtime structs + generic envelope: each runtime has its own typed struct, host.Normalize() converts to a thin generic envelope. Cleaner type safety but doubles the type surface area'
        - key: lossy-conversion
          label: 'Keep CloudEvent as-is, runtimes lossy-convert: simplest, no struct changes, but loses runtime-specific data the dashboard could surface later'
      answer: null
    - id: q-gemini-slash-commands
      text: Should we port the 6 Claude slash commands to Gemini TOML, or skip them?
      description: |
        The Gemini input plan explicitly lists translating /htmlgraph:start, :status, :plan, :spike, :recommend, :end into TOML commands. The Codex and Copilot plans both say slash-command parity with Claude is the wrong target — skills are the better Codex/Copilot abstraction. Gemini is different: its CLI prominently features TOML slash commands as a first-class UX. So Gemini may genuinely want them, while Codex and Copilot do not.
      recommended: gemini-yes-others-no
      options:
        - key: gemini-yes-others-no
          label: Gemini gets all 6 slash commands; Codex and Copilot get skills only (RECOMMENDED). Honors each runtime's idiomatic UX. Slice 8 includes them; slices 7 and 9 don't
        - key: skills-everywhere
          label: 'Skills only across all runtimes — drop the Gemini slash commands per the Codex/Copilot guidance. Risk: Gemini users miss the most discoverable surface their CLI offers'
        - key: slash-commands-everywhere
          label: Port all 6 commands to all 3 runtimes — most consistent for users juggling multiple CLIs, but contradicts the Codex and Copilot plans' explicit guidance
      answer: null
    - id: q-test-fixture-strategy
      text: Where do real captured runtime sessions for tests come from?
      description: |
        Slices 4 and 5 require fixtures of real Codex and Copilot session transcripts to test the parsers. We can either (a) commit captured sessions under testdata/ (real signal but may include private text), (b) generate synthetic minimal fixtures that match the documented schema (no privacy concerns but may diverge from reality), or (c) use a hybrid: synthetic for unit tests, gitignored real fixtures for manual smoke. The Codex plan emphasizes ingest one real Codex session end-to-end as Milestone 1's success criterion, which implies (a) or (c).
      recommended: hybrid
      options:
        - key: hybrid
          label: 'Hybrid (RECOMMENDED): synthetic minimal fixtures committed under testdata/ for unit tests + a documented procedure to capture real sessions locally for manual smoke. Best of both'
        - key: real-only
          label: Commit real captured sessions — strongest signal that the parser handles reality, but every contributor's text gets in version history. Requires careful redaction
        - key: synthetic-only
          label: Synthetic fixtures only — fastest to write, no privacy concerns, but the parser may pass tests and fail on real Codex sessions if the docs are incomplete
      answer: null
