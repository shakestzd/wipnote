      done_when:
        - .codex/hooks.json validates against Codex's documented schema
        - Each of the 5 events (SessionStart, UserPromptSubmit, PreToolUse, PostToolUse, Stop) shells out to htmlgraph hook <event>
        - 'matchers are correct: SessionStart startup|resume, PreToolUse Bash, PostToolUse Bash, no matcher for UserPromptSubmit/Stop'
        - Running codex in this repo produces at least one row in the hook_events table tagged runtime=codex
        - CODEX.md documents the global ~/.codex/hooks.json setup pattern
      effort: S
      risk: Low
      tests: |
        Unit: TestNormalizeCodexUserPromptSubmit on a captured Codex hook payload fixture
        Unit: TestNormalizeCodexBashPreToolUse
        Manual smoke: documented in CODEX.md — run codex in repo, run htmlgraph snapshot, verify Codex events appear
