      what: |
        Create packages/gemini-extension/ with gemini-extension.json manifest, skills/htmlgraph/SKILL.md containing core instructions and safety rules from htmlgraph agent-init, and commands/htmlgraph/ TOML slash commands (start, status, plan, spike, recommend, end). Update GEMINI.md to reflect the actual implementation. Generalizes from existing internal/ingest/gemini_discover.go (do NOT rewrite it, just verify it stays compatible). Decision on slash commands depends on Q4 — see questions section.
      why: |
        Goal "Each runtime gains an installable plugin bundle". Gemini's CLI surface is skill+TOML-command shaped; this matches its native patterns rather than fighting them. The existing gemini ingest already works — this slice closes the loop on the user-facing side.
