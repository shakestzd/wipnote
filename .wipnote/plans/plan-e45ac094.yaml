meta:
    id: plan-e45ac094
    title: Durable cross-agent hook pipeline (CRISP)
    description: 'Reduce 83ms/tool-call hook overhead (measured spk-2bf8ae01) AND make HtmlGraph durable across Claude Code, Codex CLI, Gemini CLI, Copilot CLI. Strategy: defense-in-depth — transcript-tail ingestion becomes the durable source of truth; hooks become an optional fast-path for the latency-sensitive minority of events. Research basis: Claude Code docs (hooks, plugins, skills), upstream issues #39391 (process-spawn 35ms, HTTP daemon =112x speedup), #34692 (hooks skip subagent tool calls), #40506 (no hooks in -p headless mode), #43584 (no heartbeat for stuck tools), #42702 (plugin stdin contention), #46376 (plugin PostToolUse exit2 context dropped), #33458 (plugin SessionEnd not fired on macOS). Cross-agent matrix verified: Codex v0.114 partial hooks (shell-only, no ApplyPatch), Gemini CLI full hooks w/ OTEL, Copilot CLI Feb-2026 GA (sync, 10-15s timeouts). Gemini JSONL ingest already shipped (internal/ingest/gemini_parser.go) — blueprint for other agents.'
    created_at: "2026-04-14"
    status: draft
    version: 12
design:
    problem: ""
    goals: []
    constraints: []
    approved: false
    comment: ""
slices:
    - id: feat-4d98b74a
      num: 1
      title: 'Phase 0: Measurement baseline and regression guard'
      what: Lock in spk-2bf8ae01 numbers as reproducible baseline. Add 'htmlgraph bench hooks' subcommand driving pretooluse/posttooluse/posttooluse-failure with canned payloads; report median+p95. Extend tracer.go to log exit timestamps so /tmp/htmlgraph-hook-trace.jsonl gives real per-hook duration. Wire into CI as soft guard (warns on >20% regression).
      why: Without a locked baseline every later phase is guessing. The existing tracer only logs entry timestamps so inter-record gaps reflect LLM thinking time not hook cost.
      files:
        - cmd/htmlgraph/bench.go
        - internal/hooks/tracer.go
        - scripts/bench-hooks.sh
      deps: []
      done_when:
        - bench subcommand exits 0
        - p95 printed in ms
        - CI job runs on PR
      effort: S
      risk: Low
      tests: ""
      approved: false
      comment: ""
    - id: feat-2b8d75c6
      num: 2
      title: 'Phase 1: Shrink db.Open hot path from ~80 to ~3 round-trips'
      what: 'Guard all DDL in internal/db/schema.go behind PRAGMA user_version. On open: read user_version; if current skip DDL; if behind run migrations then bump. Today Open() runs 15 CREATE TABLE + 47 CREATE INDEX + 9 ALTER TABLE + 2 CREATE TABLE + 2 DROP TABLE + 1 CREATE TRIGGER + 1 UPDATE + 2 ALTER on every call.'
      why: Process-per-hook model means db.Open runs for every single tool call. Measured ~80 SQL statements per open is the single largest addressable contributor to the 83ms figure. Benefits every agent that shells htmlgraph not just Claude Code.
      files:
        - internal/db/schema.go
        - internal/db/migrations.go
        - internal/db/pragmas.go
      deps:
        - 1
      done_when:
        - warm open issues 3 or fewer statements
        - user_version matches code constant
        - existing DB auto-migrates on first open
      effort: M
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-3f189b47
      num: 3
      title: 'Phase 2: Async-mode observability events'
      what: 'Flip plugin/hooks/hooks.json entries to ''async: true'' for events where HtmlGraph only observes and never injects additionalContext. Candidates: PostToolUse SubagentStart SubagentStop SessionEnd TaskCreated TaskCompleted TeammateIdle PostCompact WorktreeCreate WorktreeRemove ConfigChange InstructionsLoaded. Keep blocking: PreToolUse UserPromptSubmit SessionStart PermissionRequest PostToolUseFailure.'
      why: Claude Code docs confirm async is fire-and-forget — zero blocking cost. This is a Claude-Code-specific win with no downside for other agents (they just ignore the flag).
      files:
        - plugin/hooks/hooks.json
        - internal/hooks/runner.go
      deps:
        - 1
      done_when:
        - PostToolUse blocking time drops to 0 in trace
        - async hooks still write events to SQLite
        - additionalContext paths verified unaffected
      effort: S
      risk: Low
      tests: ""
      approved: false
      comment: ""
    - id: feat-7d4bcf37
      num: 4
      title: 'Phase 3: Persistent HTTP hook daemon'
      what: 'Add ''htmlgraph daemon'' long-lived process holding SQLite connection open in WAL mode serving hook requests via JSON POST. hooks.json gets ''type: http'' mode when daemon socket exists falling back to ''type: command'' when not. Autostart via SessionStart; graceful shutdown on SessionEnd. Keep command mode working for debugging and for agents lacking HTTP hook support.'
      why: 'Upstream issue #39391 directly validates this: 35ms process-spawn baseline eliminated via persistent HTTP daemon for 112x speedup. This is the single largest structural win available without upstream changes.'
      files:
        - cmd/htmlgraph/daemon.go
        - internal/daemon/server.go
        - plugin/hooks/hooks.json
        - cmd/htmlgraph/hook.go
      deps:
        - 2
        - 3
      done_when:
        - daemon starts under 200ms
        - hook roundtrip under 5ms when daemon live
        - command fallback still works when daemon down
        - no port conflicts
      effort: L
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-e06f45b6
      num: 5
      title: 'Phase 4: Transcript-tail ingestion as durable source of truth'
      what: 'Long-running ''htmlgraph watch'' mode using fsnotify to tail transcript directories across all installed agents: Claude at ~/.claude/projects/ Codex at ~/.codex/sessions/ Gemini at ~/.gemini/tmp/ Copilot location TBD. New JSONL lines ingest into SQLite through the same path as hooks. Hooks become optional fast-path for latency-sensitive features only.'
      why: 'Upstream issues #34692 (no subagent hooks) #40506 (no headless hooks) #42702 (stdin contention) #33458 (macOS SessionEnd silent fail) are all OPEN with no fix timeline. Transcript-tail closes every one of them without waiting on Anthropic. Gemini ingest already proves the pattern.'
      files:
        - internal/ingest/watch.go
        - cmd/htmlgraph/watch.go
        - internal/ingest/parser.go
      deps:
        - 1
      done_when:
        - htmlgraph watch survives tool calls in -p mode
        - subagent tool calls captured end-to-end
        - dedupe with hook-sourced events by (session_id tool_use_id)
      effort: L
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-2a55d062
      num: 6
      title: 'Phase 5: NormalizedEvent capture abstraction'
      what: Introduce internal/capture package with NormalizedEvent struct and capture.Ingest(NormalizedEvent) entry point that both hook handlers AND transcript parsers call. Every agent adapter translates native event shape into NormalizedEvent. One DB write path.
      why: Today pretooluse.go posttooluse.go parser.go and gemini_parser.go are four parallel paths into SQLite with drift risk. Phase 4 adds two more. Without this abstraction every agent adapter duplicates capture logic and optimizations land in one path only.
      files:
        - internal/capture/normalized.go
        - internal/capture/ingest.go
        - internal/hooks/pretooluse.go
        - internal/hooks/posttooluse.go
        - internal/ingest/parser.go
        - internal/ingest/gemini_parser.go
      deps:
        - 5
      done_when:
        - all capture paths call capture.Ingest
        - no direct db.InsertEvent outside capture package
        - existing tests green
      effort: M
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-10183ca9
      num: 7
      title: 'Phase 6: PreToolUse gate hot-path optimization'
      what: Collapse resolveParentEventID 3-query fallback (tooluse_shared.go:186) into single JOIN and cache parent event ID at session-resolution time for non-subagent sessions. Pre-compute hasRecentResearch hasRecentTestRun hasRecentDiffReview once per call and pass into all guards instead of each gate re-querying. Move checkYoloStepsGuard off hot path by caching last-seen step count in session row.
      why: 'pretooluse.go has 21 check sites (16 blocking 5 warn-only) — prior spike undercounted. In YOLO mode multiple gates re-query the same events table. Target: PreToolUse median 46ms -> ~20ms YOLO ~10ms non-YOLO.'
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/tooluse_shared.go
        - internal/db/session_repo.go
      deps:
        - 2
      done_when:
        - bench shows PreToolUse p95 under 25ms non-YOLO under 35ms YOLO
        - all existing guard tests pass
      effort: M
      risk: Low
      tests: ""
      approved: false
      comment: ""
    - id: feat-d080d356
      num: 8
      title: 'Phase 7: PostToolUse file I/O off hot path'
      what: Replace per-call AppendEventToSessionHTML (opens session HTML file LOCK_EX reads entire file string-finds </ol> rewrites) with JSONL sidecar append — O(1) cost independent of session length. Rebuild HTML lazily on 'htmlgraph serve'. Move SweepOrphanedEventsForSession off hot path to SessionStart only (5-minute threshold means once-per-session is sufficient).
      why: HTML append cost grows linearly with session length. goquery DOM parse on every invocation is wasted work. Phase 2 async mode hides this on Claude Code but other agents still pay the cost on the hot path.
      files:
        - internal/hooks/posttooluse.go
        - internal/hooks/session_html.go
        - internal/hooks/session_sweep.go
        - cmd/htmlgraph/serve.go
      deps:
        - 4
        - 6
      done_when:
        - JSONL sidecar written per event
        - serve rebuilds HTML on demand
        - sweep runs at SessionStart only
      effort: M
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-86759bef
      num: 9
      title: 'Phase 8: Cross-agent adapters for Codex and Copilot'
      what: 'Write internal/ingest/codex_parser.go and internal/ingest/copilot_parser.go following the Gemini blueprint: discover function parse function ingest subcommand watch integration. Dedupe via (session_id tool_use_id) when hooks and tail see the same event. Handle agent version skew and partial-write tailing.'
      why: Phase 5 abstraction + Phase 4 watcher make this the remaining work for true cross-agent durability. Gemini adapter already shipped and serves as reference — internal/ingest/gemini_parser.go internal/ingest/gemini_discover.go cmd/htmlgraph/ingest_gemini.go.
      files:
        - internal/ingest/codex_parser.go
        - internal/ingest/codex_discover.go
        - internal/ingest/copilot_parser.go
        - internal/ingest/copilot_discover.go
        - cmd/htmlgraph/ingest_codex.go
        - cmd/htmlgraph/ingest_copilot.go
      deps:
        - 5
      done_when:
        - codex ingest parses real session file
        - copilot ingest parses real session file
        - watch mode picks up new events from each
      effort: L
      risk: Med
      tests: ""
      approved: false
      comment: ""
    - id: feat-cd27e209
      num: 10
      title: 'Phase 9: Upstream bug mitigation layer'
      what: 'Explicit labeled workarounds for open upstream issues documented with KNOWN_UPSTREAM_BUG comments so we can delete them when fixes land. #34692 subagent hook skip — transcript-tail closes this plus add reconciliation at SubagentStop diffing observed vs hooked. #40506 headless mode — detect claude -p via env fall back to post-run ingest. #42702 stdin contention — verify runHookNamed reads stdin once at top and passes buffer. #46376 PostToolUse exit2 dropped — never rely on exit2 for context injection move to UserPromptSubmit. #33458 macOS SessionEnd silent fail — detect EOF on session JSONL as fallback.'
      why: These bugs are OPEN with no fix timeline. Documenting mitigations in code keeps the workarounds visible for removal and prevents future regressions as new contributors rediscover the issues.
      files:
        - internal/hooks/runner.go
        - internal/hooks/subagent.go
        - internal/ingest/watch.go
        - plugin/hooks/hooks.json
      deps:
        - 5
      done_when:
        - each mitigation has KNOWN_UPSTREAM_BUG comment with issue number
        - tests cover each workaround path
      effort: M
      risk: Low
      tests: ""
      approved: false
      comment: ""
