    synthesis: |
        The plan is sound in structure and motivation, but shipped with two FALSIFIED implementation assumptions (S1's UPDATE location inside ensureSession would never fire for existing rows, and S4's routing omitted the catch-all conflict at serve.go:83) that have been corrected in the slice descriptions. Backfill performance on large DBs (R3) now has explicit constraints: background goroutine, 4-worker pool, 5-minute benchmark, resumability across restarts. S5 clarifies that the event-tree.js toggle logic is not importable and defaults to controlled duplication with a project-id-prefixed localStorage key. A new design question (q-disclosure-extract) surfaces the extract-vs-duplicate tradeoff for human review alongside the existing open questions Q1 and Q2. All HIGH risks have been addressed in the revised slice text; MED/LOW risks are documented with implementation guidance. Action items addressed: (1) S1 UPDATE relocated outside ensureSession; (2) S4 routing conflict acknowledged with dispatch extension specified; (3) S3 backfill performance constraints added; (4) S5 notes disclosure pattern duplication with optional precursor refactor.
