        - risk: No definition of 'active' lifecycle semantics
          severity: Low
          mitigation: Add a short paragraph or state diagram in design.problem or design.goals describing what 'active' means and how it relates to draft|review|finalized
        - risk: 'Forward/backward compat: old CLI opening a v2 plan'
          severity: Low
          mitigation: validate.go's meta.status enum is the only schema gate; old CLI will reject 'active' but accept other v2 fields gracefully because PlanSlice has loose YAML decoding. Document this in design.constraints
    synthesis: |
        Two of three original blockers (B1 codex path, B3 validator extension) are resolved. B2 is documented but introduced a NEW hard blocker — the validSectionRe regex at cmd/htmlgraph/api_plans.go:286 currently rejects the proposed slice-local question section format. Slice-4 must explicitly include this regex extension in its files list and done_when, otherwise the answer-slice-question command will fail at the HTTP API gate. One additional refinement is recommended: slice-3 should call out reconciling with the existing data-section='slice-N' approval checkbox at slice_card.gohtml:22-23 rather than treating the template as greenfield. With those two adjustments (S4 regex update + S3 template reconciliation note), the plan is feasibility-ready for human review.
