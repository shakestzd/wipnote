meta:
    id: plan-1c14d560
    track_id: trk-a30e8df4
    title: 'Plan system v2: slice-centered incremental specs'
    description: |
        Redesign HtmlGraph planning so the slice card becomes the review and execution unit. Plans stay open while individual slices can be approved, promoted into features, executed, and completed independently. Questions and critique effects move into the relevant slice instead of living in global sections. Keep YAML as the plan source for now, but treat multiline slice fields as Markdown.
    created_at: "2026-04-26"
    status: finalized
    created_by: codex
    version: 9
design:
    problem: |
        The current CRISPI plan flow is document-centered: plans can become long, questions are separated from the slices they affect, critique is rendered as its own section, and finalization is effectively all-or-nothing. In practice, reviewers skim large plans, skip the critique section, and lose the ability to approve and implement one understood slice while other slices remain open. The existing YAML schema also underuses its own strengths: multiline fields such as `what`, `why`, and `tests` can already carry Markdown, but the skill and renderer do not consistently treat those fields as rich card content.
    goals:
        - '**Slice-centered review** - each slice card contains its implementation spec, local decisions, critique-derived changes, acceptance criteria, and approval controls.'
        - '**Incremental execution** - approved slices can be promoted and implemented without finalizing the entire plan.'
        - '**Critique as revision metadata** - critic findings are baked into affected slices and surfaced as compact revision badges rather than requiring a separate critique read-through.'
        - '**Markdown-native YAML** - keep YAML as the current source format while treating multiline `what`, `why`, and `tests` fields as Markdown rendered directly in the card.'
        - '**Backwards-compatible data model** - extend the existing YAML schema with slice-local questions, critic revisions, and lifecycle state instead of introducing a separate JSON migration first.'
    constraints:
        - Do not break existing .htmlgraph/plans/*.yaml plans or current plan finalize behavior during the transition.
        - 'Keep HtmlGraph local-first: plan data must remain in the repository or canonical local store, with SQLite used for live review state.'
        - Agents should write structured data through the CLI boundary; humans should review cards in the dashboard, not hand-edit plan files.
        - Slice promotion must preserve existing feature edges, session attribution, and execute-preview compatibility.
        - Markdown rendered inside cards must be constrained and sanitized; agents should not write arbitrary HTML for plan bodies.
        - Prefer YAML literal blocks (`|`) for Markdown fields so headings, lists, and code blocks survive rendering.
        - plan_feedback section-naming convention is load-bearing — slice-1 must document it, slice-4 must consume it, and a regression test for IsPlanFullyApproved must guard against silent breakage
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-44d8c24f
      num: 1
      title: Define the v2 slice-card YAML data model
      what: |
        ### What Changes

        Extend the existing YAML plan model so each slice is an independently
        reviewable executable spec card. Keep the current fields that already work
        for execution metadata:

        - `id`
        - `num`
        - `title`
        - `what`
        - `why`
        - `files`
        - `deps`
        - `done_when`
        - `tests`
        - `effort`
        - `risk`
        - `feature_id`

        Treat `what`, `why`, and `tests` as Markdown-capable multiline text. Agents
        should write these fields with YAML literal blocks (`|`) so headings, lists,
        and code fences render predictably in the frontend.

        Add slice-local structured fields:

        ```yaml
        approval_status: pending        # pending | approved | rejected | changes_requested
        execution_status: not_started   # not_started | promoted | in_progress | done | blocked | superseded
        questions:
          - id: q-error-handling
            text: "How should this slice report partial failures?"
            description: |
              Markdown explanation of the tradeoff.
            recommended: summary-report
            options:
              - key: summary-report
                label: "Summary report"
              - key: fail-fast
                label: "Fail fast"
            answer: null
        critic_revisions:
          - id: cr-1
            source: feasibility
            severity: High
            revision: 3
            summary: "Added skipped-row reporting after critique found silent migration risk."
            affects:
              - done_when
              - tests
        ```

        ### Local Decision

        Keep YAML as the source format for v2. Do not introduce JSON sidecars in this
        plan. Use Markdown inside existing multiline YAML fields and add only the
        structured fields needed for slice-local review and execution.

        ### Critic Revision Badge

        `Design revised` - the v2 schema removes global questions/critique as the
        primary review units and makes slice cards the unit of comprehension.

        ### Section-Naming Contract

        Section-naming contract for slice-local data in plan_feedback: `section = "slice-<num>"` for slice-level approvals/answers, and `section = "slice-<num>-question-<question-id>"` for slice-local question responses. Existing global sections ("design", "questions") are unchanged. The `UNIQUE(plan_id, section, action, question_id)` constraint at internal/db/plan_feedback.go:10-29 already accommodates this without a migration.
      why: |
        The current YAML schema encodes slices, questions, and critique as separate
        top-level collections. That shape drives the document-centered UI.

        We do not need a storage migration to fix that first. YAML already supports
        multiline Markdown well when fields use literal blocks. Extending the
        existing schema is lower risk than introducing a parallel JSON model before
        the review UX is proven.
      files:
        - internal/planyaml/schema.go
        - internal/planyaml/validate.go
        - cmd/htmlgraph/plan_validate.go
      deps: []
      done_when:
        - The YAML PlanSlice model includes slice-local questions, critic revisions, approval_status, and execution_status.
        - Validation rejects invalid dependency references, invalid lifecycle states, duplicate slice IDs/question IDs, and critic revisions without a source/severity/summary.
        - 'The plan skill documents `what: |`, `why: |`, and `tests: |` as Markdown-capable fields.'
        - 'The v2 model can represent all information currently needed by finalize/execute: title, files, deps, tests, feature ID, approvals, and status.'
        - Existing YAML validation remains unchanged for current plans.
        - Section-naming convention for plan_feedback documented in slice-1 and consumed by slice-4 — slice-local approvals use section='slice-<num>', slice-local question answers use section='slice-<num>-question-<id>'
        - internal/planyaml/validate.go meta.status enum extended to include 'active' alongside the existing 'draft|review|finalized' values; existing plans with the legacy enum continue to validate without errors
      effort: M
      risk: Med
      tests: |
        Unit: validate a v2 YAML plan with slice-local questions, critic revisions, and mixed lifecycle states.
        Unit: reject invalid YAML plans with duplicate slice IDs, duplicate local question IDs, bad deps, missing critic revision summaries, and unsupported statuses.
        Regression: current YAML plan validation tests still pass.
      approved: false
      comment: ""
    - id: slice-2
      feature_id: feat-33807582
      num: 2
      title: Render existing multiline slice fields as Markdown
      what: |
        ### What Changes

        Make Markdown rendering of `slice.what`, `slice.why`, and `slice.tests`
        explicit and reliable in the dashboard. The template already marks these
        fields with `data-markdown`; this slice hardens the behavior and updates
        styling so headings, lists, inline code, code fences, and paragraphs render
        cleanly inside cards.

        Keep `done_when` as a structured list of acceptance criteria instead of
        folding it into Markdown. It is both human-facing and machine-useful for
        compliance, TDD stubs, and execution prompts.

        ### Local Decision

        Prefer this YAML shape for rich card text:

        ```yaml
        what: |
          ### What Changes

          Markdown text...

        why: |
          ### Why This Matters

          Markdown text...

        done_when:
          - Concrete acceptance criterion
          - Another concrete acceptance criterion

        tests: |
          ### Unit

          - Test specific behavior

          ### Regression

          - Preserve existing behavior
        ```

        ### Critic Revision Badge

        `Storage simplification` - replaced the proposed JSON migration with
        Markdown-native YAML fields.
      why: |
        The text rendering problem can be solved without a storage migration. YAML
        literal blocks already preserve the formatting Markdown needs, and the
        renderer already has a Markdown hook. This is the fastest path to readable
        slice cards.
      files:
        - internal/plantmpl/plantmpl.go
        - internal/plantmpl/templates/slice_card.gohtml
        - internal/plantmpl/templates/plan_page.gohtml
        - cmd/htmlgraph/plan_create.go
        - plugin/skills/plan/SKILL.md
      deps:
        - 1
      done_when:
        - '`what`, `why`, and `tests` render as Markdown in slice cards.'
        - Markdown rendering is sanitized and does not allow arbitrary script/HTML injection.
        - The plan skill instructs agents to use YAML literal blocks for Markdown-capable fields.
        - Existing plain-text YAML plans still render acceptably.
      effort: M
      risk: Med
      tests: |
        Unit: render Markdown headings/lists/code in what/why/tests fields.
        Security: verify disallowed HTML/script content is escaped or stripped.
        Regression: existing `htmlgraph plan show/render/finalize` behavior still works for YAML plans.
      approved: false
      comment: ""
    - id: slice-3
      feature_id: feat-6dbc7112
      num: 3
      title: Render slice cards as the primary review surface
      what: |
        ### What Changes

        Replace the plan review page's document-centered sections with a
        slice-centered layout. Each slice card should render:

        - Markdown spec from `what`
        - Markdown rationale from `why`
        - structured `done_when`
        - Markdown test strategy from `tests`
        - files and dependencies
        - slice-local questions
        - critic revision badges
        - approval status
        - execution/promotion status

        Keep a compact plan-level overview for goals and cross-cutting constraints,
        but remove global questions and global critique from the main review flow
        for v2 plans.

        Reconciliation with existing template: internal/plantmpl/templates/slice_card.gohtml:22-23 already emits `<input data-section="slice-{{.Num}}" ...>` approval checkboxes that are live in production for slice-level approval. The new approval_status rendering in this slice MUST replace or extend that markup, not add alongside, to avoid two parallel approval state mechanisms. The data-section key 'slice-<num>' for slice-level approvals is already in use and matches the section-naming contract from slice-1, so reuse it directly for the approve-slice action.

        ### Local Question

        Should the UI keep an expandable review-history drawer for raw critic
        output?

        Recommended answer: yes, but only as secondary evidence, not as a required
        approval section.

        ### Critic Revision Badge

        `Review UX revised` - critique is shown where it changed the slice, not as
        an appendix.
      why: |
        The observed failure mode is human review fatigue. Reviewers do not read
        every global section carefully, especially when plans get long.

        Putting all slice-relevant context in one card makes approval local and
        concrete.
      files:
        - internal/plantmpl/templates/plan_page.gohtml
        - internal/plantmpl/templates/slice_card.gohtml
        - internal/plantmpl/slice_card.go
        - cmd/htmlgraph/api_plans.go
        - cmd/htmlgraph/dashboard/css/components.css
      deps:
        - 1
        - 2
      done_when:
        - A v2 plan renders with slice cards as the main content and no mandatory global critique/questions sections.
        - Slice-local questions can be answered from inside the card and persist across refresh.
        - Critic revision badges render on affected slices with severity/source/summary.
        - Markdown inside slice fields renders consistently without YAML block-scalar formatting artifacts.
        - Mobile and desktop layouts keep card text readable without overlap.
        - Existing data-section='slice-<num>' approval checkbox at internal/plantmpl/templates/slice_card.gohtml:22-23 is reconciled — either replaced by the new approval_status rendering or extended to display approval_status alongside the checkbox. No two parallel approval mechanisms remain in the rendered slice card.
      effort: L
      risk: Med
      tests: |
        Unit: template rendering includes local questions, critic badges, statuses, and sanitized Markdown.
        Browser/manual: review a v2 plan at desktop and mobile widths and verify no text overlap.
        Regression: legacy YAML plan pages still render their current global sections.
      approved: false
      comment: ""
    - id: slice-4
      feature_id: feat-58e5975f
      num: 4
      title: Introduce slice-level approval and lifecycle APIs
      what: |
        ### What Changes

        Add APIs and CLI commands for updating one slice at a time:

        - `plan approve-slice`
        - `plan reject-slice`
        - `plan answer-slice-question`
        - `plan set-slice-status`

        Store live review state in SQLite during interaction, then reflect durable
        lifecycle state in the YAML plan document on explicit save/promote
        operations.

        Lifecycle states should distinguish plan state from slice state:

        - plan: `draft | active | completed`
        - slice approval: `pending | approved | rejected | changes_requested`
        - slice execution: `not_started | promoted | in_progress | done | blocked | superseded`

        ### Local Decision

        Plan-level finalization should become "complete plan" and should not be
        required before approved slices can move.

        ### Critic Revision Badge

        `All-or-nothing gate removed`

        ### Section-Naming Contract

        All CLI mutation commands (approve-slice, reject-slice, answer-slice-question, set-slice-status) MUST use the section-naming contract defined in slice-1: section='slice-<num>' for slice-level state, section='slice-<num>-question-<id>' for question answers. Existing IsPlanFullyApproved at internal/db/plan_feedback.go:71 must continue to pass after the changes — add a regression test before introducing slice-local sections.
      why: |
        The current finalization gate turns review into a batch process.

        Large plans need incremental approval: a user should be able to approve and
        implement slice 1 while slice 4 still has unanswered questions.
      files:
        - cmd/htmlgraph/api_plans.go
        - cmd/htmlgraph/plan_yaml_cmds.go
        - internal/db/plan_feedback.go
        - internal/db/schema.go
        - internal/planyaml/schema.go
      deps:
        - 1
        - 2
      done_when:
        - A single slice can be approved/rejected without changing unrelated slices.
        - Slice-local question answers persist and are returned by plan feedback APIs.
        - The plan can remain active while some slices are approved, rejected, pending, or done.
        - Existing `plan_feedback` consumers continue working for legacy YAML plans.
        - Section-naming convention for plan_feedback documented in slice-1 and consumed by slice-4 — slice-local approvals use section='slice-<num>', slice-local question answers use section='slice-<num>-question-<id>'
        - 'validSectionRe at cmd/htmlgraph/api_plans.go:286 extended to accept `slice-\d+-question-[a-z0-9-]+` so the answer-slice-question command is not blocked at the HTTP gate. The existing normalization at api_plans.go:302-306 (underscore-to-hyphen) is mirrored for the new pattern. Regression test added: an HTTP POST to /api/plans/<id>/feedback with section=''slice-3-question-q-foo'' returns 200, not 400.'
      effort: L
      risk: High
      tests: |
        Unit: approve/reject/answer commands mutate only the targeted slice state.
        API: POST feedback for slice-local questions and verify GET returns card-scoped answers.
        Regression: IsPlanFullyApproved behavior remains available for legacy all-section finalize.
      approved: false
      comment: ""
    - id: slice-5
      feature_id: feat-19396f85
      num: 5
      title: Promote and execute approved slices incrementally
      what: |
        ### What Changes

        Add slice promotion so an approved v2 slice can become a feature work item
        without finalizing the full plan. Provide commands such as:

        ```bash
        htmlgraph plan promote-slice <plan-id> <slice-id>
        ```

        Update `execute-preview` or the execute skill so promoted slices can be
        dispatched by dependency readiness.

        Promotion should create or reuse the feature for the slice, write
        `feature_id` back into the YAML plan, emit `planned_in`, `part_of`, and
        dependency edges, and refuse execution when dependencies are not done unless
        explicitly waived.

        ### Local Question

        Should promotion automatically start execution?

        Recommended answer: no. Promotion creates the feature; execution is a
        separate action so humans can inspect the generated work item.

        ### Critic Revision Badge

        `Dependency gate added`
      why: |
        Incremental approval is only useful if it leads to incremental
        implementation.

        This slice turns the approved card into the same tracked work item graph
        used by current HtmlGraph execution, while keeping the parent plan open.
      files:
        - cmd/htmlgraph/plan_finalize.go
        - cmd/htmlgraph/plan_finalize_yaml.go
        - cmd/htmlgraph/execute_preview.go
        - plugin/skills/execute/SKILL.md
        - internal/workitem/plans.go
      deps:
        - 4
      done_when:
        - Approved slice promotion creates or reuses one feature and records the feature ID on the slice.
        - Promotion wires plan, track, and dependency edges consistently with current finalize behavior.
        - A slice blocked by unfinished dependencies cannot be executed unless the user explicitly waives the block.
        - The full plan can remain active after one or more slices are promoted or done.
      effort: L
      risk: High
      tests: |
        Integration: approve and promote slice 1, verify feature creation and edges while slice 2 remains pending.
        Integration: attempt to promote/execute a blocked slice and verify actionable error output.
        Regression: existing full-plan finalize remains idempotent and does not duplicate already-promoted features.
      approved: false
      comment: ""
    - id: slice-6
      feature_id: feat-f18d5c35
      num: 6
      title: Update planning skills, docs, and compatibility guidance
      what: |
        ### What Changes

        Rewrite the HtmlGraph planning skill so agents generate v2 slice-card YAML
        using Markdown-capable multiline fields instead of global questions and
        global critique sections.

        Update the workflow to:

        1. Research the codebase.
        2. Create slice cards as executable specs.
        3. Use `what: |`, `why: |`, and `tests: |` for Markdown content.
        4. Integrate critique into affected cards as `critic_revisions`.
        5. Ask local questions inside the relevant card.
        6. Pause for slice-level review.
        7. Promote approved slices.
        8. Complete the plan only when all slices are done, rejected, or superseded.

        Document the relationship to spec-driven development: the plan is context,
        each slice card is an executable spec, a promoted feature is the
        implementation tracker, and sessions/commits are evidence.

        ### Critic Revision Badge

        `Workflow revised` - agents no longer instruct humans to read a separate
        critique section before any code can happen.
      why: |
        The code changes will fail in practice if the agent workflow keeps producing
        document-centered plans.

        The plugin skill is the operational contract that tells agents how to use
        the system.
      files:
        - plugin/skills/plan/SKILL.md
        - plugin/skills/execute/SKILL.md
        - packages/gemini-extension/skills/plan/SKILL.md
        - packages/codex-marketplace/.agents/plugins/htmlgraph/skills/plan/SKILL.md
        - docs/blog/posts/plan-mode-crispi.md
        - docs/reference/cli.md
        - packages/plugin-core/manifest.json
      deps:
        - 3
        - 4
        - 5
      done_when:
        - The plan skill describes v2 slice-card YAML as the default for new plans.
        - 'The plan skill instructs agents to use Markdown in `what: |`, `why: |`, and `tests: |`.'
        - The skill explicitly says critique findings are integrated into slice cards before review.
        - The skill supports slice-level approval/promotion/execution and treats plan completion as a final bookkeeping step.
        - Generated plugin ports stay in sync through the existing plugin build process.
        - Docs explain how v2 planning relates to spec-driven development and how legacy YAML plans are handled.
      effort: M
      risk: Med
      tests: |
        Unit/integration: plugin build parity tests pass after skill updates.
        CLI docs: generated help/reference includes new slice lifecycle commands.
        Manual: run through a tiny v2 plan with one approved/promoted slice and one pending slice.
      approved: false
      comment: ""
