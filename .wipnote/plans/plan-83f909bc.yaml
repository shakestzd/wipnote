meta:
    id: plan-83f909bc
    track_id: trk-0677c709
    title: 'Enforcement architecture: machine-enforce wipnote dev practices'
    description: 'Move wipnote dev practices from advisory prose to machine-enforced, self-healing invariants in the Go binary + hook matrix so adherence is harness-identical across Claude Code, Codex, and Gemini. Seven slices: transactional complete, pre-commit check-ports drift gate, provenance-required completion, gate-record-required completion, session-exit reconciliation, dedup-on-create, cross-harness parity + adherence scorecard. Dual-critic reviewed 2026-05-15.'
    created_at: "2026-05-15"
    status: finalized
    priority: medium
    schema_version: v3
    version: 15
design:
    problem: |
        wipnote's development practices (commit-what-you-close, regenerate ports
        after generator edits, run the real gate, link duplicates, never present a
        glance as proof) are currently enforced only by advisory prose in
        CLAUDE.md/AGENTS.md and skill text. This session produced direct evidence
        that prose enforcement fails: Codex left 6 items done with evaporable /
        never-committed artifacts; feat-e78221c7 shipped without build-ports
        leaving generated trees stale; partial -run-filtered test runs were
        presented as a passing gate; byte-identical bugs (bug-7b5339cc /
        bug-d67e695e) were closed independently. The existing complete-path guard
        (checkUncommittedSourceCompleteGate) only rejects unrelated dirty source
        OUTSIDE .wipnote/ - it never verifies the item's OWN artifact commit
        actually landed, and none of the practices are enforced identically across
        the three harnesses.
    goals:
        - Make completion transactional so no item can reach done with an uncommitted or never-committed artifact (compensating re-open on commit failure).
        - Mechanically block stale generated trees from being committed or shipped.
        - Require commit/gate provenance before completion of code-bearing items, reusing trace/lineage primitives wipnote already has.
        - Add session-exit reconciliation that self-heals bookkeeping drift and blocks ambiguous source drift, on every harness.
        - Detect duplicate work items at creation time.
        - Guarantee slice-1..6 enforcement is harness-identical via the shared Go binary invoked by the per-harness hook matrix, and make weak-harness regressions visible as a tracked per-session adherence metric.
    constraints:
        - Enforcement MUST live in the shared Go binary (cmd/ + internal/) invoked by the per-harness hook matrix in packages/plugin-core/manifest.json - never in per-harness bespoke logic and never as more advisory prose in CLAUDE.md/AGENTS.md (the CLAUDE.md philosophy says fixes land in the binary/hooks, never descriptive docs; advisory text is exactly what failed).
        - No new canonical state outside .wipnote/*.html artifacts; the SQLite read index is derived and not committed, so gate records and scorecards must be derivable read-index rows, not canonical .wipnote HTML.
        - Generated trees (plugin/.claude-plugin, plugin/hooks/hooks.json, packages/codex-plugin, packages/gemini-extension) are regenerated, never hand-edited; the drift gate must full-regenerate-and-diff, not checksum.
        - No new runtime dependency - stdlib only (e.g. similarity metric).
        - col.Complete flushes the canonical HTML to disk (workitem.go:258) BEFORE the artifact commit (:329); failure handling must use a compensating re-open transition, not an in-process field revert.
        - commitWipnoteArtifact is contractually non-fatal (workitem_commit.go:62-65) for YOLO/worktree callers; a strict variant must be added for the complete path without changing the existing contract.
        - The Stop hook handler explicitly never blocks (missing_events.go:114,125) and BlockExit2Error is only wired into TaskCompleted; cross-harness blocking requires an explicit harness discriminator.
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-2bfd67e9
      num: 1
      title: Transactional wipnote * complete (compensating re-open on commit failure)
      what: |
        col.Complete(id) flushes the canonical HTML to disk at
        cmd/wipnote/workitem.go:258, BEFORE commitWipnoteArtifact at :329, so an
        in-process status-field revert is physically impossible. New design:
        capture pre-commit HEAD before col.Complete; add
        commitWipnoteArtifactStrict in cmd/wipnote/workitem_commit.go (a variant
        that RETURNS an error) and call it ONLY from the complete path. After it
        runs, assert two invariants: (a) the item's own artifact path is clean
        (no unstaged/uncommitted .wipnote/<type>/<id>.html), and (b) git log -1
        --format=%H -- <artifact> advanced vs the captured pre-commit HEAD. On
        failure: perform a COMPENSATING RE-OPEN transition — a second state
        write, col.Edit(id).SetStatus("in-progress").Save() (or the equivalent
        revert transition) — so the item ends in-progress, not done, then exit
        non-zero printing the exact remediation command. This second write has
        its own side-effect surface (lineage trace edges, session events, agent
        attribution); the design accepts that surface and done_when asserts the
        item ends in-progress with coherent side effects. The existing non-fatal
        commitWipnoteArtifact (workitem_commit.go:62-65, called non-fatally at
        :322-323) is UNCHANGED for all other callers. Leave
        checkUncommittedSourceCompleteGate (the outside-.wipnote dirty-source
        guard) untouched in behavior.
      why: |
        Highest-leverage, evidence-backed. The existing guard only rejects
        unrelated dirty source OUTSIDE .wipnote/; it never verifies the item's
        OWN artifact commit landed. Confirmed live this session - Codex left 6
        items done yet evaporable; bug-6a925774's completion only persisted
        because it happened to go through the proper path.
      files:
        - cmd/wipnote/workitem.go
        - cmd/wipnote/workitem_commit.go
        - cmd/wipnote/workitem_commit_test.go
      deps: []
      done_when:
        - on artifact-commit failure the item ends in-progress (not done) with coherent compensating side effects (lineage/session/attribution consistent with a re-open)
        - non-complete callers of commitWipnoteArtifact still observe the non-fatal contract (workitem_commit.go:62-65) unchanged
        - the existing outside-.wipnote dirty-source guard (checkUncommittedSourceCompleteGate) still behaves unchanged
      effort: M
      risk: High
      tests: |
        Add to cmd/wipnote/workitem_commit_test.go: (1) regression test that
        injects a strict-commit failure (read-only .git or stubbed strict step)
        and asserts complete returns non-zero AND the item ended in-progress
        (NOT done) AND the compensating-re-open side effects are coherent
        (lineage/session/attribution consistent); (2) happy-path test that
        pre-HEAD != post-HEAD for the artifact and status is done; (3) test that
        a non-complete caller still sees commitWipnoteArtifact return nil on
        failure (non-fatal contract preserved); (4) checkUncommittedSourceCompleteGate
        behavior is byte-identical. Run go test ./cmd/wipnote/...
      complexity: complex
      approved: false
      comment: ""
      execution_status: promoted
      questions:
        - id: q-rollback
          text: Roll back status in-process or via a deferred git-state check?
          answer: 'Neither — superseded by q-compensate: in-process revert is impossible because col.Complete already flushed the canonical HTML.'
        - id: q-compensate
          text: Field revert or compensating re-open?
          answer: Compensating re-open transition (second state write) — col.Complete already flushed HTML at workitem.go:258 before the commit at :329, so an in-process field revert is impossible; the re-open lineage/event/attribution side effects are accepted and asserted in done_when.
      critic_revisions:
        - source: sonnet
          severity: HIGH
          summary: 'Rollback impossible as written: col.Complete flushes HTML at workitem.go:258 before commitWipnoteArtifact at :329; spec rewritten to compensating re-open.'
        - source: sonnet
          severity: HIGH
          summary: commitWipnoteArtifact is non-fatal by contract (workitem_commit.go:63-65); introduce commitWipnoteArtifactStrict for the complete path only.
      decisions_notes: |
        **Trigger:** complete path persists canonical HTML via col.Complete at
        workitem.go:258 then calls the commit at :329; commit can silently fail
        leaving an evaporable done item.
        **State:** durable git state - pre-commit HEAD captured before
        col.Complete plus git log -1 --format=%H -- <artifact>; no session
        state (per the file/branch-state hook rule).
        **Payload:** on failure a compensating re-open transition
        (SetStatus in-progress) plus non-zero exit + exact remediation command;
        commitWipnoteArtifactStrict is used by the complete path only.
        **Rejected:** in-process status-field revert (rejected — physically
        impossible: col.Complete flushes the canonical HTML at workitem.go:258
        BEFORE commitWipnoteArtifact at :329, so there is no in-memory field to
        revert); breaking the non-fatal commitWipnoteArtifact contract for all
        callers (rejected — workitem_commit.go:62-65 contractually returns nil
        on failure for YOLO/worktree callers; add a strict variant instead);
        more CLAUDE.md/AGENTS.md prose telling agents to verify commits
        (rejected - advisory text is exactly the failure mode; CLAUDE.md
        philosophy says fixes land in the binary/hooks, never descriptive docs).
    - id: slice-2
      feature_id: feat-6cd28db4
      num: 2
      title: Pre-commit wipnote plugin check-ports drift gate
      what: |
        Add a wipnote plugin check-ports subcommand (alongside
        cmd/wipnote/plugin_build_ports.go) that regenerates ALL target trees
        into a tempdir using internal/pluginbuild, diffs the tempdir against the
        committed trees (plugin/.claude-plugin, plugin/hooks/hooks.json,
        packages/codex-plugin, packages/gemini-extension), and exits non-zero on
        any drift, printing the drifted paths. Scope the pre-commit invocation:
        .githooks/pre-commit runs wipnote plugin check-ports ONLY when
        git diff --cached --name-only includes paths under internal/pluginbuild/,
        packages/plugin-core/, or plugin/ (the existing hook has no scoping and
        full regen on every commit adds 5-30s). Also add it to
        scripts/deploy-all.sh and CI so stale generated trees can neither be
        committed nor shipped.
      why: |
        Mechanically eliminates the "forgot build-ports after a generator edit"
        class on every harness with zero agent reliance (the feat-e78221c7
        failure mode).
      files:
        - cmd/wipnote/plugin_build_ports.go
        - cmd/wipnote/plugin_check_ports.go
        - internal/pluginbuild/core.go
        - .githooks/pre-commit
        - scripts/deploy-all.sh
      deps: []
      done_when:
        - check-ports exits non-zero when packages/ or plugin/ drift from a fresh build-ports
        - a commit touching internal/pluginbuild or manifest.json without regenerating trees is rejected pre-commit
        - check-ports is skipped at pre-commit when no internal/pluginbuild|packages/plugin-core|plugin paths are staged
        - deploy-all.sh aborts on port drift
      effort: M
      risk: Low
      tests: |
        Add cmd/wipnote/plugin_check_ports_test.go: (1) clean tree -> exit 0;
        (2) mutate a committed generated file -> check-ports exits non-zero and
        names the drifted path; (3) edit manifest.json without regenerating ->
        drift detected. Shell-level smoke tests that .githooks/pre-commit
        invokes wipnote plugin check-ports and aborts on non-zero when
        generator/manifest/plugin paths are staged, and SKIPS it when only
        unrelated paths are staged. Run
        go test ./cmd/wipnote/... ./internal/pluginbuild/...
      complexity: complex
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-scope
          text: Full regenerate-and-diff or checksum manifest?
          answer: Full regenerate to tempdir then diff - authoritative, no separate checksum to drift; pre-commit invocation scoped to staged generator/manifest/plugin paths to avoid 5-30s latency on unrelated commits.
      critic_revisions:
        - source: sonnet
          severity: MED
          summary: Unscoped check-ports adds 5-30s to every commit — scope to staged internal/pluginbuild|packages/plugin-core|plugin paths (.githooks/pre-commit).
      decisions_notes: |
        **Trigger:** a commit/deploy touching internal/pluginbuild,
        packages/plugin-core, or plugin/ without regenerating the target trees.
        **State:** durable filesystem - full regenerate into a tempdir, then
        recursive diff against committed trees; no checksum/manifest cache.
        **Payload:** non-zero exit listing each drifted path; pre-commit
        invocation scoped to staged generator/manifest/plugin paths; also wired
        into scripts/deploy-all.sh and CI.
        **Rejected:** checksum-manifest approach (rejected - the checksum itself
        drifts and adds a second source of truth); unscoped pre-commit regen on
        every commit (rejected - adds 5-30s latency to unrelated commits; scope
        to staged paths); per-harness bespoke drift checks (rejected - drifts,
        defeats parity; the diff must run from the single shared build-ports
        generator).
    - id: slice-3
      feature_id: feat-7b593272
      num: 3
      title: Provenance-required completion (zero-commit block + advisory override)
      what: |
        In the complete path for code-bearing bug/feature/spike items, query the
        real lineage API db.GetCommitsByFeature(p.DB, id) ([]models.GitCommit,
        error) at internal/db/lineage_repo.go:192 (there is NO Commits()
        primitive). The *sql.DB is available via p.DB (opened at
        cmd/wipnote/workitem.go:225) and must be threaded into the gate. If
        len(result)==0 (zero linked source commits), block completion unless
        --accepted-advisory "<reason>" is passed (new flag on wiCompleteCmd in
        cmd/wipnote/workitem.go). The existing checkFeatureCompleteSpecGate
        (workitem.go:236) only applies to typeName=="feature"; this provenance
        gate MUST be type-agnostic and also cover bug and spike code-bearing
        items. Record the reason on the .wipnote artifact and surface it in
        wipnote snapshot and wipnote check / compliance output.
      why: |
        Kills "snapshot/live-API glance presented as fix proof." Reuses
        primitives wipnote already has (trace/lineage) that complete simply
        never consulted.
      files:
        - cmd/wipnote/workitem.go
        - internal/db/lineage_repo.go
        - cmd/wipnote/check.go
      deps:
        - 1
      done_when:
        - completing a code-bearing item with zero source commits is blocked without --accepted-advisory
        - the provenance gate fires for bug and spike code-bearing items, not only feature (existing spec gate is feature-only at workitem.go:236)
        - --accepted-advisory records the reason and it appears in snapshot and compliance output
        - non-code items and overridden items complete normally
      effort: M
      risk: Med
      tests: |
        cmd/wipnote/workitem_test.go: (1) code-bearing feature, GetCommitsByFeature
        returns empty, no flag -> blocked non-zero; (2) code-bearing BUG and
        SPIKE with zero commits -> also blocked (type-agnostic, not feature-only);
        (3) same with --accepted-advisory "reason" -> completes, reason persisted
        and present in snapshot + check; (4) pure-.wipnote/doc item with zero
        commits -> completes normally (exempt); (5) item with >=1 row from
        GetCommitsByFeature -> completes normally. Run
        go test ./cmd/wipnote/... ./internal/db/...
      complexity: complex
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-codebearing
          text: How to classify code-bearing?
          answer: Item whose trace touches any non-.wipnote source path; pure-.wipnote/doc items are exempt.
        - id: q-coverage
          text: Does the provenance gate cover bug/spike?
          answer: Yes — existing checkFeatureCompleteSpecGate is feature-only (workitem.go:236); the provenance gate is type-agnostic for any code-bearing item (trace touches non-.wipnote source).
      critic_revisions:
        - source: sonnet
          severity: HIGH
          summary: Commits() does not exist; reground on db.GetCommitsByFeature(p.DB,id) lineage_repo.go:192, thread p.DB from workitem.go:225.
        - source: sonnet
          severity: MED
          summary: Existing spec-gate is feature-only (workitem.go:236) — provenance gate must also cover bug/spike.
      decisions_notes: |
        **Trigger:** complete invoked on a code-bearing item (feature/bug/spike)
        whose lineage has zero linked source commits.
        **State:** durable lineage - db.GetCommitsByFeature(p.DB,id) at
        internal/db/lineage_repo.go:192; p.DB threaded from workitem.go:225;
        classification by trace-touched paths, not session.
        **Payload:** block + remediation unless --accepted-advisory "<reason>";
        reason written to the .wipnote artifact and surfaced in snapshot/check.
        **Rejected:** a Commits() primitive (rejected — does not exist; the real
        API is db.GetCommitsByFeature, len==0 is the zero-commit signal);
        feature-only coverage mirroring checkFeatureCompleteSpecGate
        (rejected — that gate is feature-only at workitem.go:236; provenance
        must be type-agnostic for bug/spike); trusting the agent narrative as
        proof (rejected — exact glance-as-proof failure); more AGENTS.md prose
        (rejected — advisory-only is what failed; enforcement in the binary).
    - id: slice-4
      feature_id: feat-b2d1dc2e
      num: 4
      title: Gate-record-required completion (session-local indexable gate record)
      what: |
        Add wipnote check --gate (cmd/wipnote/check.go) that detects the project
        manifest (go.mod/package.json/pyproject.toml/Cargo.toml) and runs the
        project's full build/vet/test, writing a SESSION-LOCAL signed result
        (not cross-session HEAD-SHA-pinned) re-validated immediately before
        complete. Store the record as a read-index row (e.g. a gate_records
        table) — derived, NOT canonical .wipnote HTML — so it respects the
        HTML-only canonicity constraint and slice-7 can JOIN against it for the
        "ran-gate" scorecard dimension. complete (cmd/wipnote/workitem.go)
        refuses code-bearing items lacking a valid session-local passing record
        re-checked at complete time. Include an env-flake allowlist
        (plugin/config) with a recorded per-entry justification so known
        environmental failures (the /tmp noexec class hit twice this session)
        don't mask genuine failures and can't be a blanket excuse; report
        allowlist hits in the gate output.
      why: |
        Kills -run-filtered partial validation presented as a passing gate.
      files:
        - cmd/wipnote/check.go
        - cmd/wipnote/workitem.go
        - cmd/wipnote/check_incomplete.go
        - plugin/config
      deps:
        - 1
      done_when:
        - wipnote check --gate writes a session-local pass/fail record re-checked immediately before complete
        - the gate record is an indexable read-index row (gate_records table), not canonical .wipnote HTML, that slice-7 can derive the ran-gate dimension from
        - complete refuses a code-bearing item with no valid session-local passing record
        - env-flake allowlist entries require a recorded justification and are reported in the gate output
      effort: L
      risk: Med
      tests: |
        check_incomplete.go-adjacent tests: (1) check --gate on a go.mod project
        writes a session-local gate_records row; (2) complete on a code-bearing
        item with no valid passing record -> refused; with a matching valid
        record -> allowed; (3) record is re-validated at complete time, not
        trusted from a prior session; (4) an env-flake-allowlisted failure
        without a justification is rejected; with a justification it is reported
        but does not mask other failures. Run go test ./cmd/wipnote/...
      complexity: complex
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-staleness
          text: What invalidates a gate record?
          answer: Session/worktree scope plus a mandatory re-validation immediately before complete — the record is session-local (not cross-session SHA-pinned), so slice-5 reconcile auto-commit cannot strand a stale-but-passing record.
      critic_revisions:
        - source: sonnet
          severity: MED
          summary: Gate record is new near-canonical state — store as read-index gate_records row, not .wipnote HTML, to respect canonicity constraint and feed slice-7.
        - source: haiku
          severity: MED
          summary: SHA-pinned record invalidated by slice-5 reconcile auto-commit — switch to session-local re-checked-at-complete.
      decisions_notes: |
        **Trigger:** complete invoked on a code-bearing item with no valid
        session-local passing gate record at complete time.
        **State:** derived read-index row (gate_records table) scoped to the
        current session/worktree, re-validated immediately before complete; NOT
        cross-session SHA-pinned and NOT canonical .wipnote HTML.
        **Payload:** wipnote check --gate runs the real full build/vet/test
        (manifest-detected) and writes the indexable record; allowlist hits
        reported, never silently absorbed; slice-7 JOINs it for the ran-gate
        dimension.
        **Rejected:** cross-session HEAD-SHA-pinned record (rejected — slice-5
        reconcile auto-commit mutates HEAD and would strand a stale-but-passing
        record; session-local + re-check-at-complete avoids the interaction);
        storing the record as canonical .wipnote HTML (rejected — violates the
        HTML-only canonicity constraint; a derived read-index row is correct and
        feeds slice-7); a blanket env-flake skip (rejected — masks genuine
        failures; each allowlist entry needs a recorded justification);
        per-harness gate scripts (rejected — drifts, defeats parity).
    - id: slice-5
      feature_id: feat-f93fe770
      num: 5
      title: Session-exit reconciliation (reconcile --strict + harness-discriminated Stop/SessionEnd)
      what: |
        Add wipnote reconcile --strict plus a Stop/SessionEnd hook handler
        (internal/hooks/session_end.go and the Stop path at
        internal/hooks/missing_events.go:101) that runs it on session exit.
        reconcile detects three classes: done-but-uncommitted items (auto-commit
        the artifact — deterministic bookkeeping — and report),
        generator-touched-without-build-ports drift (reuse slice-2 check-ports),
        and started-but-orphaned items. The Stop handler has an EXPLICIT
        never-block contract (missing_events.go:114 and :125) and
        BlockExit2Error is only wired into TaskCompleted (missing_events.go:305,
        task_completion_gate.go:15); Gemini SessionEnd routes through
        session-end and Codex TaskComplete maps to stop, both sharing the
        non-blocking path. New design: add an explicit HARNESS DISCRIMINATOR in
        the reconcile/Stop path — return BlockExit2Error (exit-2 block) ONLY
        when harness=="claude" (deliberately amending the
        missing_events.go:114/125 no-block contract); for Gemini and Codex emit
        a DURABLE structured warning (persist to a warnings log under .wipnote/
        or the read index) AND surface it at next SessionStart
        (internal/hooks/session_start.go), NOT context-injection-only, so the
        user-never-returns case is still recorded. reconcile auto-committing a
        done-but-uncommitted artifact must NOT strand a stale-passing slice-4
        gate record — slice-4 records are session-local and re-checked at
        complete, so the interaction is closed.
      why: |
        Defense-in-depth so a session that violated invariants is caught before
        the agent walks away, on every harness.
      files:
        - cmd/wipnote/reconcile.go
        - internal/hooks/session_end.go
        - internal/hooks/session_start.go
        - internal/hooks/missing_events.go
        - packages/plugin-core/manifest.json
      deps:
        - 1
      done_when:
        - reconcile --strict detects done-but-uncommitted items and generator-without-build-ports drift
        - exit-2 blocks ONLY on Claude (harness discriminator); Gemini/Codex produce a durable warning surfaced at next SessionStart, not context-injection-only
        - reconcile auto-commit of a done-but-uncommitted artifact does not leave a stale-passing slice-4 gate record (session-local records re-checked at complete)
      effort: L
      risk: Med
      tests: |
        internal/hooks/session_end_*_test.go and a new
        cmd/wipnote/reconcile_test.go: (1) done-but-uncommitted item ->
        reconcile auto-commits and reports; (2) generator-touched without
        build-ports -> reconcile reports drift; (3) Claude Stop path with
        unresolved ambiguous source drift -> BlockExit2Error / exit-2; (4)
        Gemini/Codex path -> exit 0, durable warning persisted AND rendered by
        session_start at next SessionStart; (5) reconcile auto-commit followed
        by complete still requires a fresh session-local gate record (no stale
        pass). Run go test ./cmd/wipnote/... ./internal/hooks/...
      complexity: complex
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-autocommit
          text: Auto-commit or block on done-but-uncommitted?
          answer: Auto-commit the artifact (it is bookkeeping, deterministic) and report; block only on ambiguous source drift.
        - id: q-discriminator
          text: How to block Claude but not Gemini/Codex through the shared non-blocking stop path?
          answer: 'Harness discriminator in the reconcile/Stop path: BlockExit2Error only when harness==claude (amends the missing_events.go:114/125 no-block contract); durable warning + next-SessionStart surfacing otherwise.'
      critic_revisions:
        - source: sonnet
          severity: HIGH
          summary: Stop handler explicitly never blocks (missing_events.go:114,125); BlockExit2Error only wired in TaskCompleted (:305) — add harness discriminator.
        - source: haiku
          severity: HIGH
          summary: 'slice-1/4/5 SHA interaction: reconcile auto-commit invalidates SHA-pinned gate records — gate records made session-local.'
        - source: haiku
          severity: MED
          summary: 'Warning-only durability: persist warning + surface at next SessionStart, not context-injection-only.'
      decisions_notes: |
        **Trigger:** session Stop/SessionEnd with done-but-uncommitted items,
        generator-without-build-ports drift, or orphaned started items.
        **State:** durable - git working tree, artifact commit state, slice-2
        port diff, plus a durable warnings record for the weak-harness path;
        not ephemeral session history.
        **Payload:** auto-commit deterministic bookkeeping + report; harness
        discriminator returns BlockExit2Error only when harness==claude;
        durable warning persisted + surfaced at next SessionStart on
        Codex/Gemini.
        **Rejected:** relying on the Stop handler to block (rejected — it
        explicitly never blocks at missing_events.go:114/125 and
        BlockExit2Error is only wired into TaskCompleted; an explicit harness
        discriminator is required); context-injection-only warning for
        Codex/Gemini (rejected — loses the user-never-returns case; persist
        durably and surface at next SessionStart); cross-session SHA-pinned
        gate records (rejected — reconcile auto-commit mutates HEAD; slice-4 is
        session-local to close the interaction); per-harness bespoke reconcile
        (rejected — drifts, defeats parity; one shared entrypoint invoked by
        the per-harness hook matrix).
    - id: slice-6
      num: 6
      title: Dedup check at create (similarity-based relates_to + needs-triage-dup)
      what: |
        On bug/feature create (cmd/wipnote/workitem_create.go), run normalized
        title+description similarity against open and recently-closed items
        (query via internal/db/feature_repo.go). On a strong match, auto-attach
        a relates_to edge and a needs-triage-dup tag that the dashboard and
        wipnote check surface; when a TTY is present, show an interactive
        confirm prompt first. Similarity is stdlib-only (normalized
        token/trigram), tuned to a documented threshold over a documented,
        configurable similarity window (default ~30d) with a recorded rationale.
        Dedup must degrade to a graceful no-op (not an error) when the read
        index is empty/absent (fresh clone / CI), so create never fails because
        the index has not been built.
      why: |
        bug-7b5339cc / bug-d67e695e were byte-identical yet closed
        independently; trivially detectable at creation.
      files:
        - cmd/wipnote/workitem_create.go
        - internal/db/feature_repo.go
        - cmd/wipnote/check.go
        - plugin/static/components.js
