        - the dashboard and wipnote check surface needs-triage-dup clusters
        - dissimilar items create with no false-positive link
        - dedup degrades to a graceful no-op (not an error) when the read index is empty/absent (fresh clone/CI)
      effort: M
      risk: Low
      tests: |
        cmd/wipnote/workitem_create.go tests: (1) create an item byte-identical
        to bug-7b5339cc/bug-d67e695e -> relates_to edge + needs-triage-dup tag
        attached; (2) create a clearly unrelated item -> no link (no false
        positive at the tuned threshold); (3) TTY-present path prompts,
        TTY-absent path auto-attaches non-interactively; (4) empty/absent read
        index -> create succeeds, dedup no-ops without error; (5) wipnote check
        and the dashboard surface the needs-triage-dup cluster. Run
        go test ./cmd/wipnote/... ./internal/db/...
      complexity: complex
      approved: false
      comment: ""
      approval_status: approved
      questions:
        - id: q-sim
          text: Similarity metric?
          answer: Normalized token/trigram similarity on title+description with a tuned threshold over a configurable window (default ~30d), recorded rationale; no new runtime dependency (stdlib only); graceful no-op when the read index is empty.
      critic_revisions:
        - source: sonnet
          severity: LOW
          summary: Dedup must no-op gracefully when read index empty (fresh clone/CI), not error.
        - source: haiku
          severity: LOW
          summary: Similarity threshold/window need documented rationale + configurable window (default ~30d).
      decisions_notes: |
        **Trigger:** bug/feature create whose title+description is near-identical
        to an open or recently-closed item within the configurable similarity
        window.
        **State:** durable - query existing items from the read index/artifacts;
        decision is content-based, not session-based; graceful no-op when the
        index is empty/absent.
        **Payload:** auto-attach relates_to edge + needs-triage-dup tag;
        interactive confirm only when a TTY is present; surfaced in dashboard
        and wipnote check. The similarity window is a documented configurable
        flag (default ~30d) and the threshold has a recorded rationale.
        **Rejected:** a new fuzzy-match runtime dependency (rejected - stdlib
        normalized token/trigram is sufficient and the constraint forbids new
        deps); failing create when the index is empty (rejected — fresh
        clone/CI has no index; dedup must no-op gracefully); relying on agents
        to manually search before creating (rejected - advisory-only is what
        failed; detection belongs in the binary).
