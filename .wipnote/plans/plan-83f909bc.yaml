critique:
    reviewed_at: "2026-05-15"
    reviewers:
        - Haiku (design)
        - Sonnet (feasibility)
    assumptions:
        - id: A2
          status: falsified
          text: slice-1 can revert the status in-process on artifact-commit failure.
          evidence: col.Complete(id) flushes the canonical HTML to disk at cmd/wipnote/workitem.go:258, BEFORE commitWipnoteArtifact at :329 — no in-memory field remains to revert. Rewritten to a compensating re-open transition.
        - id: A3
          status: falsified
          text: slice-1 can make commitWipnoteArtifact return an error for the complete path.
          evidence: commitWipnoteArtifact is contractually non-fatal (cmd/wipnote/workitem_commit.go:62-65, returns nil on failure; called non-fatally at workitem.go:322-323). Introduced commitWipnoteArtifactStrict for the complete path only; contract preserved for all other callers.
        - id: A7
          status: falsified
          text: slice-3 can call a Commits() lineage primitive.
          evidence: No Commits() primitive exists. The real API is db.GetCommitsByFeature(database *sql.DB, featureID string) ([]models.GitCommit, error) at internal/db/lineage_repo.go:192; gate checks len(result)==0; p.DB threaded from cmd/wipnote/workitem.go:225.
        - id: A4
          status: verified
          text: slice-2 can full-regenerate-and-diff via internal/pluginbuild.
          evidence: internal/pluginbuild/core.go provides the generator entrypoints used by cmd/wipnote/plugin_build_ports.go; tempdir regen + recursive diff is feasible.
        - id: A5
          status: verified
          text: slice-5 BlockExit2Error sentinel exists and triggers exit-2.
          evidence: internal/hooks/task_completion_gate.go:15 defines BlockExit2Error; wired into TaskCompleted at internal/hooks/missing_events.go:305.
        - id: A6
          status: verified
          text: slice-3 existing spec gate is feature-only.
          evidence: checkFeatureCompleteSpecGate is guarded by typeName=="feature" at cmd/wipnote/workitem.go:236; the new provenance gate must be type-agnostic to also cover bug/spike.
        - id: A8
          status: verified
          text: slice-6 dedup can query existing items from the read index without a new dependency.
          evidence: internal/db/feature_repo.go exposes the query surface; stdlib normalized token/trigram similarity is sufficient.
        - id: A9
          status: verified
          text: slice-7 scorecard can be derived at query time from existing session/commit/lineage rows.
          evidence: internal/db/lineage_repo.go + session tables provide the joins; no new canonical .wipnote state required.
        - id: A11
          status: verified
          text: slice-5 Stop handler exists and is reachable for Gemini/Codex via mapped events.
          evidence: internal/hooks/missing_events.go:101 Stop handler; Gemini SessionEnd routes through session-end and Codex TaskComplete maps to stop, both sharing the non-blocking path.
    critics:
        - title: DESIGN CRITIC (Haiku)
          sections:
            - heading: Cross-slice interactions
              items:
                - badge: slice-1/4/5
                  kind: danger
                  text: reconcile auto-commit (slice-5) mutates HEAD and would invalidate slice-4 SHA-pinned gate records; resolved by making slice-4 records session-local.
                - badge: slice-5
                  kind: warn
                  text: Codex/Gemini warning-only path must be durable and surfaced at next SessionStart, not context-injection-only, to handle the user-never-returns case.
                - badge: slice-7
                  kind: warn
                  text: Advisory overrides (slices 3/4) have no escalation path; scorecard must threshold-flag repeated --accepted-advisory / env-flake-allowlist usage.
        - title: FEASIBILITY CRITIC (Sonnet)
          sections:
            - heading: Buildability blockers
              items:
                - badge: slice-1
                  kind: danger
                  text: In-process status revert is impossible (workitem.go:258 flushes before :329) and commitWipnoteArtifact is non-fatal by contract (workitem_commit.go:62-65); rewritten to compensating re-open + strict variant.
                - badge: slice-3
                  kind: danger
                  text: Commits() primitive does not exist; regrounded on db.GetCommitsByFeature lineage_repo.go:192 with p.DB threaded from workitem.go:225.
                - badge: slice-5
                  kind: danger
                  text: Stop handler explicitly never blocks (missing_events.go:114,125); requires an explicit harness discriminator returning BlockExit2Error only when harness==claude.
                - badge: slice-2
                  kind: warn
                  text: Unscoped check-ports adds 5-30s to every commit; scoped to staged generator/manifest/plugin paths.
    risks:
        - risk: slice-1 in-process rollback is physically impossible (HTML flushed before commit).
          severity: High
          mitigation: Compensating re-open transition (SetStatus in-progress) after a failed strict commit; done_when asserts the item ends in-progress with coherent side effects.
        - risk: slice-1 breaking the non-fatal commitWipnoteArtifact contract regresses YOLO/worktree callers.
          severity: High
          mitigation: Add commitWipnoteArtifactStrict used by the complete path only; existing non-fatal wrapper untouched; regression test asserts non-complete callers still see nil.
        - risk: slice-3 targets a phantom Commits() primitive.
          severity: High
          mitigation: Reground on db.GetCommitsByFeature(p.DB,id) at lineage_repo.go:192; len==0 is the zero-commit signal; p.DB threaded from workitem.go:225.
        - risk: slice-5 Stop handler never blocks, so Claude exit-2 enforcement would silently no-op.
          severity: Medium
          mitigation: 'Explicit harness discriminator: return BlockExit2Error only when harness==claude (deliberately amends the missing_events.go:114/125 no-block contract); durable warning otherwise.'
        - risk: 'slice-1/4/5 interaction: reconcile auto-commit invalidates SHA-pinned gate records.'
          severity: High
          mitigation: Make slice-4 gate records session-local (re-validated immediately before complete), stored as a read-index gate_records row, not cross-session SHA-pinned.
        - risk: slice-7 ran-gate / regenerated-ports scorecard dimensions depend on slices 2 and 4 emitting indexable rows.
          severity: Medium
          mitigation: Explicit cross-slice schema contract documented in slice-7; deps already include 2 and 4.
        - risk: slice-2 unscoped pre-commit regen adds 5-30s latency to every commit.
          severity: Medium
          mitigation: Scope the pre-commit invocation to staged paths under internal/pluginbuild|packages/plugin-core|plugin only; skip otherwise.
    synthesis: |
        The dual-critic pass found three buildability blockers (slice-1 in-process
        rollback is impossible because col.Complete flushes the canonical HTML at
        workitem.go:258 before the commit at :329; slice-3 targeted a phantom
        Commits() primitive; slice-5 relied on the Stop handler blocking when it
        explicitly never does) plus one structural cross-slice hazard (slice-5
        reconcile auto-commit invalidating slice-4 SHA-pinned gate records). All
        four are now resolved in-spec: slice-1 uses a compensating re-open plus a
        strict commit variant that preserves the non-fatal contract; slice-3
        regrounds on db.GetCommitsByFeature and is type-agnostic for bug/spike;
        slice-5 adds an explicit harness discriminator with a durable
        next-SessionStart warning for Codex/Gemini; slice-4 gate records become
        session-local read-index rows so reconcile's auto-commit cannot strand a
        stale-passing record. Residual risk the human reviewer should scrutinize
        FIRST: (1) the compensating-re-open side-effect surface in slice-1 — a
        second state write touches lineage trace edges, session events, and agent
        attribution, and its coherence is asserted only by tests, not by the type
        system; (2) session-local gate-record semantics across slices 4 and 5 —
        the exact definition of "current session/worktree" and the
        re-check-immediately-before-complete window need design sign-off.
