    risks:
        - risk: Resolved-bug premise in original slice-6 would have shipped a conflicting mutex alongside the existing checkServeLock guard
          severity: High
          mitigation: Slice-6 rewritten as integration-test slice; mutex proposal dropped; --no-start-feature flag dropped; checkServeLock cited as the existing guard being tested, not replaced.
        - risk: waitForPort blocks HTTP handler up to 3s per request — concurrent pane launches stall under load
          severity: Medium
          mitigation: Added q-spawn-sync-model question; recommended return-pending-let-frontend-poll; slice-2 done_when updated to include state=pending/live/exited in /sessions response.
        - risk: Slice-3 extraction silently dropped parent-track resolution and createAgentWorktree three-arg signature
          severity: Medium
          mitigation: Slice-3 what updated to include EnsureForAgent, internal call to resolveTrackForFeature in EnsureForFeature, and q-worktree-package-boundary question for packaging choice.
        - risk: Dead-iframe UX when ttyd exits unexpectedly (user Ctrl-C inside pane)
          severity: Medium
          mitigation: Added q-liveness-signal question; slice-5 done_when now includes explicit 5s Ended-state requirement; backend reaper already removes entry, frontend just needs the polling/SSE mechanism.
        - risk: fmt.Printf in extracted worktree helpers becomes library noise in server logs
          severity: Low
          mitigation: Slice-3 what updated to accept io.Writer (default io.Discard for library/terminal path, os.Stdout for yolo caller).
        - risk: agent=yolo spawning htmlgraph yolo inside ttyd produces nested process chain with duplicate side effects
          severity: Medium
          mitigation: Added q-yolo-mode-shape question; recommended same-as-claude-with-flags to skip the wrapper and avoid nested side effects.
        - risk: Gemini HTMLGRAPH_AGENT env injection bypassed if cockpit shell builder emits raw gemini instead of htmlgraph gemini
          severity: Medium
          mitigation: Slice-7 done_when explicitly requires shell builder to emit htmlgraph gemini; unit test TestBuildShellCmdGeminiEnvInjection added.
    synthesis: |
        Critique surfaced two FALSIFIED assumptions that gutted the original slice-6 (both blocker bugs are resolved; proposed mutex would conflict with existing checkServeLock in claude_serve_autostart.go:173–215). Plan revised in six concrete ways: (1) slice-6 rewritten as a parallel-launch integration-test/stress-harness slice —
            no mutex, no flag, cites the existing lockfile as what it is testing, deps on slices 1+2;
        (2) slice-3 expanded to include EnsureForAgent (mirrors createAgentWorktree three-arg
            signature), parent-track resolution inside EnsureForFeature via resolveTrackForFeature,
            and an io.Writer parameter for progress output (io.Discard in library path, os.Stdout
            in yolo caller); q-worktree-package-boundary question captures internal-vs-sibling choice;
        (3) slice-1 introduces a StartRequest struct (future-proof field additions) and pure
            buildShellCmd function; nested-process concern for agent=yolo captured as q-yolo-mode-shape;
            attribution prefix (htmlgraph feature start <id>) added for all agent types when work_item is set;
        (4) slice-2 returns a state field (pending/live/exited) and adds POST /api/terminal/stop-all;
            q-spawn-sync-model captures blocking-vs-async choice with recommended return-pending-let-frontend-poll;
        (5) slice-5 adds pane-count cap (≤6 disables Create button), uses stop-all beacon on beforeunload,
            explicitly documents no position persistence, and adds a 5s Ended-state done_when;
            q-liveness-signal captures poll-inventory vs sse-stream mechanism choice;
        (6) slice-7 now depends on slice-1 (not just slice-3) and explicitly requires htmlgraph gemini/codex
            in shell builder so HTMLGRAPH_AGENT env injection flows correctly; buildShellCmd attribution
            prefix extends to codex and gemini.
        Added 4 new questions (total now 9): q-worktree-package-boundary, q-spawn-sync-model, q-yolo-mode-shape, q-liveness-signal. Added 3 new constraints on checkServeLock non-duplication, single-project-mode scope, and reaper/frontend liveness split responsibility.
