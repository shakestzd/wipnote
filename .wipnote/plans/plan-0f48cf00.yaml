meta:
    id: plan-0f48cf00
    track_id: trk-cd61bbae
    title: Local cockpit — parallel AI sessions in the dashboard
    description: |
        The local cockpit extends feat-52d15f78 (the ttyd embed MVP that shipped a single hardcoded `htmlgraph claude --dev` iframe) into a full multi-pane session manager embedded in the HtmlGraph dashboard. Users can spawn N concurrent PTY sessions — Claude, Codex, Gemini, or yolo — each scoped to its own CWD or worktree and tied to a specific work item, all from a launcher modal without leaving the browser. The backend remains a thin generic PTY spawner: one endpoint accepts {agent, mode, cwd, work_item} and computes the shell command; no agent-specific logic leaks into internal/terminal. The frontend, staying vanilla JS, owns all launcher UX, pane layout, and inventory reload. Because every spawned session writes its own session_id + project_dir row through the existing observability pipe, the lineage graph gains a natural record of which pane produced which artifacts — making parallel multi-agent work traceable at the session level.
    created_at: "2026-04-21"
    status: draft
    created_by: claude-opus
    version: 2
design:
    problem: |
        The MVP shipped in feat-52d15f78 puts one iframe in the dashboard that hardcodes `htmlgraph claude --dev` as the shell command. There is no way to open a second session, no way to pick Codex or Gemini as the agent, no way to scope a pane to a feature worktree, and no way to recover live panes after reloading the dashboard tab. The backend endpoint POST /api/terminal/start only accepts {work_item} and closes over the server-start projectDir — meaning all sessions run in the same directory regardless of what the user wants. A user running three parallel yolo agents on different features must leave the dashboard and manage tmux sessions manually, losing the observability lineage that HtmlGraph is designed to provide.
    goals:
        - '**N concurrent panes** — dashboard can host ≥4 simultaneous live PTY sessions without collision'
        - '**Agent-agnostic spawn** — same backend endpoint launches claude, codex, gemini, or htmlgraph yolo by parameter, not by new route'
        - '**Per-pane scope** — each pane can run in the main repo, a feature worktree, or a track worktree with HTMLGRAPH_PROJECT_DIR routed correctly'
        - '**Persistent pane inventory** — reloading the dashboard restores visible panes; ttyd processes outlive the browser tab'
        - '**Work-item attribution preserved** — every spawned session writes distinct session_id + project_dir rows, visible in the lineage graph'
    constraints:
        - Backend stays generic PTY spawner — no agent-specific logic in internal/terminal
        - Frontend stays vanilla JS — no new framework/bundler introduced for cockpit alone
        - Dev mode launchers must use --plugin-dir via removeMarketplaceHtmlgraph() (already enforced) — cockpit must not drop that guard
        - bug-6ab963d3 and bug-d2d3fb3f are resolved via the checkServeLock PID-file pattern in claude_serve_autostart.go:173–215; do NOT add duplicate serialization at the terminal-handler layer.
        - feat-af47836b (logical session splitting) must land before multi-pane attribution is clean; cockpit ships alongside but leans on it for correctness
        - Cockpit endpoints are localhost-bound; any remote-exposure story is deferred (ttyd --credential is available when we need it)
        - Multi-project / global-serve mode (parent/child architecture in serve.go + serve_parent.go) is out of scope for v1; cockpit targets single-project mode only. Verify after landing that terminal routes propagate correctly through buildSingleProjectMux on the child side.
        - Backend session-reaper goroutine in internal/terminal/terminal.go:108–113 removes entries on ttyd exit; frontend must have a liveness signal (see q-liveness-signal) to avoid dead-iframe UX.
    approved: false
    comment: ""
slices:
    - id: slice-1
      num: 1
      title: Generalize Manager.Start request surface
      what: |
        Introduce a StartRequest struct (not positional parameters) so future field additions remain backward-compatible. Fields: Agent string, Mode string, CWD string, WorkItem string. When fields are zero-valued, fall back to MVP defaults (claude, dev, server-start projectDir). Extend POST /api/terminal/start to decode StartRequest and compute the correct shell command via a pure function buildShellCmd(agent, mode, workItem string) string — this function is easy to unit-test and switches on agent to choose between claude/codex/gemini/yolo invocations. Session struct gains Agent, Mode, and CWD fields alongside existing Cmd, Port, and WorkItem fields. waitForPort stays inline but is called with the per-request port.

        Shell command builder notes: (1) agent=claude emits `htmlgraph claude [--dev]` with dev-mode guard via removeMarketplaceHtmlgraph; (2) agent=codex/gemini emits `htmlgraph codex`/`htmlgraph gemini` so HTMLGRAPH_AGENT env injection flows; (3) agent=yolo has a nested-process concern — see q-yolo-mode-shape for whether to emit `htmlgraph yolo` wrapper or `claude --permission-mode bypassPermissions` directly; (4) when work_item is set, buildShellCmd prepends `htmlgraph feature start <id>;` for all agents to ensure attribution.

        Add concrete done_when: JSON body {} (no fields) preserves MVP behavior — spawns `htmlgraph claude --dev` with cmd.Dir = projectDir, keyed the same way as today.
      why: |
        All subsequent cockpit slices depend on the ability to spawn different agent types with different CWDs from a single endpoint. Without this generalization the frontend launcher modal has nowhere to send its parameters and every new agent would require a new route.
      files:
        - internal/terminal/terminal.go
        - cmd/htmlgraph/terminal_handlers.go
      deps: []
      done_when:
        - POST /api/terminal/start with {"agent":"codex","mode":"dev","cwd":"/tmp/test","work_item":"feat-abc"} spawns htmlgraph codex --dev in /tmp/test
        - POST /api/terminal/start with {} still spawns htmlgraph claude --dev in the server-start projectDir (backward compat)
        - JSON body {} (no fields) produces identical behavior to the pre-cockpit MVP — cmd.Dir = projectDir, same map key scheme
        - Session struct fields Agent, Mode, CWD are persisted in the in-memory map and returned in subsequent list calls
        - htmlgraph yolo agent value behavior is governed by q-yolo-mode-shape answer
        - buildShellCmd is a pure function covered by unit tests for all agent x mode combinations
        - When work_item is set, all agent types prepend htmlgraph feature start <id> attribution step
      effort: M
      risk: Med
      tests: |
        Unit: TestBuildShellCommand covers all agent x mode combinations and verifies correct command string
        Unit: TestManagerStartBackwardCompat verifies empty body still spawns default session
        Unit: TestStartRequestStruct verifies zero-value fallback logic for each field
        Integration: TestTerminalStartEndpoint posts each agent type and asserts the spawned process argv contains the expected launcher
        Regression: Existing MVP POST /api/terminal/start {work_item} flow still returns a valid port
      approved: false
      comment: ""
    - id: slice-2
      num: 2
      title: UUID-keyed sessions + inventory endpoints
      what: |
        Add an id string (UUID v4) field to the session struct and change the in-memory map key from pid (int) to UUID. Add GET /api/terminal/sessions returning a JSON array of {id, agent, mode, cwd, work_item, port, started_at, state} for all live sessions. The state field uses values pending | live | exited. Add POST /api/terminal/stop accepting {id} (preferred) or {pid} (back-compat, drop in a later cleanup slice) to kill a session. Add POST /api/terminal/stop-all that kills all live sessions; used by the beforeunload beacon in slice-5 (navigator.sendBeacon body is small, fits the stop-all pattern cleanly). started_at is set at spawn time (time.Now()). UUID generation uses crypto/rand — no new dependency.
      why: |
        The floating-window frontend needs a stable, reload-safe identifier per pane that is not a PID (which can be reused by the OS after a process exits). The inventory endpoint lets the dashboard reconstruct its pane list on reload by fetching live sessions and rendering iframes pointing at the live ttyd ports. The state field enables the async spawn model recommended in q-spawn-sync-model.
      files:
        - internal/terminal/terminal.go
        - cmd/htmlgraph/terminal_handlers.go
      deps:
        - 1
      done_when:
        - GET /api/terminal/sessions returns all running sessions with correct fields including state (pending/live/exited)
        - POST /api/terminal/stop {"id":"<uuid>"} kills the correct process
        - POST /api/terminal/stop {"pid":12345} still works for back-compat
        - POST /api/terminal/stop-all kills all live sessions and is usable as a navigator.sendBeacon target
        - Session IDs survive across multiple start calls without collision (UUID uniqueness)
        - 'State transitions: pending on spawn, live when port binds, exited when reaper removes entry'
      effort: M
      risk: Low
      tests: |
        Unit: TestGenerateSessionID produces valid UUID v4 strings
        Unit: TestSessionInventoryList returns correct count and fields including state for N concurrent sessions
        Unit: TestSessionStateTransitions verifies pending -> live -> exited state machine
        Integration: TestStopByID starts a session, stops it by UUID, verifies process is gone
        Integration: TestStopByPID back-compat — start session, stop by pid, verify gone
        Integration: TestStopAll starts 3 sessions, calls stop-all, verifies all 3 processes gone
        Regression: Existing stop-by-pid callers continue to function after UUID migration
      approved: false
      comment: ""
    - id: slice-3
      num: 3
      title: Extract internal/worktree primitive
      what: |
        Create a new package internal/worktree with worktree.go exposing:
        - EnsureForFeature(featureID, repoRoot string, w io.Writer) (path string, err error)
        - EnsureForTrack(trackID, repoRoot string, w io.Writer) (path string, err error)
        - EnsureForAgent(trackID, taskName, repoRoot string, w io.Writer) (path string, err error) — mirrors createAgentWorktree(yolo.go:243) which takes three args (trackID, taskName, projectRoot)

        The io.Writer parameter controls progress output: callers pass os.Stdout (yolo CLI path) or io.Discard (library/terminal path) to avoid library noise in server logs.

        Move createFeatureWorktree, createTrackWorktree, and createAgentWorktree from cmd/htmlgraph/yolo.go into this package. yolo.go becomes a thin caller.

        EnsureForFeature MUST call resolveTrackForFeature internally: if the feature has a parent track, return the track worktree path instead of a feature-specific worktree. This mirrors the parent-track resolution currently in launchYoloDefault (yolo.go:390–408). Without this, features-with-parent-tracks silently get their own feature worktree instead of the expected track worktree, breaking yolo behavior.

        excludeHtmlgraphFromWorktree and reindexWorktree lifecycle calls are delegated from the new package. Note: reindexWorktree forks the binary (runs `htmlgraph reindex`) — this is acceptable for a utility that calls itself, but tests must stub or skip the reindex step to avoid subprocess dependency.

        The terminal handler uses EnsureForFeature/EnsureForTrack when the request includes cwd_kind=feature-worktree or cwd_kind=track-worktree.

        Note on package boundary: see q-worktree-package-boundary for whether internal/worktree vs a cmd/htmlgraph sibling file is the right choice.
      why: |
        Worktree creation logic is duplicated across yolo and, once the cockpit lands, would need to be duplicated again in terminal_handlers.go. Extracting an internal/worktree primitive gives all three callers (yolo, codex/gemini launchers in slice-7, and the cockpit handler) a single tested path with correct HTMLGRAPH_PROJECT_DIR injection and excludeHtmlgraphFromWorktree behavior.
      files:
        - internal/worktree/worktree.go (new)
        - cmd/htmlgraph/yolo.go
        - cmd/htmlgraph/terminal_handlers.go
      deps: []
      done_when:
        - internal/worktree package compiles and exports EnsureForFeature, EnsureForTrack, and EnsureForAgent
        - EnsureForFeature returns track worktree path (not feature worktree) when the feature has a parent track
        - cmd/htmlgraph/yolo.go no longer contains inline createFeatureWorktree/createTrackWorktree/createAgentWorktree logic
        - POST /api/terminal/start with {"cwd_kind":"feature-worktree","work_item":"feat-abc"} creates or reuses the worktree at .claude/worktrees/feat-abc
        - HTMLGRAPH_PROJECT_DIR env var is set correctly in the spawned TTY to the canonical repo root
        - Progress output goes to io.Discard in library path; yolo caller passes os.Stdout
        - Tests skip or stub the reindexWorktree subprocess step
      effort: M
      risk: Med
      tests: |
        Unit: TestEnsureForFeature creates worktree on first call and returns existing path on second call
        Unit: TestEnsureForFeatureWithParentTrack verifies parent-track resolution returns track worktree path
        Unit: TestEnsureForTrack same idempotency guarantee
        Unit: TestEnsureForAgent mirrors createAgentWorktree three-arg signature
        Unit: TestProgressWriterDiscard verifies no stdout pollution in library path
        Integration: TestWorktreeEnvInjection spawns a session with cwd_kind=feature-worktree and asserts HTMLGRAPH_PROJECT_DIR points at the main repo
        Regression: htmlgraph yolo --feature <id> still creates worktrees via the new package with identical behavior
      approved: false
      comment: ""
    - id: slice-4
      num: 4
      title: Frontend launcher modal
      what: |
        Replace the bare Terminal button click handler with a launcher modal that presents four controls: (1) agent picker — radio or select for claude / codex / gemini / yolo; (2) mode picker — normal / dev / auto; (3) work-item search — text input with debounced GET /api/features?q= results shown as a dropdown; (4) CWD toggle — main repo / feature-worktree / track-worktree (disabled when no work item selected). Submit calls POST /api/terminal/start with the assembled JSON body. Cancel closes without spawning. Modal rendered in pure HTML/CSS/JS consistent with existing component style; no new library.
      why: |
        Without a launcher UX, every cockpit parameter must be baked into the source code or passed via a raw curl call. The modal is the user-facing control surface for all per-pane configuration and is the prerequisite for multi-pane spawning to be usable by non-developers.
      files:
        - cmd/htmlgraph/dashboard/index.html
        - cmd/htmlgraph/dashboard/js/app.js
        - cmd/htmlgraph/dashboard/css/components.css
      deps:
        - 1
      done_when:
        - Clicking the Terminal button opens the launcher modal instead of immediately spawning
        - All four controls render and are interactive; work-item search returns results
        - Submit with agent=codex, mode=dev, work_item=feat-abc posts correct JSON to /api/terminal/start
        - Cancel closes the modal without side effects
        - Modal is accessible via keyboard (Tab, Enter, Escape)
      effort: M
      risk: Low
      tests: |
        Unit: TestBuildLaunchPayload verifies JS function assembles correct JSON from modal state
        Integration: TestLauncherModalSubmit triggers POST with correct body when form is filled and submitted
        Regression: Existing bare-click path is fully replaced; no orphaned event listeners remain
      approved: false
      comment: ""
    - id: slice-5
      num: 5
      title: Multi-pane shell (floating windows)
      what: |
        Extend the single-overlay pattern to support N simultaneous floating pane windows. Each pane is an independent div.terminal-pane containing a titlebar (agent label, work item, close button) and an iframe pointing at the live ttyd port. Panes are draggable via the titlebar (mouse events, no library). On dashboard load, call GET /api/terminal/sessions and re-render a pane for each live session (iframe src = http://127.0.0.1:<port>). Closing a pane calls POST /api/terminal/stop and removes the element. A global pane registry (Map keyed by session UUID) tracks open panes and prevents duplicate iframes for the same session. Tile/split layout is explicitly deferred to a future slice — floating windows only for v1.

        Lifecycle additions:
        - beforeunload event fires navigator.sendBeacon to POST /api/terminal/stop-all (defined in slice-2) — cleaner than iterating individual PIDs and stays within beacon body limits.
        - Pane count cap: the launcher disables the Create button when ≥6 panes are live; warning text explains the cap.
        - Pane position persistence is NOT implemented; reload cascades new panes from top-left (scope discipline — kick persistence to a future slice if needed).
        - When a ttyd process exits (user Ctrl-C inside the pane), the pane shows an "Ended" state within 5s. Mechanism governed by q-liveness-signal (poll /api/terminal/sessions every N seconds vs SSE).
      why: |
        This is the visible cockpit: without multi-pane the whole plan is still a single-session wrapper. Floating windows are chosen over tiling because they require no split-pane JS library and each pane's position is independently user-controlled. The reload-from-inventory behavior makes the cockpit resilient to browser events without requiring server state to track frontend layout.
      files:
        - cmd/htmlgraph/dashboard/index.html
        - cmd/htmlgraph/dashboard/js/app.js
        - cmd/htmlgraph/dashboard/css/components.css
      deps:
        - 1
        - 2
        - 4
      done_when:
        - Opening two sessions from the launcher modal renders two independent floating pane windows simultaneously
        - Each pane's iframe displays its own live ttyd session
        - Panes are draggable by their titlebars without colliding with each other
        - On dashboard reload, GET /api/terminal/sessions re-renders all live panes
        - Closing one pane via its close button does not affect other panes
        - Launcher Create button is disabled when ≥6 panes are live with explanatory warning text
        - beforeunload fires navigator.sendBeacon to POST /api/terminal/stop-all
        - Pane positions are NOT persisted across reloads; new panes cascade from top-left
        - When a ttyd process exits for any reason, the dashboard pane shows an "Ended" state within 5s
      effort: L
      risk: Med
      tests: |
        Unit: TestPaneRegistry add/remove/get operations on the UUID-keyed Map
        Unit: TestBuildPaneElement verifies correct iframe src and titlebar text from session data
        Unit: TestPaneCountCap verifies Create button disabled state at ≥6 panes
        Integration: TestMultiPaneRender spawns two sessions and asserts two pane divs exist in the DOM
        Integration: TestReloadRestore mocks GET /api/terminal/sessions and verifies panes are reconstructed
        Integration: TestBeforeUnloadBeacon verifies navigator.sendBeacon target is /api/terminal/stop-all
        Integration: TestExitedPaneState polls GET /api/terminal/sessions and verifies pane transitions to Ended within 5s of ttyd exit
        Regression: Single-pane flow from pre-cockpit MVP still works end-to-end via the new multi-pane path
      approved: false
      comment: ""
    - id: slice-6
      num: 6
      title: Parallel-launch integration test + stress harness
      what: |
        Add an integration test that POSTs 4 concurrent /api/terminal/start requests and verifies the cockpit handles them correctly. This slice tests — not replaces — the existing parallel-launch protection that lives in checkServeLock / writeServeLock in claude_serve_autostart.go:173–215. Those functions already serialise concurrent ensureServeForOtel probes via a PID-file liveness check; the cockpit MUST NOT add a duplicate mutex at the terminal-handler layer (see design.constraints).

        Test harness components:
        1. Go integration test (TestParallelLaunch4) that POSTs 4 concurrent requests, asserts all 4 return live ports within 5s, checks debug.log shows zero SQLITE_BUSY entries during the launch window, verifies each ttyd process is reaped cleanly on stop.
        2. Each of the 4 sessions must show a distinct session_id in the sessions table after running one hook event.
        3. Smoke shell script (scripts/stress-launch.sh) that drives the same scenario against a running htmlgraph serve and prints a pass/fail summary — useful for manual regression.
      why: |
        The cockpit amplifies the parallel-launch surface area (4+ sessions spawned in rapid succession). The bugs that caused SQLITE_BUSY and feature-start writer contention are resolved, but without a regression test the fix could silently regress. This slice locks in the correct behavior and provides a stress harness for future cockpit development.
      files:
        - internal/terminal/terminal_test.go
        - scripts/stress-launch.sh (new)
      deps:
        - 1
        - 2
      done_when:
        - 4 concurrent POST /api/terminal/start requests each return a distinct live port within 5s
        - debug.log contains zero SQLITE_BUSY entries during the 4-session launch window
        - All 4 sessions show distinct session_id values in the sessions table after each runs one hook event
        - All 4 ttyd processes are reaped cleanly when POST /api/terminal/stop-all is called
        - scripts/stress-launch.sh exits 0 on a healthy server
      effort: M
      risk: Med
      tests: |
        Integration: TestParallelLaunch4 — 4 concurrent POSTs, assert ports live within 5s, assert no SQLITE_BUSY in debug.log, assert distinct session_ids, assert reaper cleans up on stop-all
        Shell: scripts/stress-launch.sh — smoke-test against a running server, prints pass/fail per criterion
      approved: false
      comment: ""
    - id: slice-7
      num: 7
      title: Agent-matrix parity for worktree + work-item
      what: |
        Add --track, --feature, and --worktree flags to htmlgraph codex and htmlgraph gemini analogous to the existing flags on htmlgraph yolo. Each flag sets HTMLGRAPH_PROJECT_DIR to the canonical repo root and sets cmd.Dir to the appropriate worktree path using internal/worktree from slice-3. When no worktree flag is given, behavior is unchanged. Also add --work-item flag to both launchers so the cockpit can inject attribution env vars for Codex and Gemini sessions matching what Claude already gets.

        Implementation notes:
        - Add WorktreeRoot and HtmlgraphRoot fields to codex and gemini launch-opts structs; when set, swap c.Dir to the worktree path and inject HTMLGRAPH_PROJECT_DIR=<canonical root> via setOrReplaceEnv (same pattern as buildClaudeLaunchEnv in cmd/htmlgraph/claude_env.go).
        - Gemini's HTMLGRAPH_AGENT=gemini env var injection (gemini.go:240–243) requires the cockpit shell command builder to emit `htmlgraph gemini` (not raw `gemini`) so the injection flows correctly.
        - Update buildShellCmd (slice-1) to emit these flags for codex/gemini when cwd_kind=worktree and work_item is set, including the `htmlgraph feature start <id>` attribution prefix for all three agents.
        - Add --track, --feature, --work-item CLI flags to both codex.go and gemini.go. Verify effort by reading both files before implementation.
      why: |
        Today only the Claude/yolo launchers support worktrees and work-item attribution. Without this slice, a Codex or Gemini pane launched from the cockpit runs in the main repo with no attribution — a second-class experience that defeats the observability goal. Parity means every agent can participate in the lineage graph on equal footing.
      files:
        - cmd/htmlgraph/codex.go
        - cmd/htmlgraph/gemini.go
        - cmd/htmlgraph/terminal_handlers.go
        - internal/worktree/worktree.go
      deps:
        - 1
        - 3
      done_when:
        - htmlgraph codex --feature feat-abc spawns in .claude/worktrees/feat-abc with HTMLGRAPH_PROJECT_DIR set
        - htmlgraph gemini --track trk-xyz spawns in the track worktree with HTMLGRAPH_PROJECT_DIR set
        - Cockpit POST /api/terminal/start with agent=codex + cwd_kind=feature-worktree emits correct htmlgraph codex command (not raw codex)
        - Cockpit POST /api/terminal/start with agent=gemini emits htmlgraph gemini so HTMLGRAPH_AGENT env injection flows
        - buildShellCmd prepends htmlgraph feature start <id> for codex and gemini when work_item is set
        - Help output for codex and gemini lists the new flags
      effort: M
      risk: Low
      tests: |
        Unit: TestCodexWorktreeFlag verifies --feature flag sets correct cmd.Dir and env
        Unit: TestGeminiWorktreeFlag same for gemini
        Unit: TestBuildShellCmdGeminiEnvInjection verifies shell builder emits htmlgraph gemini not raw gemini
        Integration: TestCockpitCodexWorktree posts agent=codex + cwd_kind=feature-worktree and asserts spawned process is in the worktree path
        Regression: htmlgraph codex and htmlgraph gemini invocations without new flags retain existing behavior exactly
      approved: false
      comment: ""
questions:
    - id: q-pane-layout
      text: Floating windows vs tiled/split layout for v1 panes?
      description: |
        Should the cockpit v1 pane layout use floating windows (each pane is a freely-positionable overlay div draggable by its titlebar) or a tiled/split layout (panes fill the viewport in a grid or split-pane arrangement)? Floating windows require no new JS library and match the existing single-overlay pattern, but multiple overlapping windows can feel cluttered for 4+ panes. Tiled layouts give a more IDE-like feel but require either a custom resize-handle implementation or a JS split-pane library, both of which add frontend surface area against the no-new-framework constraint.
      recommended: floating
      options:
        - key: floating
          label: Floating windows — freely-positionable overlay divs draggable by titlebar, no new library, matches current pattern
        - key: tiled
          label: Tiled layout — grid or split-pane filling the viewport, IDE-like feel, requires split library or custom resize handles
        - key: both-selectable
          label: User-toggleable between floating and tiled modes — maximum flexibility, maximum frontend complexity
      answer: null
    - id: q-worktree-default
      text: Should the launcher default to creating a worktree or running in the main repo?
      description: |
        When the launcher modal opens, should the CWD toggle default to creating/attaching a worktree (default-on), default to the main repo (default-off), or show a toggle that defaults off and requires the user to opt in (ask-per-launch-default-off)? This decision intersects with plan-1ad0496b which has a related question about worktree adoption friction. Defaulting to worktree-on reduces the chance of accidental main-repo modifications during parallel agent runs but adds friction for users who just want a quick terminal session without worktree overhead.
      recommended: ask-per-launch-default-off
      options:
        - key: default-on
          label: Default on — launcher always creates/attaches a worktree, safest for parallel agents, highest friction for simple use
        - key: default-off
          label: Default off — launcher defaults to main repo, zero friction but parallel agents can collide on the same working tree
        - key: ask-per-launch-default-off
          label: CWD toggle visible but defaults to main repo — user must opt in to worktree, no hidden magic
      answer: null
    - id: q-prereq-strategy
      text: Block on prerequisite bugs landing, or ship alongside with mitigations?
      description: |
        Should this plan block on bug-6ab963d3 (OTel SQLITE_BUSY + parallel-launch ensureServeForOtel race) and bug-d2d3fb3f (feature start writer contention) landing before cockpit ships, or should the cockpit ship alongside? Both bugs are now resolved (status=done) via the checkServeLock PID-file pattern in claude_serve_autostart.go:173–215. The original question was framed when these were open; the answer is now effectively moot — cockpit can ship without mitigations because the root causes are fixed. Keeping the question for historical context and to record the strategy that was used.
      recommended: ship-alongside-with-mitigations
      options:
        - key: block-until-fixed
          label: Block — gate cockpit on bug-6ab963d3 and bug-d2d3fb3f being closed, clean integration but unknown delay
        - key: ship-alongside-with-mitigations
          label: Ship alongside — cockpit with mutex and debounce mitigations in slice-6 and TODO markers, earlier value, accepted risk
        - key: ship-and-lean-on-future-fixes
          label: Ship now — no mitigations, accept flaky behavior, let root-cause bugs carry the fix, fastest to ship, worst user experience
      answer: null
    - id: q-auth-model
      text: Stay localhost-only, or introduce ttyd credentials now?
      description: |
        Should cockpit endpoints and ttyd sessions remain localhost-only forever, or should we introduce ttyd --credential / bearer token authentication now to future-proof the cockpit for remote or Codespaces exposure? Localhost-only is the current security posture for the entire dashboard and requires no changes; introducing credentials now adds implementation surface but means the cockpit would be ready for a remote-access story without a breaking API change. The ttyd --credential flag already exists and is unused today.
      recommended: localhost-only-v1
      options:
        - key: localhost-only-v1
          label: Localhost only — no auth added, localhost bind is the security boundary, document remote story as a future track
        - key: bearer-token-now
          label: Bearer token — add Authorization header support to /api/terminal/* endpoints and pass credentials to ttyd, future-proofs remote access
        - key: ttyd-credential-now
          label: ttyd credential — use ttyd --credential user:pass per session, simpler than bearer tokens but per-session credential management is awkward
      answer: null
    - id: q-pane-persistence
      text: Should live panes persist across dashboard reloads or die on tab close?
      description: |
        When the user closes the dashboard browser tab or reloads, should live ttyd processes continue running (pane persistence) so the dashboard can reattach on next load, or should closing the dashboard kill all panes? Persistence means ttyd processes are long-lived server-side resources that the user must explicitly stop, which is consistent with how tmux sessions work and matches the use case of long-running yolo agents. Kill-on-unload is simpler and avoids orphaned processes but breaks the multi-agent workflow where a user wants to monitor progress from the dashboard without disrupting running agents.
      recommended: persist-across-reloads
      options:
        - key: persist-across-reloads
          label: Persist — ttyd processes outlive the browser tab, GET /api/terminal/sessions + pane re-render on reload restores the cockpit state
        - key: kill-on-beforeunload
          label: Kill on close — beforeunload fires POST /api/terminal/stop for all panes, clean process hygiene but breaks long-running agent workflows
        - key: configurable
          label: Configurable — user preference in dashboard settings for persist vs kill, maximum flexibility, adds settings UI surface
      answer: null
    - id: q-worktree-package-boundary
      text: Should worktree creation logic live in internal/worktree package or as a cmd/htmlgraph sibling file?
      description: |
        The worktree extraction in slice-3 can either create a full internal/worktree package (accessible to any future internal consumer) or a cmd/htmlgraph/worktree_helpers.go sibling file (accessible only to cmd/htmlgraph callers). Today, all callers of worktree creation are in cmd/htmlgraph (yolo.go, terminal_handlers.go, codex.go, gemini.go). An internal package adds import friction and indirection for what is currently a cmd-only utility. YAGNI recommends the sibling file; promote to internal/worktree only when a non-cmd caller appears.
      recommended: cmd-htmlgraph-sibling-file
      options:
        - key: internal-package
          label: internal/worktree package — accessible to any future internal consumer, adds import path, correct if cross-package use arrives
        - key: cmd-htmlgraph-sibling-file
          label: cmd/htmlgraph/worktree_helpers.go — sibling file, no new package overhead, promote when a non-cmd caller appears (YAGNI)
        - key: inline-stay-in-yolo-go
          label: Stay inline in yolo.go — no extraction, duplicate in terminal_handlers.go when needed, maximum duplication
      answer: null
    - id: q-spawn-sync-model
      text: Should the Start handler block until ttyd binds its port, or return immediately with state=pending?
      description: |
        The current waitForPort call blocks the HTTP handler for up to 3s per request. Under concurrent pane launches (4+ simultaneous POSTs), all goroutines block simultaneously, potentially stalling the HTTP server. The alternative is to return immediately with {id, state: "pending"} and let the frontend poll GET /api/terminal/sessions until state=live. This decouples spawn latency from HTTP response latency and gives better UX under load. A third option is server-sent events that push a state-change notification to the frontend when the port binds.
      recommended: return-pending-let-frontend-poll
      options:
        - key: block-until-bound
          label: Block until bound — waitForPort stays in handler, simple response contract, degrades under concurrent launches
        - key: return-pending-let-frontend-poll
          label: Return pending — handler returns {id, state:"pending"} immediately, frontend polls /sessions for state=live, better concurrency
        - key: sse-event-when-live
          label: SSE event — handler returns immediately, pushes state-change via SSE endpoint when port binds, lowest frontend polling overhead
      answer: null
    - id: q-yolo-mode-shape
      text: Should agent=yolo in the cockpit invoke the htmlgraph yolo wrapper or build the equivalent command directly?
      description: |
        The htmlgraph yolo wrapper performs several side effects before launching claude: removeMarketplaceHtmlgraph, ensureServeForOtel, launch-marker write, and worktree setup. Running htmlgraph yolo --feature X inside a ttyd pane produces a ttyd→bash→htmlgraph yolo→claude nested-process chain where yolo's side effects fire from inside the child. The alternative is for buildShellCmd to emit claude directly with --permission-mode bypassPermissions and the yolo system-prompt flag, skipping the wrapper and its side effects. This avoids the nested-process chain but means any future yolo wrapper behavior must be duplicated or referenced.
      recommended: same-as-claude-with-flags
      options:
        - key: same-as-claude-with-flags
          label: Same as claude — buildShellCmd emits claude + --permission-mode bypassPermissions + yolo system-prompt, skips wrapper, no nested processes
        - key: use-htmlgraph-yolo-wrapper
          label: Use htmlgraph yolo wrapper — nested process chain, all existing yolo side effects preserved, wrapper changes automatically included
      answer: null
    - id: q-liveness-signal
      text: How should the frontend learn that a ttyd pane has exited unexpectedly?
      description: |
        When a ttyd process dies (user Ctrl-C inside the pane, process crash, OOM), the Go reaper goroutine in internal/terminal/terminal.go:108–113 removes the session from the in-memory map, but the iframe stays up showing a dead port. The frontend needs a mechanism to detect this and show an "Ended" state within 5s. Polling /api/terminal/sessions every few seconds is the simplest approach; SSE provides lower latency and less overhead but adds an event-stream endpoint and frontend SSE client; WebSocket push is the most capable but highest infrastructure cost.
      recommended: poll-inventory
      options:
        - key: poll-inventory
          label: Poll inventory — frontend polls GET /api/terminal/sessions every 3–5s, marks panes Ended when session_id disappears, simplest implementation
        - key: sse-stream
          label: SSE stream — server pushes state-change events to frontend, lower polling overhead, requires SSE endpoint + EventSource client
        - key: websocket-push
          label: WebSocket push — full duplex, lowest latency, highest infrastructure cost, overkill for pane-exit notification
      answer: null
