meta:
    id: plan-14772c97
    track_id: trk-6456fe7d
    title: Agent Teams plugin integration
    description: |
        Wire HtmlGraph to Claude Code's experimental agent-teams feature. The hook declarations and Go handlers already exist, but they drop teammate metadata on the floor, the orchestrator skill has zero guidance on when to use teams, and there is no quality-gate teeth on the team lifecycle hooks. This plan closes those concrete gaps without speculative scope.
    created_at: "2026-04-11"
    status: finalized
    created_by: claude-opus-4-6
    version: 5
design:
    problem: |
        Claude Code v2.1.32+ ships an experimental agent-teams feature (CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1) where independent Claude instances self-claim work from a shared task list and message each other directly. The HtmlGraph plugin has already declared TeammateIdle, TaskCreated, and TaskCompleted hooks in plugin/hooks/hooks.json and wired Go handlers in internal/hooks/missing_events.go — but those handlers silently discard the teammate_name, team_name, idle_reason, task_subject, and task_description fields that Claude Code emits in the JSON payload, because the CloudEvent struct in internal/hooks/runner.go (lines 21-61) has no place to put them. As a result: multiple teammates working on one feature look identical in the HtmlGraph step log, the TaskCreated handler records using EventCheckPoint as a fallback (because internal/models/enums.go has no EventTaskCreated constant), and the 871-line orchestrator-directives skill never tells the lead agent that agent teams exist as a delegation option. The hooks observe but cannot enforce — exit-code-2 blocking is documented and supported by Claude Code, but no handler uses it. Notably, internal/hooks/yolo_guard.go already implements the exact blocking pattern we need (detect project, run gate, exit 2 on failure) but only fires for a different event.
    goals:
        - '**Capture teammate metadata** — every TeammateIdle / TaskCreated / TaskCompleted event records teammate_name and team_name in the HtmlGraph events DB'
        - '**Restore event taxonomy** — TaskCreated logs as EventTaskCreated, not EventCheckPoint, so analytics queries can distinguish task creation from arbitrary checkpoints'
        - '**Surface attribution** — feature steps written by team task hooks identify which teammate owns each step, visible in `htmlgraph snapshot`'
        - '**Document the decision** — the orchestrator skill has a concrete `Agent Teams vs Subagents` section so the lead agent knows when (and when not) to spawn a team'
        - '**Optional quality teeth** — TaskCompleted gains an opt-in quality gate that warns by default and can refuse completion via exit code 2 when explicitly enabled'
    constraints:
        - Agent teams is **experimental** and gated on CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 — the plugin must work for users who never enable it (no hard dependency)
        - 'The shared task list under ~/.claude/tasks/<team>/ is **not a stable API** — docs say `don''t edit by hand or pre-author it: your changes are overwritten`. Do not read or sync those files; rely on hook payloads only'
        - Subagent `skills:` and `mcpServers:` frontmatter fields are **not applied** when a subagent runs as a teammate — orchestrator skill must warn against relying on them in agent definitions used as teammates
        - Only **one team per session** and **no nested teams** — `htmlgraph:execute` parallel skill keeps working unchanged; this plan does not try to convert it to a team
        - '**No session resume** with in-process teammates — quality-gate blocking via exit code 2 strands a teammate the user cannot recover via /resume; default-off opt-in is required and stderr must include manual recovery instructions'
        - '**Schema changes must be idempotent** — every new column on agent_events and any CHECK constraint update must follow the existing pattern in internal/db/schema.go (ALTER TABLE ADD COLUMN with IF NOT EXISTS guards)'
        - '**No new file collisions** — internal/hooks/quality_gate.go already exists as a code-hygiene checker; new task-completion gate code must use a different filename'
        - '**Reuse existing detectors** — internal/paths.DetectProjectType() and internal/paths.TestCommandFor() are the canonical project detection helpers; new code must call them, not reimplement'
    approved: false
    comment: ""
slices:
    - id: feat-aatm0001
      num: 1
      title: Capture teammate metadata in CloudEvent + persist to events DB
      what: |
        Extend the `CloudEvent` struct in internal/hooks/runner.go (lines 21-61) with five new optional fields: `TeammateName string`, `TeamName string`, `IdleReason string`, `TaskSubject string`, `TaskDescription string`. Tag them with the exact JSON keys Claude Code emits (`teammate_name`, `team_name`, `idle_reason`, `task_subject`, `task_description`). Update internal/hooks/missing_events.go so TeammateIdle (line 85), TaskCreated (line 93), and TaskCompleted (line 147) handlers read from the typed fields. Today TaskCreated and TaskCompleted poke into TaskData["subject"]; switch them to event.TaskSubject, falling back to TaskData only when the typed field is empty (preserves non-team callers). Add idempotent ALTER TABLE statements to internal/db/schema.go (following the lines 41-66 pattern) adding `teammate_name TEXT` and `team_name TEXT` columns to agent_events. Update recordSimpleEvent (missing_events.go:19) to optionally accept these and bind them in the INSERT.
      why: |
        Foundation for every other slice. Today the JSON payload is parsed into CloudEvent and the team-specific fields are silently dropped. Without them, attribution, blocking, and analytics are all impossible. Following the internal/hooks/subagent_start.go pattern: typed fields on CloudEvent, handlers read them, persisted to DB.
      files:
        - internal/hooks/runner.go
        - internal/hooks/missing_events.go
        - internal/db/schema.go
        - internal/hooks/runner_test.go
        - internal/hooks/missing_events_test.go
      deps: []
      done_when:
        - CloudEvent struct has TeammateName, TeamName, IdleReason, TaskSubject, TaskDescription fields with correct JSON tags
        - TeammateIdle handler records TeammateName and IdleReason in event details (not just `Teammate agent went idle`)
        - TaskCreated and TaskCompleted handlers prefer typed TaskSubject; fall back to TaskData["subject"] when empty
        - Idempotent ALTER TABLE adds teammate_name and team_name columns to agent_events
        - Schema migration runs cleanly on a database that already has the columns (idempotent re-run is a no-op)
        - Unit test feeds a sample agent-teams JSON payload through CloudEvent and asserts every new field is populated
        - When teammate_name is absent from payload (legacy / non-team caller), all fields are empty strings and existing behavior is unchanged
      effort: S
      risk: Low
      tests: |
        Unit: TestCloudEvent_AgentTeamsPayload — JSON with teammate_name="implementer", team_name="my-team", idle_reason="waiting" → assert all five fields populated.
        Unit: TestCloudEvent_LegacyPayload — JSON without team fields → assert fields are empty strings, no panics.
        Unit: TestTeammateIdle_RecordsTeammateName — fake event with teammate_name="implementer" → assert recorded event details contain "implementer" and idle_reason.
        Unit: TestSchema_TeammateColumnsIdempotent — run migration twice on the same DB → second run is a no-op, columns exist.
        Regression: existing missing_events_test.go tests (the file exists per git status) still pass with TaskData fallback path preserved.
      approved: true
      comment: ""
    - id: feat-aatm0002
      num: 2
      title: Add EventTaskCreated model constant
      what: |
        Add `EventTaskCreated` constant to internal/models/enums.go alongside EventTeammateIdle (line 141) and EventTaskCompleted (line 142). Update ONLY the TaskCreated handler in internal/hooks/missing_events.go (line 115) to use the new constant instead of EventCheckPoint. Leave the other 7 EventCheckPoint usages alone — they are legitimate checkpoints (PreCompact, PostCompact, InstructionsLoaded, etc.). If internal/db/schema.go has a CHECK constraint enumerating valid event_type values, add `task_created` to the constraint via the idempotent migration pattern.
      why: |
        Today TaskCreated events look identical to manual checkpoints in analytics queries. Filtering, dashboards, and velocity calculations conflate them. Tiny fix, high signal-to-noise ratio.
      files:
        - internal/models/enums.go
        - internal/hooks/missing_events.go
        - internal/db/schema.go
      deps: []
      done_when:
        - EventTaskCreated constant defined in enums.go using the same convention as EventTaskCompleted
        - Only the TaskCreated handler at missing_events.go:115 uses the new constant; the other 7 EventCheckPoint usages remain unchanged
        - If a CHECK constraint exists, it accepts `task_created` after migration, AND the migration is idempotent
        - No regression in queries that previously matched EventCheckPoint for non-task events
      effort: S
      risk: Low
      tests: |
        Unit: TestTaskCreated_UsesCorrectEventType — call handler with sample event, query DB, assert event_type='task_created'.
        Unit: TestEventCheckPoint_StillUsedByLegitimateCallers — assert grep for EventCheckPoint still finds 7 callers (regression guard against accidental cleanup).
        Regression: any existing test filtering on EventCheckPoint for non-task events still passes.
      approved: true
      comment: ""
    - id: feat-aatm0003
      num: 3
      title: Teammate attribution on feature step text (step-text-only)
      what: |
        Modify `addTaskStep` and `completeTaskStep` in internal/hooks/task_tracking.go (NOT missing_events.go — that was the v1 plan's wrong file) to accept an optional `teammateName string` parameter. When non-empty, prefix the step description passed to the `htmlgraph feature add-step` shell-out with `[teammate-name] `. Update the two callers in internal/hooks/missing_events.go (TaskCreated handler at line 136-ish; TaskCompleted handler at the parallel call site) to pass `event.TeammateName` from slice 1's typed field. No schema change; no frontend work. Snapshot output already renders step descriptions verbatim (cmd/htmlgraph/snapshot.go), so attribution becomes visible automatically once the prefix is in the step text.
      why: |
        Multiple teammates working on one feature is the central use case for agent teams in HtmlGraph. Without attribution the step log is unusable — you can't tell who is doing what. Step-text-only avoids the schema migration, frontend rendering, and dashboard JS work that bigger options would require. This is the minimum viable attribution surface — see question q-attribution-surface for the broader options.
      files:
        - internal/hooks/task_tracking.go
        - internal/hooks/missing_events.go
        - internal/hooks/task_tracking_test.go
      deps:
        - 1
      done_when:
        - addTaskStep and completeTaskStep accept teammateName string parameter
        - Non-empty teammateName produces step text prefixed `[teammate-name] <subject>`
        - Empty teammateName produces unchanged step text (legacy behavior)
        - missing_events.go callers pass event.TeammateName (from slice 1)
        - '`htmlgraph snapshot` shows the prefixed text on team-originated steps without any snapshot.go changes'
        - Frontend dashboard work is explicitly OUT OF SCOPE and noted as a follow-up
      effort: S
      risk: Low
      tests: |
        Unit: TestAddTaskStep_WithTeammate — call with teammateName="reviewer" → assert shell-out received `[reviewer] <subject>`.
        Unit: TestAddTaskStep_NoTeammate — call with empty teammateName → assert legacy format preserved.
        Integration: end-to-end TaskCreated event with teammate_name="implementer" populates a feat- step text with the prefix; snapshot output contains it.
      approved: true
      comment: ""
    - id: feat-aatm0004
      num: 4
      title: Opt-in quality gate on TaskCompleted
      what: |
        Create internal/hooks/task_completion_gate.go (NOT quality_gate.go — that file already exists as a code-hygiene checker, ~293 lines, would collide). The new file calls internal/paths.DetectProjectType() and internal/paths.TestCommandFor() — both already exist — to determine what to run. internal/hooks/yolo_guard.go uses the exact pattern at line 256 and is the canonical template. Returns `{passed bool, gateName string, output string}`. Add a 60-second timeout via context.WithTimeout — failing open (warn, do not block) on timeout to avoid stranding teammates indefinitely.
        Modify TaskCompleted handler in internal/hooks/missing_events.go to invoke the gate ONLY when an opt-in flag is read from .htmlgraph/config.json (file may not exist; absence = flag off). Do NOT create a new internal/config package — read the JSON file inline with encoding/json (the file is small, the lookup is rare, a dedicated package is YAGNI). The flag key is `block_task_completion_on_quality_failure: bool` (default false).
        When the flag is on AND gate fails: write to stderr a structured message naming the failed gate AND a recovery instruction (`To complete this task manually after fixing: htmlgraph feature complete <feature-id>`), then exit with code 2. When the flag is on AND gate passes: proceed with existing completeTaskStep flow. When the flag is off: warn-only — log the failure to the events DB but do not exit non-zero.
      why: |
        The docs explicitly support exit-code-2 blocking on TaskCompleted. This converts HtmlGraph from a passive observer of team activity into an enforcer of quality gates — a teammate cannot mark a task done with broken builds. Default-off plus a recovery instruction respects the no-session-resume caveat: a stranded teammate's work can still be salvaged via the manual CLI completion command. Reusing yolo_guard and paths means roughly 60 lines of new code, not a new package.
      files:
        - internal/hooks/task_completion_gate.go
        - internal/hooks/missing_events.go
        - internal/hooks/task_completion_gate_test.go
      deps:
        - 1
      done_when:
        - task_completion_gate.go exists (NOT quality_gate.go) and calls paths.DetectProjectType + paths.TestCommandFor
        - Gate runs under context.WithTimeout(60s); on timeout returns warn-only result
        - TaskCompleted reads .htmlgraph/config.json inline; missing file = flag off; no new internal/config package
        - Flag off + gate failure = warn-only (event recorded, exit 0)
        - Flag on + gate failure = exit code 2 with stderr naming the gate AND recovery command
        - Flag on + gate pass = proceeds to completeTaskStep unchanged
        - Documented in S5 orchestrator skill section AND S6 user-facing docs
      effort: M
      risk: Med
      tests: |
        Unit: TestTaskCompletionGate_DetectsGoProject — fake go.mod, assert calls TestCommandFor.
        Unit: TestTaskCompletionGate_TimeoutFailsOpen — fake gate that hangs > 60s, assert returns warn result, no panic.
        Unit: TestTaskCompleted_FlagOff_NeverBlocks — config absent, gate would fail, exits 0.
        Unit: TestTaskCompleted_FlagOn_BlocksOnFailure — config flag true + failing gate, asserts exit code 2 and stderr contains gate name + recovery command.
        Unit: TestTaskCompleted_FlagOn_PassesOnSuccess — config flag true + passing gate, asserts exit 0 and step recorded.
        Regression: existing missing_events_test.go for TaskCompleted continues to pass when no config file exists.
      approved: true
      comment: ""
    - id: feat-aatm0005
      num: 5
