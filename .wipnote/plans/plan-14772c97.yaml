questions:
    - id: q-env-flag-default
      text: Should the HtmlGraph plugin auto-set CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1, or require explicit user opt-in?
      description: |
        Auto-setting the flag in plugin settings.json would make the hooks immediately useful for every HtmlGraph user, but it forces an experimental, one-team-per-session, no-nested-teams constraint on users who may never want it. Opt-in keeps HtmlGraph backward-compatible and respects the experimental status of the upstream feature, but means most users never discover the integration. The hooks already no-op gracefully when no team is active, so auto-set is technically safe — the question is whether it's polite.
      recommended: opt-in
      options:
        - key: auto-set
          label: 'Auto-set: plugin settings.json sets the env var; users get teams immediately, with the experimental constraints they did not ask for'
        - key: opt-in
          label: 'Opt-in: docs explain how to set the flag; HtmlGraph captures team events when present but stays passive otherwise (recommended — respects experimental status)'
        - key: prompt-on-first-run
          label: 'Prompt on first run: SessionStart hook detects missing flag and asks once via stderr — clever but adds startup noise to every session'
      answer: null
    - id: q-quality-gate-mode
      text: How aggressive should the TaskCompleted quality gate be?
      description: |
        Slice 4 adds an opt-in exit-code-2 blocking quality gate. Blocking has a sharp edge: in-process teammates cannot be resumed via /resume, so a blocked teammate that the user can't fix immediately is stranded — though slice 4 mitigates this by writing a manual recovery command to stderr. Always-block is safest for code quality but harshest for UX. Configurable-default-warn (the current slice 4 design) lets users opt into blocking once they trust the gate. Warn-only means the gate is purely advisory and the slice is much simpler. Skipping the slice entirely defers the work.
      recommended: configurable-default-warn
      options:
        - key: always-block
          label: 'Always block: every team using HtmlGraph gets enforced gates; harshest UX, may strand teammates'
        - key: configurable-default-warn
          label: 'Configurable, default warn: opt-in to blocking via .htmlgraph/config.json; warns by default, recovery command in stderr (recommended — current slice 4 design)'
        - key: warn-only
          label: 'Warn-only: gate runs and logs failures but never blocks; simpler implementation, no risk of stranding'
        - key: skip-slice
          label: 'Skip slice 4 entirely: defer quality gate work to a follow-up plan once we have field experience with team events'
      answer: null
    - id: q-task-list-sync
      text: Should we attempt to sync the team's shared task list (~/.claude/tasks/<team>/) into HtmlGraph work items?
      description: |
        The richest possible integration would let HtmlGraph see every task in a team's shared list, mirror them as work items, and show cross-teammate dependencies in the dashboard. But the docs explicitly warn against reading or pre-authoring those files: `Claude Code generates both automatically — don't edit by hand or pre-author it: your changes are overwritten on the next state update`. The format is undocumented and unstable. A spike to reverse-engineer the schema is possible but risks breakage on every upstream version bump.
      recommended: defer
      options:
        - key: implement-now
          label: 'Implement now: read ~/.claude/tasks/<team>/ in a SessionStart-driven sync — fragile, schema may change'
        - key: spike-to-document
          label: 'Spike: investigate the file format, write findings to a research note, decide later — adds scope without payoff'
        - key: defer
          label: 'Defer: rely entirely on TaskCreated/TaskCompleted hook payloads (which ARE documented) for visibility (recommended — durable contract)'
      answer: null
    - id: q-attribution-surface
      text: How should teammate attribution appear on feature steps in slice 3?
      description: |
        Slice 3 needs to show which teammate owns each step. Step text is simplest — prefix the step note with `[teammate-name]` and we're done, no schema change, no frontend work. Critique confirmed that the original v1 plan's `internal/dashboard/feature_view.go` does not exist; the dashboard is a static JS frontend served from cmd/htmlgraph/dashboard/. A new dedicated step field would require schema migration AND JS changes to render. A new dashboard panel is the richest but biggest scope.
      recommended: step-text-only
      options:
        - key: step-text-only
          label: 'Step text prefix: `[implementer] <subject>` — zero schema change, zero frontend work, immediate visibility (recommended — current slice 3 design)'
        - key: new-step-field
          label: 'New TeammateName field on step: structurally clean, requires schema migration AND JS frontend renderer updates'
        - key: new-dashboard-panel
          label: 'Dedicated `Teammate Activity` dashboard panel: richest UX, largest scope, deferred to follow-up'
      answer: null
