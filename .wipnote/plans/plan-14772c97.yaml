      what: |
        Append a new section to plugin/skills/orchestrator-directives-skill/SKILL.md (currently 871 lines, zero agent-teams mentions) titled `Agent Teams vs Subagents`. Cap the section at 150 lines. Cover: (1) decision criteria — use teams for parallel ownership, competing-hypothesis debugging, multi-lens code review; use subagents for sequential delegation; (2) opt-in via CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 and minimum Claude Code version 2.1.32 — quoted exactly; (3) how to spawn — natural language `Create an agent team to ...` (no SDK API exists); (4) caveats: subagent `skills:` and `mcpServers:` frontmatter NOT applied to teammates (warn against relying on them in agents used as teammates), no session resume, one team per session, no nested teams; (5) three concrete example prompts mapped to HtmlGraph use cases (multi-lens PR review, competing-hypothesis debug, feature ownership splitting); (6) what HtmlGraph captures in response — events with teammate attribution from slice 1, step prefixes from slice 3, optional quality gate from slice 4 (with opt-in instructions and the stranding warning).
      why: |
        The orchestrator skill is 871 lines and mentions agent teams zero times. Without this section the lead agent will never reach for teams when they would actually help, and the rest of the slices have no consumer.
      files:
