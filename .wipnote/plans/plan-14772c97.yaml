    risks:
        - risk: Exit code 2 blocking strands in-process teammates that cannot be /resumed
          severity: High
          mitigation: Default off (opt-in only via .htmlgraph/config.json); when on, stderr includes manual recovery command `htmlgraph feature complete <id>`; documented in S5 + S6 with explicit warning
        - risk: 'Hook timeout: build/test gates may exceed Claude Code''s hook timeout'
          severity: High
          mitigation: context.WithTimeout(60s) in task_completion_gate.go; on timeout, return warn-only result (fail open, do not strand)
        - risk: agent_events schema migration on live databases may fail or be non-idempotent
          severity: Medium
          mitigation: Use schema.go:41-66 IF NOT EXISTS pattern; done_when requires running migration twice on same DB to be a no-op
        - risk: Hook payload schema is experimental and may change upstream
          severity: Medium
          mitigation: Typed CloudEvent fields fall back to TaskData map when empty, preserving compatibility with both old and new payload shapes
        - risk: Frontend dashboard does not surface teammate attribution in this plan
          severity: Low
          mitigation: Step-text-only via snapshot.go is sufficient for v1; dashboard panel deferred to follow-up; q-attribution-surface flags the alternatives
    synthesis: |
        The v1 plan was directionally right but had four falsified file paths (internal/dashboard/feature_view.go non-existent, quality_gate.go name collision, internal/config package non-existent, plugin/README.md non-existent) and missed the most important prior art (yolo_guard.go as the exact blocking-gate template). Revisions: (1) Slice 1 now includes idempotent schema migration for new columns; (2) Slice 3 retargeted to task_tracking.go, scoped to step-text-only, no frontend work; (3) Slice 4 renamed file to task_completion_gate.go, reuses paths.DetectProjectType + paths.TestCommandFor + yolo_guard pattern, drops the non-existent config package in favor of inline JSON read, adds 60-second timeout fail-open, adds stderr recovery instructions; (4) Slice 6 retargeted to AGENTS.md and CLAUDE.md; (5) Constraints expanded to forbid file collisions and mandate detector reuse; (6) S5 done_when now requires the skills/mcpServers caveat to be documented explicitly. Action items before review: 1. Confirm question q-attribution-surface answer aligns with revised
           slice 3 (step-text-only).
        2. Confirm question q-quality-gate-mode answer aligns with revised
           slice 4 (configurable-default-warn).
        3. Decide question q-env-flag-default and q-task-list-sync.
