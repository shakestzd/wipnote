        - Three example prompts shown verbatim
        - Caveats list includes the skills/mcpServers limitation, no-resume warning, and one-team-per-session
        - Quality-gate opt-in flag (slice 4) is documented with the stranding warning
        - Skill loads without YAML frontmatter errors after edit
      effort: S
      risk: Low
      tests: |
        Unit: none (documentation).
        Integration: manual smoke — invoke /htmlgraph:orchestrator-directives-skill, verify the new section renders.
        Regression: existing 871 lines untouched; only an append.
      approved: true
