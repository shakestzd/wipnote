meta:
    id: plan-8ee8f517
    track_id: trk-c4615ad2
    title: Mount NDJSON to SQLite indexer inside per-session otel-collect; close contention holes
    description: |
        Make the documented "NDJSON canonical, SQLite derived" contract operational by mounting the existing internal/otel/indexer as a goroutine inside the per-session otel-collect subprocess. Address four contention/throughput issues the researcher surfaced: (1) hooks bypass the indexer with direct INSERTs into otel_signals, (2) indexer WriteBatch is O(N) per signal, (3) gracefulShutdown has no indexer drain inside its 3s window, (4) internal/registry/registry.go bypasses db.Open and inherits no busy_timeout. End state: dashboard read paths see live span data again, single writer per session, NDJSON remains source of truth, SQLite is a rebuildable derived index.
    created_at: "2026-04-26"
    status: finalized
    created_by: claude-opus
    version: 5
design:
    problem: |
        The per-session otel-collect subprocess writes spans only to NDJSON files at .htmlgraph/sessions/<id>/events.ndjson. The indexer that bridges NDJSON to SQLite (internal/otel/indexer) has zero production callers — it was pulled out of _serve-child to fix SQLITE_BUSY contention (bug-4697c62c) and never re-mounted. Consequence: every read path against otel_signals (dashboard /api/otel/* endpoints, htmlgraph session list, the internal/otel/materialize layer) sees stale or empty data because nothing writes live spans into SQLite. The documented contract from feat-b6479241 is technically intact but operationally broken. Compounding: hooks at internal/hooks/transcript_user_prompt.go:191 and transcript_assistant.go:298 write directly to otel_signals via raw SQL, bypassing the indexer; indexer.go:228-231 calls WriteBatch once per signal; otel_collect.go:168-172 gracefulShutdown has a hard 3s deadline with no indexer drain; internal/registry/registry.go:216 bypasses the canonical db.Open helper and never inherits busy_timeout=5000.
    goals:
        - '**Live span visibility** — dashboard and CLI reads against otel_signals return current data within one indexer tick (~500ms) of OTLP receive'
        - '**Single writer per session** — exactly one process holds a SQLite write handle for a given session''s OTel data'
        - '**Documented contract operational** — NDJSON files are source of truth; SQLite is rebuildable via the indexer or htmlgraph reindex'
        - '**Throughput floor** — indexer sustains 1000 signals/sec on a 4-core dev container without becoming the bottleneck'
        - '**Shutdown safety** — SIGTERM drains the indexer cleanly within an extended budget; orphaned signals recover via checkpoint replay on next collector launch'
    constraints:
        - Must not change OTLP wire format or the WriterCloser / SignalSink interfaces beyond widening WriteBatch to accept a batch
        - Must preserve idempotent replay — checkpoint reset → full replay → INSERT OR IGNORE keeps DB consistent
        - Must coexist with work-item HTML hooks that also write to the canonical DB
        - Per-session collector remains the only OTLP receiver — no central daemon
        - Cannot break in-flight OTel sessions on rollout — handshake protocol stays the same
        - Build break in internal/otel/indexer/indexer_test.go (stale internal/otel/receiver import) must be fixed before any indexer-touching slice can be tested — addressed by slice-8
        - 'errgroup is not allowed: golang.org/x/sync is not in go.mod requires; use sync.WaitGroup + error channel'
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-65432141
      num: 1
      title: Mount indexer goroutine inside otel-collect
      what: |
        In cmd/htmlgraph/otel_collect.go runOtelCollect, spawn internal/otel/indexer.New(...).Start(ctx) as a goroutine after the HTTP server starts and before awaitShutdown blocks. Coordinate goroutine lifecycle via a `sync.WaitGroup` plus an error channel (stdlib only — `golang.org/x/sync/errgroup` is not in `go.mod` requires) so server + indexer share lifecycle and a cancellation propagates to both. The indexer's *sql.DB injection is decided in q-db-handle-injection (recommended: collector opens via db.Open and injects via WithDB). Pass the indexer the `.htmlgraph/` subdirectory path: `htmlgraphDir := filepath.Join(projectDir, ".htmlgraph")` — `indexer.New` does NOT accept the project root. DB handle injection follows q-db-handle-injection (recommended option-b): collector calls `db.Open(<canonical-db-path>)` and passes the handle to `indexer.New(...).WithDB(db)`. The collector also adds `internal/db` to its imports for the first time.
      why: |
        The indexer code in internal/otel/indexer exists and is unmounted; this is the missing wiring that makes spans visible in SQLite. Without it, every /api/otel/* endpoint and the dashboard return empty.
      files:
        - cmd/htmlgraph/otel_collect.go
        - cmd/htmlgraph/otel_collect_test.go
      deps:
        - 8
      done_when:
        - runOtelCollect launches an indexer goroutine when the collector starts
        - SIGTERM cancels the indexer ctx and the goroutine returns from Start within the shutdown window (covered fully by slice-2)
        - An OTLP span POSTed to the collector appears in SQLite otel_signals within one indexer tick (~500ms)
      effort: M
      risk: Med
      tests: |
        Unit: TestRunOtelCollect_LaunchesIndexer — verify indexer constructed with the project dir resolved from --project-dir flag.
        Integration: TestOtelCollect_OTLPToSQLite — start collector with a tmp .htmlgraph/, POST OTLP /v1/traces, sleep 1s, query otel_signals for the inserted signal_id, assert row exists.
        Regression: existing TestOtelCollect_* in cmd/htmlgraph/otel_collect_test.go must still pass at -count=3.
      approved: false
      comment: ""
    - id: slice-2
      feature_id: feat-03deaa60
      num: 2
      title: Extend gracefulShutdown to drain the indexer
      what: |
        In gracefulShutdown at cmd/htmlgraph/otel_collect.go:168, wait on the indexer goroutine via the WaitGroup before returning. Lift the hard 3s deadline to a configurable budget — default 10s, overridable via HTMLGRAPH_OTEL_DRAIN_SECS — since drain may flush a backlog of NDJSON. Order of teardown: HTTP server Shutdown → cancel indexer ctx → wait WaitGroup → snk.Close().
      why: |
        Without this, SIGTERM during active OTLP traffic orphans signals that have landed in NDJSON but not yet been indexed. Checkpoint replay covers the gap only if the same session is re-launched; for short-lived test sessions or ephemeral CI runs, that does not happen.
      files:
        - cmd/htmlgraph/otel_collect.go
        - cmd/htmlgraph/otel_collect_test.go
      deps:
        - 1
        - 8
      done_when:
        - SIGTERM during a 100-signal burst results in zero unindexed signals after the drain window
        - HTMLGRAPH_OTEL_DRAIN_SECS env var overrides the default budget
        - If drain exceeds budget, the collector logs the count of signals left in NDJSON and exits non-zero
        - Load test TestOtelCollect_GracefulShutdown_Under10kSignals confirms 10s drain is sufficient on a 4-core dev container
      effort: S
      risk: Low
      tests: |
        Integration: TestOtelCollect_GracefulShutdown_DrainsIndexer — emit 100 OTLP spans, send SIGTERM immediately, await process exit, query otel_signals, assert all 100 present.
        Unit: TestGracefulShutdown_RespectsDrainBudget — set HTMLGRAPH_OTEL_DRAIN_SECS=1 and verify the timeout fires.
      approved: false
      comment: ""
    - id: slice-3
      feature_id: feat-0fe674d9
      num: 3
      title: Migrate hook direct-writes to NDJSON
      what: |
        Remove the direct INSERT OR IGNORE into otel_signals from internal/hooks/transcript_user_prompt.go:191 and internal/hooks/transcript_assistant.go:298. Replace with NDJSON append to the session's events.ndjson — Verified by the feasibility critic that hooks have `sessionID` and `projectDir` in scope at the INSERT call sites (transcript_user_prompt.go:191 and transcript_assistant.go:298 receive both via the hook event payload and ResolveProjectDir helper). Implementation per q-write-coordination (recommended option-a): hooks call `ndjson.New(projectDir, sessionID).WriteBatch(...)`. The per-session collector's indexer picks them up on next tick. Hidden work flagged by the feasibility critic: the current INSERT writes raw column values (signal_id, span_id, ts_micros, etc.); the NDJSON line format is a full `otel.UnifiedSignal` struct. The mapping from raw transcript record fields to UnifiedSignal must be worked out explicitly during implementation — this is not a one-line replacement.
      why: |
        Eliminates the dual-writer contention that started this whole story (bug-4697c62c). Hooks become NDJSON producers, indexer becomes the sole SQLite writer. Without this slice, the indexer goroutine and the hook processes will fight for the canonical DB write lock under load.
      files:
        - internal/hooks/transcript_user_prompt.go
        - internal/hooks/transcript_assistant.go
      deps:
        - 1
      done_when:
        - grep -rn 'INSERT.*otel_signals' internal/hooks/ returns zero matches
        - A transcript hook invocation in a fresh session produces a row in otel_signals within one indexer tick after the hook returns
        - Hook latency under load (1k invocations) regresses by less than 5% versus the direct-SQLite baseline
      effort: M
      risk: High
      tests: |
        Integration: TestTranscriptHook_NDJSONEmission — invoke hook with a fixture transcript chunk, verify NDJSON line appended, run indexer once, verify otel_signals row.
        Bench: BenchmarkTranscriptHook_NDJSONvsSQLite — measure hook hot path before/after; document delta.
      approved: false
      comment: ""
    - id: slice-4
      feature_id: feat-7837411f
      num: 4
      title: Batch indexer WriteBatch calls
      what: |
        Change internal/otel/indexer/indexer.go:223-235's `writeParsedBatch` — accumulate signals into a slice and call WriteBatch once per tick per session. Apply the granularity decided in q-batch-granularity (recommended: cap at N=500 signals per txn, configurable via env). Verify before changing the SQLite sink: read `internal/otel/sink/sqlite/sqlite.go` WriteBatch and confirm whether it executes the slice in a single transaction or loops per signal. If it loops, the sink fix is in scope; if it already batches, only the indexer changes.
      why: |
        A 200-signal NDJSON tick currently produces 200 sequential SQLite INSERTs. With batching it is one transaction. Without this, the indexer becomes the new throughput bottleneck once it is mounted.
      files:
        - internal/otel/indexer/indexer.go
        - internal/otel/sink/sqlite/sqlite.go
        - internal/otel/indexer/indexer_test.go
      deps:
        - 1
        - 8
      done_when:
        - BenchmarkIndexer_BatchApply_1k sustains 1000 signals/sec on a 4-core dev container
        - Existing indexer tests pass at -count=3
        - Partial-batch failure rolls back the txn and does NOT advance the checkpoint, so replay covers the failure
      effort: S
      risk: Med
      tests: |
        Bench: BenchmarkIndexer_BatchApply_1k — 1k-signal NDJSON file, measure end-to-end apply throughput.
        Unit: TestIndexer_BatchPartialFailure_RollsBackAndPreservesCheckpoint — inject a duplicate-signal-id error mid-batch, assert no rows committed and checkpoint unchanged.
        Regression: TestIndexer_IdempotentReplay must still pass.
      approved: false
      comment: ""
    - id: slice-5
      feature_id: feat-5144acc8
      num: 5
      title: Apply WAL pragma to registry.OpenReadOnly path
      what: |
        internal/registry/registry.go:215-220 (`OpenReadOnly`) already sets `_busy_timeout=5000` in its DSN string — busy_timeout is NOT the gap (feasibility critic A4 falsified the original plan's framing). The actual gap is that this path skips the WAL mode pragma and other journal-mode logic in `internal/db/pragmas.go`. Refactor `OpenReadOnly` to either route through `db.Open(...)` (which applies all pragmas including WAL selection) or to explicitly invoke `BuildPragmas` from `internal/db/pragmas.go` after opening.
      why: |
        Silent contention hole — with the indexer goroutine now holding writes, any registry read during high write traffic can hit SQLITE_BUSY instantly because this caller did not inherit the standard busy_timeout DSN pragma.
      files:
        - internal/registry/registry.go
        - internal/registry/registry_test.go
      deps: []
      done_when:
        - OpenReadOnly applies the same WAL/journal-mode logic as db.Open (verified by querying PRAGMA journal_mode after open)
        - Existing registry tests pass at -count=3
      effort: S
      risk: Low
      tests: |
        Unit: TestRegistry_OpenAppliesPragmas — open a registry handle, query PRAGMA busy_timeout, assert >= 5000.
        Regression: existing internal/registry tests must still pass.
      approved: false
      comment: ""
    - id: slice-6
      feature_id: feat-d1f3b2a6
      num: 6
      title: Document NDJSON-canonical, SQLite-derived contract
      what: |
        Add internal/otel/README.md documenting: NDJSON at .htmlgraph/sessions/<id>/events.ndjson is source of truth; the per-session otel-collect process owns both the NDJSON sink and the indexer goroutine; SQLite otel_signals is a derived index with bounded staleness (one indexer tick); htmlgraph reindex rebuilds SQLite from NDJSON. Include a numbered flow showing OTLP receive → NDJSON write → indexer tick → SQLite row → dashboard read.
      why: |
        The last drift cycle (indexer mounted, then unmounted, then no one remembered) was 6 months and ended with bug-4697c62c. Future contributors need the contract written down so it does not drift again.
      files:
        - internal/otel/README.md
      deps:
        - 1
        - 2
        - 3
        - 4
      done_when:
        - internal/otel/README.md exists and references current file paths (no stale paths)
        - Includes a numbered flow diagram (ASCII or mermaid)
        - Linked from the top-level README.md or AGENTS.md OTel section
      effort: S
      risk: Low
      tests: |
        Manual: read the README cold and confirm a new contributor could mount the indexer themselves.
      approved: false
      comment: ""
    - id: slice-7
      feature_id: feat-9772ba80
      num: 7
      title: End-to-end smoke test for live span visibility
      what: |
        Add cmd/htmlgraph/integration_otel_visibility_test.go that launches the collector subprocess, emits a known OTLP span via raw HTTP POST, sleeps 1.5 ticks, then hits each /api/otel/* HTTP endpoint and asserts non-empty results for the known span ID. Designed as a trip-wire: deliberately removing the indexer goroutine from slice-1 must make this test fail.
      why: |
        Regression guard against the next "indexer got unhooked" event. One trip-wire that goes red if dashboard goes dark.
      files:
        - cmd/htmlgraph/integration_otel_visibility_test.go
      deps:
        - 1
        - 2
      done_when:
        - Test passes locally and in CI
        - Removing the indexer launch from slice-1 makes the test fail (verified by reverting slice-1 in a worktree)
      effort: S
      risk: Low
      tests: |
        Self.
      approved: false
      comment: ""
    - id: slice-8
      feature_id: feat-605aaaac
      num: 8
      title: 'PREREQ: Fix stale internal/otel/receiver import in indexer_test'
      what: |
        internal/otel/indexer/indexer_test.go:13 imports the deleted internal/otel/receiver package; the test file does not build today (verified: `go build ./internal/otel/indexer/...` fails). Replace setupIndexerDB to use db.Open from internal/db plus an inline minimal WriterCloser implementation (or reuse the existing fakeWriter at indexer_test.go:262 where DB writes aren't required). This must land before any other indexer-touching slice can be tested.
      why: |
        Hard precondition. Until this builds, slices 1, 2, 4, and 7 cannot have their tests written or run. Caught by the feasibility critic after the orchestrator wrote the original plan.
      files:
        - internal/otel/indexer/indexer_test.go
      deps: []
      done_when:
        - '`go build ./internal/otel/indexer/...` exits 0'
        - '`go vet ./internal/otel/indexer/...` exits 0'
        - '`go test ./internal/otel/indexer/...` passes for any tests not requiring downstream slices'
      effort: S
      risk: Low
      tests: |
        Self — the slice is itself a build/test fix.
      approved: false
      comment: ""
questions:
    - id: q-write-coordination
      text: How should hook processes deliver signals after we remove their direct otel_signals writes — write NDJSON directly, or POST to the collector's OTLP endpoint?
      description: |
        Slice 3 removes hooks' direct INSERT into otel_signals. They need a different sink. Option A: hooks open events.ndjson with O_APPEND+flock and write a JSON line, mirroring internal/otel/sink/ndjson. Lowest latency, no extra wire format, but two writers on one file (hook process + collector process) and the short-lived hook must know the session ID + project dir. Option B: hooks discover the collector's local listener port via a handshake file (.htmlgraph/sessions/<id>/.collector-port) and POST OTLP HTTP. Cleanest separation, but adds HTTP roundtrip latency to every hook invocation and requires hooks to handle the collector-not-running case. **Feasibility verified**: hooks at internal/hooks/transcript_user_prompt.go:191 and transcript_assistant.go:298 already have sessionID (from event payload) and projectDir (via ResolveProjectDir) in scope at the INSERT call sites. Option A is mechanically achievable today without a new handshake protocol.
      recommended: option-a
      options:
        - key: option-a
          label: 'A: Hooks write NDJSON directly — Hooks open events.ndjson with O_APPEND+flock, write a JSON line, close. Indexer picks up on next tick. Lowest latency, no extra wire format, requires hooks to know session ID + project dir.'
        - key: option-b
          label: 'B: Hooks POST OTLP to the collector — Hooks discover the collector port via handshake file and POST OTLP HTTP. Cleanest separation, adds HTTP roundtrip cost per invocation, requires collector-not-running fallback.'
      answer: null
    - id: q-db-handle-injection
      text: Where does the indexer's *sql.DB write handle come from when mounted inside otel-collect?
      description: |
        The indexer needs a write handle. Option A: indexer opens its own via db.Open(canonicalDBPath) inside Start. Self-contained but harder to mock and hides handle lifecycle. Option B: collector's runOtelCollect opens once at startup and injects via the existing WithDB option. Clear ownership, mockable, single close site. Option C: lazy — indexer opens on first received signal so an idle collector holds nothing. Saves resources for idle sessions but adds a branch in the hot path.
      recommended: option-b
      options:
        - key: option-a
          label: 'A: Indexer self-opens — Calls db.Open in Start. Self-contained but harder to mock; hides handle lifecycle.'
        - key: option-b
          label: 'B: Collector opens, injects via WithDB — runOtelCollect calls db.Open and passes to indexer. Clear ownership, mockable, single close site.'
        - key: option-c
          label: 'C: Lazy on first signal — Indexer opens on first WriteBatch. Idle collectors hold no handle but adds branch in hot path.'
      answer: null
    - id: q-batch-granularity
      text: What batch granularity should the indexer use when applying NDJSON to SQLite?
      description: |
        Slice 4 batches WriteBatch calls. Option A: one txn per session per tick — could be 0 to 10k signals; high latency on bursts and a single long-held write lock. Option B: one txn per file read pass — equivalent to A given the current per-session file layout. Option C: cap at N signals per txn (e.g. 500), splitting larger reads into multiple txns. Bounds rollback cost on partial failure and keeps any individual transaction short enough that the work-item HTML hooks (which also write to the same DB) do not starve.
      recommended: option-c
      options:
        - key: option-a
          label: 'A: One txn per session per tick — Simplest. A 10k-signal burst becomes one giant txn, blocks readers.'
        - key: option-b
          label: 'B: One txn per file read — Equivalent to A given current per-session file layout.'
        - key: option-c
          label: 'C: Capped at N signals per txn (default 500) — Splits large bursts. Bounded blast radius. N tunable via env.'
      answer: null
    - id: q-ndjson-retention
      text: Should NDJSON files be retained after the session ends?
      description: |
        NDJSON is source of truth. Once SQLite is indexed for a session, do we keep NDJSON forever, prune after N days, or prune once the indexer's checkpoint matches EOF and the session is marked ended? Retention enables htmlgraph reindex to fully rebuild SQLite from scratch. Pruning saves disk. Phase 2 of the OTel migration may further reduce or eliminate SQLite, in which case NDJSON becomes the only durable store.
      recommended: option-a
      options:
        - key: option-a
          label: 'A: Retain NDJSON forever — Always rebuildable. Disk grows linearly with session count. Best fit for the documented phase-2 direction (NDJSON as durable store).'
        - key: option-b
          label: 'B: Prune after N days (default 30) — Bounded disk growth; reindex window limited to the retention period.'
        - key: option-c
          label: 'C: Prune on session end if checkpoint = EOF — Smallest disk footprint, but reindex requires re-emitting OTLP from somewhere.'
      answer: null
critique:
    reviewed_at: "2026-04-26"
    reviewers:
        - Haiku (design review)
        - Sonnet (feasibility review)
    assumptions:
        - id: A1
          status: verified
          text: Indexer code at internal/otel/indexer exists and has zero production callers
          evidence: internal/otel/indexer/indexer.go:1-72; no caller in cmd/htmlgraph/
        - id: A2
          status: falsified
          text: Plan claimed slice-4 needs to widen WriterCloser.WriteBatch to accept a slice
          evidence: internal/otel/sink/sqlite/sqlite.go:19-22 — WriteBatch already accepts []otel.UnifiedSignal. Real fix is in indexer.go:223-235 writeParsedBatch loop
        - id: A3
          status: verified
          text: gracefulShutdown at otel_collect.go:168 has 3s deadline and no indexer drain
          evidence: cmd/htmlgraph/otel_collect.go:168-173
        - id: A4
          status: falsified
          text: Plan framed registry.go:216 as bypassing busy_timeout
          evidence: internal/registry/registry.go:215-220 — OpenReadOnly already sets _busy_timeout=5000 in DSN. Real gap is missing WAL pragma
        - id: A5
          status: verified
          text: Hooks have sessionID and projectDir in scope at the otel_signals INSERT call sites
          evidence: internal/hooks/transcript_user_prompt.go:191 (event payload) and ResolveProjectDir; transcript_assistant.go:297-312
        - id: A6
          status: questionable
          text: Plan listed internal/otel/sink/ndjson/standalone.go as a file to modify in slice-3
          evidence: File does not exist; ndjson.New(projectDir, sessionID) in ndjson.go is already standalone-usable
        - id: A7
          status: verified
          text: internal/otel/indexer/indexer_test.go imports the deleted internal/otel/receiver package; build fails
          evidence: indexer_test.go:13 + go build ./internal/otel/indexer/... reports `setup failed`
    critics:
        - title: DESIGN CRITIC
          sections:
            - heading: Slice Assessment
              items:
                - badge: S1
                  kind: success
                  text: Architecturally correct mounting of the indexer; deps blank but should reference slice-8 prereq
                - badge: S3
                  kind: warn
                  text: Originally under-scoped on hook-discovery mechanism; clarified by feasibility critic — sessionID and projectDir already in scope
                - badge: S4
                  kind: warn
                  text: Plan misstated need to widen WriteBatch interface; real work is per-tick accumulation in writeParsedBatch
            - heading: Gaps & Missing Considerations
              items:
                - badge: Gap
                  kind: warn
                  text: Plan does not define when a session is marked 'ended' — affects q-ndjson-retention semantics
                - badge: Gap
                  kind: warn
                  text: Plan does not validate the 10s gracefulShutdown drain budget under load
            - heading: Alternative Approaches
              items:
                - badge: Alt
                  kind: info
                  text: 'Hybrid: hooks write to in-process queue drained by collector — between option-a and option-b of q-write-coordination, avoids file lock contention without HTTP cost'
                - badge: Alt
                  kind: info
                  text: 'Async drain on SIGTERM: flush pending signals to a side file rather than waiting on indexer; replay on next collector launch'
        - title: FEASIBILITY CRITIC
          sections:
            - heading: What Exists to Leverage
              items:
                - badge: Reuse
                  kind: success
                  text: buildOtelCollectTestBinary + mkOtelCollectProject in cmd/htmlgraph/otel_collect_test.go — integration tests for slices 1, 2, 7 should call directly
                - badge: Reuse
                  kind: success
                  text: writeNDJSONFixture + setupIndexerDB in internal/otel/indexer/indexer_test.go — slice 4 bench/unit tests should reuse
                - badge: Reuse
                  kind: success
                  text: WithDB pattern at indexer.go:54 — already supports DB injection (q-db-handle-injection option-b)
            - heading: What the Plan Gets Wrong
              items:
                - badge: Wrong
                  kind: danger
                  text: Slice 3 cites internal/otel/sink/ndjson/standalone.go which does not exist; ndjson.New is already standalone-usable
                - badge: Wrong
                  kind: danger
                  text: Slice 4 says 'widen WriteBatch to accept a slice' — already accepts a slice; only writeParsedBatch needs accumulation
                - badge: Wrong
                  kind: danger
                  text: Slice 5 framing of registry.go bypassing busy_timeout — busy_timeout is set; real gap is WAL mode
            - heading: Hidden Work
              items:
                - badge: Hidden
                  kind: warn
                  text: 'Slice 3: hook code currently writes raw INSERT columns; full UnifiedSignal struct mapping must be worked out'
                - badge: Hidden
                  kind: warn
                  text: 'Slice 1: otel_collect.go must compute filepath.Join(projectDir, ''.htmlgraph'') — indexer expects the .htmlgraph/ subdir, not the project root'
                - badge: Hidden
                  kind: warn
                  text: errgroup not in go.mod requires — use sync.WaitGroup or run go get golang.org/x/sync first
            - heading: Prior Art
              items:
                - badge: Prior
                  kind: info
                  text: syscall.Flock pattern at ndjson.go:63-66 — slice 3 hooks reuse via ndjson.New, no new mechanism needed
                - badge: Prior
                  kind: info
                  text: db.Open at internal/db/schema.go:16 — single canonical write-handle helper applying busy_timeout + WAL
    risks:
        - risk: Stale internal/otel/receiver import in indexer_test.go blocks slice 4 entirely until resolved
          severity: High
          mitigation: Slice 8 (added) addresses this as a hard prereq before any indexer-touching work
        - risk: Slice 3 hook NDJSON path — flock contention under 1k concurrent invocations could exceed hook latency budget
          severity: Medium
          mitigation: BenchmarkTranscriptHook_NDJSONvsSQLite gates the slice; if regression > 5%, revisit q-write-coordination option-b
        - risk: Slice 4 partial-batch rollback requires explicit txn handling in SQLite sink WriteBatch — current behavior unverified
          severity: Medium
          mitigation: Read sink/sqlite/sqlite.go WriteBatch first; if it does not wrap in BEGIN/COMMIT, expand slice 4 scope
        - risk: 10s gracefulShutdown drain budget unvalidated under high-throughput load (10k signals)
          severity: Medium
          mitigation: Slice 2 done_when now requires TestOtelCollect_GracefulShutdown_Under10kSignals load test
        - risk: 1.5-tick (750ms) sleep in slice 7 smoke test may flake on slow CI runners
          severity: Low
          mitigation: Use poll-with-timeout (10x100ms) instead of fixed sleep
    synthesis: |
        Plan is architecturally sound but had four factual errors and missed a hard build-break precondition. Revisions: (1) added slice-8 to fix the indexer test build break, (2) corrected slice-4 scope (no interface widening), (3) corrected slice-5 framing (WAL gap not busy_timeout gap), (4) removed non-existent file from slice-3 and added UnifiedSignal mapping note, (5) switched slices 1+2 from errgroup to sync.WaitGroup, (6) added load-test requirement to slice-2 and polling to slice-7. After these fixes the plan is ready for human review.
