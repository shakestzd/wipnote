        - Single-encoded JSON in `agent_events.tool_input` is correctly unmarshaled and re-encoded (round-trip preserves all non-path keys)
      effort: L
      risk: High
      tests: |
        Unit (`cmd/wipnote/migrate_normalize_test.go`):
