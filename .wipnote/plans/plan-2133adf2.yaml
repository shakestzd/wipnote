    - id: slice-7
      num: 7
      title: Worktree round-trip regression gate
      what: |
        Add an end-to-end integration test in
        `internal/integration/worktree_lineage_test.go` that proves the
        definition of done by simulating the worktree flow without the
        harness (which is not callable from `go test`):

          1. Create a temp `.wipnote/` and SQLite DB.
          2. Call `worktree.EnsureForFeature` directly to create a worktree
             at `<tmpRepo>/.claude/worktrees/feat-test-N/`.
          3. Fire synthetic hook events through the hook handler functions:
             - `WorktreeCreate` with the worktree path
             - `SessionStart` with CWD = worktree path
             - `PreToolUse` and `PostToolUse` with `tool_input` containing
               a worktree-absolute `file_path`
             - `WorktreeRemove`
          4. Remove the worktree (`git worktree remove`).
          5. From the temp repo root, run `wipnote lineage feat-test-N`,
             `wipnote trace feat-test-N`, `wipnote feature show feat-test-N`
             via direct CLI invocation against the test DB.
          6. Assert: every printed file path is repo-relative; no
             `/workspaces/.../worktrees/...` substring appears in any output.

        Tagged `//go:build integration` if needed. Use `t.Cleanup` for
        worktree removal. Add a `TestMain` that scans for stale worktrees
        from prior crashed runs at startup and cleans them up (handles the
        SIGKILL case where `t.Cleanup` doesn't run).
      why: |
        Without a regression gate, future refactors can silently re-introduce
        host-locked paths in new capture surfaces. This test is the lock on
        the value prop: a passing test means causal lineage survives
        worktrees by construction. Addresses goal #3 directly and serves as
        the def-of-done.
      files:
        - internal/integration/worktree_lineage_test.go
        - internal/integration/fixtures/worktree_setup.go
        - internal/integration/main_test.go
      deps:
        - 2
        - 3
        - 4
        - 5
      done_when:
        - Test passes locally and in CI
        - Test fails (with a clear diff) if any of slices 2-5's normalization is reverted in code
        - Test runtime <10s on the dev container
        - Test cleans up its temp worktree and `.wipnote/` on Pass/Fail (via t.Cleanup) and on prior-crash startup (via TestMain stale-worktree scan)
      effort: M
      risk: Low
