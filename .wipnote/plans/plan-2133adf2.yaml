meta:
    id: plan-2133adf2
    track_id: trk-08dcbb33
    title: Path Normalization for Worktree-Resilient Lineage
    description: |
        Normalize every path stored by wipnote (HTML, SQLite, session captures, agent provenance) against the canonical repo root so causal lineage survives worktrees, host changes, and CWD switches. Closes defensibility-audit finding #1.
    created_at: "2026-05-11"
    status: finalized
    created_by: claude-opus
    version: 14
design:
    problem: |
        wipnote's causal lineage is host-locked. Hooks, the indexer, and provenance capture record paths as the agent observed them — often absolute (`/workspaces/wipnote/foo.go`, `/tmp/worktree-abc/foo.go`) or worktree- relative. When the same repo is queried from a different working directory (worktree orchestrators like our own `Agent({isolation: "worktree"})` or Conductor; same repo on a different host like Codespace → local) the lineage chain breaks: file references don't resolve, blame queries miss commits, and `wipnote lineage <id>` returns partial chains.
        Existing partial mitigation: the `check-host-paths` precommit gate (`cmd/wipnote/check_host_paths.go:23-28`) rejects absolute host paths in `--description`/`--body` at creation time. That gate does nothing for runtime capture by hooks/indexer/session ingest, which is where the overwhelming majority of paths enter the store.
        Researcher mapped 7 runtime capture surfaces plus one omitted by the initial pass (`sessions.project_dir`, surfaced by the implementation critique):
          1. PreToolUse — `agent_events.tool_input` (JSON object stored as a
             JSON-encoded string; SINGLE-encoded, not double — corrected from
             initial design)
          2. PostToolUse — `feature_files.file_path` (verbatim absolute)
          3. SessionStart/End — `sessions.transcript_path` (out-of-scope: Claude's
             private store)
          4. SessionStart — `<article data-project-dir="...">` in session HTML +
             `sessions.project_dir` SQLite column
          5. WorktreeCreate/Remove — `agent_events.input_summary` free-text +
             `AdditionalContext` agent-facing message
          6. SubagentStart — `pending_subagent_starts.cwd`
          7. CLI `--files` flag — verbatim into HTML `affected_files`

        Existing partial helper: `internal/migrate/tracks.go:281 normalizePath` (read-time, anchor-based, wipnote-specific). The right extension point is `internal/paths/resolve.go` which already has `ResolveViaGitCommonDir` for worktree → main repo. 178 existing `.wipnote/*.html` files contain absolute paths and need a one-shot migration.
    goals:
        - '**Write-time normalization** — every path captured by a hook, indexer, or CLI write is stored repo-relative against the canonical repo root resolved via `git rev-parse --git-common-dir` with walk-up fallback.'
        - '**Single normalizer with cache** — one helper in `internal/paths/` used by every writer, with a process-scoped cache so `git rev-parse` is invoked at most once per unique CWD per process lifetime.'
        - '**Worktree round-trip** — a feature implemented in a wipnote-managed worktree, after the worktree is removed, returns full lineage with all referenced files resolvable from the main repo root.'
        - '**Migration completeness** — all 178 pre-existing `.wipnote/*.html` records plus the relevant SQLite columns are rewritten idempotently with collision detection; re-running the migration is a no-op.'
        - '**No new false negatives** — `transcript_path` (Claude''s private store) is explicitly out-of-scope and remains absolute; the `--allow-host-paths` escape hatch on creation flows still works; foreign-machine ingested sessions preserve their original paths.'
        - '**Safe by default** — migration aborts on a dirty `.wipnote/` working tree, takes a timestamped backup, supports `--dry-run`, and has a paired `wipnote migrate restore-paths` companion for rollback.'
    constraints:
        - Reuse the regex from `cmd/wipnote/check_host_paths.go:23-28` as the single source of truth for what counts as a host path.
        - 'Worktrees: use `git rev-parse --git-common-dir` (or extend `ResolveViaGitCommonDir`), not `--show-toplevel` (which returns the worktree dir, not the canonical root). When `git rev-parse` returns `.git` (the main worktree case), fall back to walk-up resolution.'
        - '`transcript_path` is out-of-scope — it points to `~/.claude/projects/<encoded>/<uuid>.jsonl` which is intentionally machine-local. Leave absolute.'
        - 'Backwards compatibility on read: lineage and blame queries must continue to resolve records written before this plan. Query callers normalize their *inputs* at lookup time as well, so the SQLite store can contain a mix of absolute (legacy) and relative (post-migration) paths without surface breakage.'
        - All stored relative paths use forward-slash separators (`filepath.ToSlash`) regardless of host OS, so cross-platform queries match.
        - Symlinks in `repoRoot` and `absPath` are resolved via `filepath.EvalSymlinks` before relativization, matching the existing pattern in `internal/dbpath`.
        - 'One policy for outside-repo paths, defined in slice-1 and inherited by every writer: paths outside the repo are stored with an `unresolved:` prefix (not verbatim, not dropped). Rendering layers strip the prefix for display and never construct a filesystem path from the suffix.'
    approved: false
    comment: ""
slices:
    - id: slice-1
      feature_id: feat-edbc978b
      num: 1
      title: Canonical write-time path normalizer in internal/paths
      what: |
        Add `NormalizeToRepoRelative(absPath, repoRoot string) (relPath string, ok bool)`
        to `internal/paths/resolve.go`. It:
          1. If `absPath` is already relative, return `(absPath, true)`
             unchanged.
          2. If `repoRoot == ""`, resolve canonically:
             a. Try `ResolveViaGitCommonDir(filepath.Dir(absPath))`.
             b. If that returns `.git` (main worktree case) or empty, walk up
                from `filepath.Dir(absPath)` looking for the nearest
                `.wipnote/` directory.
             c. If both fail and `absPath` matches `HostPathPattern`, return
                `("unresolved:" + absPath, true)`. Otherwise return
                `(absPath, true)` (treat as already-relative-but-exotic).
          3. Apply `filepath.EvalSymlinks` to both `repoRoot` and `absPath`
             before relativization.
          4. Compute `filepath.Rel(canonicalRoot, evaledAbsPath)`; if the
             result starts with `..`, return `("unresolved:" + absPath, true)`.
          5. Convert the relative path to forward slashes via
             `filepath.ToSlash` and return `(rel, true)`.

        Add a process-scoped cache (`sync.Map` keyed by `filepath.Dir(absPath)`)
        so `git rev-parse` is invoked at most once per unique directory per
        process lifetime — critical because slice-2 wires this into hot-path
        hooks (PreToolUse/PostToolUse fire on every tool call).

        Promote the `hostPathPattern` regex out of `cmd/wipnote/` into
        `internal/paths/hostpattern.go` so both the precommit gate and the
        runtime normalizer reference the same definition.

        Add a sibling `MustNormalize(absPath, repoRoot string) string` that
        returns the normalized path on success or the original `absPath` on
        failure, logging at debug level. Use this in hot paths where the hook
        shouldn't fail on a normalization edge case.
      why: |
        Single source of truth for normalization (constraint #1). All subsequent
        slices wire this in at one call site each. Without a shared helper,
        each writer will drift its own logic and the foreign-machine / outside-
        repo / symlink / Windows-separator edge cases will be re-handled (and
        mis-handled) per call site.
      files:
        - internal/paths/resolve.go
        - internal/paths/resolve_test.go
        - internal/paths/hostpattern.go
        - internal/paths/cache.go
        - cmd/wipnote/check_host_paths.go
      deps: []
      done_when:
        - '`NormalizeToRepoRelative("/workspaces/wipnote/foo.go", "/workspaces/wipnote")` returns `("foo.go", true)`'
        - From inside `<repo>/.claude/worktrees/feat-x/`, `NormalizeToRepoRelative("/workspaces/wipnote/.claude/worktrees/feat-x/internal/foo.go", "")` resolves the canonical root via git-common-dir and returns `("internal/foo.go", true)`
        - When `git rev-parse --git-common-dir` returns `.git` (main worktree, no linked worktree), walk-up to `.wipnote/` resolves the root and normalization succeeds
        - '`NormalizeToRepoRelative("/Users/alice/other-repo/foo.go", "/workspaces/wipnote")` returns `("unresolved:/Users/alice/other-repo/foo.go", true)`'
        - On a symlinked repo (`/workspaces/wipnote` → `/private/var/.../wipnote`), normalization correctly produces forward-slash relative paths
        - Repeated calls with the same `filepath.Dir(absPath)` invoke `git rev-parse` at most once (verified via a fake `git` exec counter in tests)
        - '`HostPathPattern` regex is defined in one place; `cmd/wipnote/check_host_paths.go` imports it from `internal/paths/` (no duplication)'
        - '`go vet ./...` and `go test ./internal/paths/...` pass'
      effort: M
      risk: Med
      tests: |
        Unit (`internal/paths/resolve_test.go`):
          TestNormalize_AbsoluteInsideRepo
          TestNormalize_WorktreePath — canonical-root via git-common-dir
          TestNormalize_MainWorktreeFallback — git returns ".git", walk-up resolves to .wipnote/
          TestNormalize_AlreadyRelative
          TestNormalize_OutsideRepoUnresolvedPrefix — input `/Users/alice/other/foo.go`, expect `("unresolved:/Users/alice/other/foo.go", true)`
          TestNormalize_Symlinks — repo at /var/foo symlinked to /private/var/foo, both forms normalize identically
          TestNormalize_WindowsSeparators — relative result always uses forward slashes (run via filepath.ToSlash on the result)
          TestNormalize_CacheHit — fake git exec, assert ≤1 call across 10 normalizations of the same dir
        Unit (`cmd/wipnote/check_host_paths_test.go`): existing tests pass after the regex moves to internal/paths/.
        Regression: `go test ./...` green.
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-canonical-root-source
          text: When `repoRoot` is empty, resolution order is git-common-dir → walk-up → unresolved-prefix. Confirm?
          description: |
            Proposed (per implementation critique): hybrid resolution.
            (1) `ResolveViaGitCommonDir(dir)` first — handles linked worktrees.
            (2) If that returns `.git` or empty, walk up looking for `.wipnote/`.
            (3) If both fail, return the path with an `unresolved:` prefix.
            The risk critique flagged that leaving this open was a defect; the
            proposed order is now baked into the `what` field above. This
            question exists to confirm the resolution order is correct, not to
            choose between (a)/(b)/(c) as originally posed.
      critic_revisions:
        - source: impl-critique
          severity: HIGH
          summary: ResolveViaGitCommonDir shells out to git per call. PreToolUse fires 50–200x per session — uncached, that is 50–200 forks per session. Plan now includes a process-scoped sync.Map cache keyed by filepath.Dir(absPath).
        - source: impl-critique
          severity: HIGH
          summary: Slice-2 needs foreign-machine guard to function correctly. Originally lived in slice-4. Moved here so slice-2 can depend only on slice-1 and inherit the contract consistently.
        - source: risk-critique
          severity: HIGH
          summary: 'Outside-repo path encoding was inconsistent between slice-2 (verbatim) and slice-5 (unresolved: prefix). Plan now defines a single policy here: always `unresolved:` prefix. Constraint #7 added.'
        - source: risk-critique
          severity: MED
          summary: filepath.Rel returns OS-native separators (\ on Windows). All callers run filepath.ToSlash on the result so cross-platform queries match. Now in step 5 of the helper.
        - source: risk-critique
          severity: MED
          summary: Symlinks in repoRoot (e.g. /workspaces → /private/var on macOS) cause filepath.Rel to return ../ paths. Helper now applies filepath.EvalSymlinks before relativization, matching the pattern in internal/dbpath.
        - source: risk-critique
          severity: MED
          summary: git rev-parse --git-common-dir returns `.git` in the main worktree, causing fall-through to empty. Fallback to walk-up search for `.wipnote/` now explicit. q-canonical-root-source reframed as confirmation rather than open.
    - id: slice-2
      feature_id: feat-b6a9f2d4
      num: 2
      title: Normalize tool_input file paths in PreToolUse/PostToolUse
      what: |
        Wire `paths.NormalizeToRepoRelative` into the two hot-path hooks:

        `internal/hooks/pretooluse.go:217-220` — `event.ToolInput` arrives as
        `map[string]any` and is SINGLE-encoded via `json.Marshal` before
        storage in `agent_events.tool_input`. Before encoding, walk the map
        with a new helper `paths.NormalizeToolInputPaths(toolInput map[string]any, repoRoot string) map[string]any`
        that normalizes the known path keys (`file_path`, `path`,
        `notebook_path`) and leaves unknown keys untouched. Returns a new map
        (no caller-mutation).

        Correction from initial design: the column is NOT doubly-encoded. The
        stored value is a normal JSON object string. The normalizer needs a
        single `json.Marshal`/`Unmarshal` cycle, not two.

        `internal/hooks/posttooluse.go:123-131` — replace the raw
        `extractFilePath(event.ToolInput)` write with
        `paths.MustNormalize(extractFilePath(...), repoRoot)` so
        `feature_files.file_path` stores repo-relative.

        The `repoRoot` for both call sites comes from
        `resolveProjectDir(event.CWD)` (already called in the hook flow).
        Pass it through; do not re-resolve.
      why: |
        These two hooks are the highest-volume path captures in the system.
        Every Write/Edit/Read/MultiEdit goes through them. Without
        normalization here, lineage chains are broken for every active feature.
        Addresses goals #1 (write-time normalization) and #3 (worktree
        round-trip).
      files:
        - internal/hooks/pretooluse.go
        - internal/hooks/posttooluse.go
        - internal/hooks/quality_gate.go
        - internal/paths/toolinput.go
        - internal/paths/toolinput_test.go
        - internal/hooks/pretooluse_test.go
        - internal/hooks/posttooluse_test.go
      deps:
        - 1
      done_when:
        - Synthetic PreToolUse event with `tool_input={"file_path":"/workspaces/wipnote/.claude/worktrees/feat-x/internal/foo.go"}` fired from within the worktree results in SQLite `agent_events.tool_input` JSON containing `"file_path":"internal/foo.go"`
        - Synthetic PostToolUse for the same input results in `feature_files.file_path = "internal/foo.go"`
        - Tool inputs whose paths are outside the repo are stored with `unresolved:` prefix (per the slice-1 contract)
        - Non-path keys in tool_input (e.g. `command`, `pattern`) are unchanged
        - Existing PreToolUse/PostToolUse tests pass; new tests added per the tests block
      effort: M
      risk: Med
      tests: |
        Unit (`internal/paths/toolinput_test.go`):
          TestNormalizeToolInputPaths_Write — `{"file_path":"/workspaces/wipnote/.claude/worktrees/x/foo.go"}` → `{"file_path":"foo.go"}`
          TestNormalizeToolInputPaths_Edit — same with `path` key
          TestNormalizeToolInputPaths_PreservesUnknownKeys — `command`, `pattern` unchanged
          TestNormalizeToolInputPaths_OutsideRepoUnresolved — `/Users/alice/...` becomes `unresolved:/Users/alice/...`
          TestNormalizeToolInputPaths_SingleEncoded — confirms output is a plain JSON object string, not a JSON-encoded string (regression against the initial double-encoding misdiagnosis)
        Integration (`internal/hooks/pretooluse_test.go`):
          TestPreToolUse_NormalizesToolInputFromWorktree
        Integration (`internal/hooks/posttooluse_test.go`):
          TestPostToolUse_NormalizesFeatureFilesPath
        Regression: all existing `internal/hooks/...` tests must pass.
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-normalize-write-vs-read
          text: Normalize tool_input at write time (proposed), or store raw and normalize at every read?
          description: |
            Write-time (proposed): one normalization per event, simple reads,
            but historical data needs migration (slice-6). Mixed-state
            backward-compat requires query-time normalization of *inputs* too
            (constraint #4) but storage is uniform.
            Default proposed: write-time + query-input normalization.
      critic_revisions:
        - source: impl-critique
          severity: DANGER
          summary: 'Initial design claimed `tool_input` is doubly JSON-encoded. Verified false against `pretooluse.go:217-220`: it is single-encoded via one json.Marshal of a map[string]any. All double-unmarshal language removed from `what` and `tests`; a new regression test `TestNormalizeToolInputPaths_SingleEncoded` guards against the misdiagnosis recurring.'
        - source: impl-critique
          severity: HIGH
          summary: Slice was implicitly dependent on slice-4's CanonicalProjectDir helper for foreign-machine handling. Slice-1 now owns that contract directly; slice-2 inherits it via paths.NormalizeToRepoRelative.
    - id: slice-3
      feature_id: feat-ab99d13b
      num: 3
      title: Normalize WorktreePath in worktree events
      what: |
        `internal/hooks/missing_events.go:324-368` — the WorktreeCreate and
        WorktreeRemove handlers embed `event.WorktreePath` verbatim into
        `agent_events.input_summary` as free text. The WorktreeRemove handler
        also embeds it (and `projectRoot`) into the `AdditionalContext` string
        at line 368 that is injected into the conversation.

        Change: before formatting, run
        `paths.NormalizeToRepoRelative(event.WorktreePath, repoRoot)` and
        embed the relative form (e.g. `.claude/worktrees/feat-x`).
        `extractBranchFromWorktreePath` keeps working because
        `filepath.Base(".claude/worktrees/feat-x")` still returns `feat-x`.

        Apply the same normalization in BOTH the `input_summary` write AND
        the `AdditionalContext` agent-facing message, so the agent and the
        stored record see identical paths.
      why: |
        Worktree create/remove events are how the lineage chain knows a
        feature was implemented in an isolated tree. If the embedded path is
        absolute, post-hoc queries (`wipnote lineage feat-x`) from main repo
        print broken paths and can't link the recorded path back to the
        current repo. Addresses goal #3.
      files:
        - internal/hooks/missing_events.go
        - internal/hooks/missing_events_test.go
      deps:
        - 1
      done_when:
        - 'WorktreeCreate event with `WorktreePath=/workspaces/wipnote/.claude/worktrees/feat-x` is stored as `"Worktree created: .claude/worktrees/feat-x"` in `agent_events.input_summary`'
        - WorktreeRemove `AdditionalContext` (line 368) uses the relative path for both WorktreePath and projectRoot embeds
        - extractBranchFromWorktreePath still returns the correct branch after normalization
        - Existing missing_events tests pass; new tests cover both events from inside a worktree CWD and from main repo CWD, plus the AdditionalContext string assertion
      effort: S
      risk: Low
      tests: |
        Unit (`internal/hooks/missing_events_test.go`):
          TestWorktreeCreate_NormalizesPath — assert input_summary contains relative path
          TestWorktreeRemove_NormalizesContext — assert BOTH input_summary AND AdditionalContext string at line 368
          TestWorktreeRemove_ExtractBranchStillWorks — confirm extractBranchFromWorktreePath gives correct branch after normalization
          TestWorktreeCreate_PathOutsideRepo — exotic case (/tmp/...), expect `unresolved:` prefix per slice-1 policy
        Regression: existing missing_events tests pass.
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      critic_revisions:
        - source: impl-critique
          severity: MED
          summary: AdditionalContext embed at missing_events.go:368 was implied but not explicitly called out in the test block. Added explicit done_when criterion and a dedicated test (`TestWorktreeRemove_NormalizesContext`) for the agent-facing string.
    - id: slice-4
      feature_id: feat-3973e948
      num: 4
      title: Normalize SessionStart and SubagentStart CWD attribution
      what: |
        Three related call sites:

        `internal/hooks/session_html.go:88-89` — `data-project-dir` is set
        from `canonicalProjectDir` (resolved from `event.CWD`). Currently
        verbatim (see deliberate-verbatim comment at session_html.go:53-57).

        `internal/db/session_repo.go:16-23` + `session_start.go:351` —
        `sessions.project_dir` SQLite column, also absolute.

        `internal/hooks/subagent_start.go:80` — `pending_subagent_starts.cwd`,
        absolute.

        Change: all three call sites use `paths.NormalizeToRepoRelative` with
        the slice-1 outside-repo policy. Worktree CWDs collapse to the
        canonical root. Foreign-machine CWDs (where `git rev-parse` returns
        a different canonical root than the local `.wipnote/` repo) get the
        `unresolved:` prefix — this preserves the foreign-ingest invariant
        from the deliberate-verbatim comment while still making the foreign
        origin queryable.

        Rewrite the deliberate-verbatim comment in `session_html.go:53-57` to
        describe the new rule: "normalize to canonical root for local
        sessions; mark with `unresolved:` for sessions ingested from foreign
        machines (different canonical root)."
      why: |
        Session attribution is the entry point for the entire lineage chain.
        If a worktree session embeds the worktree path in `data-project-dir`,
        every downstream query shows a path that doesn't resolve from the
        main repo. The intentional-verbatim behavior for foreign ingest is
        preserved via the `unresolved:` policy. Addresses goal #3.
      files:
        - internal/hooks/session_html.go
        - internal/hooks/session_start.go
        - internal/hooks/subagent_start.go
        - internal/db/session_repo.go
        - internal/hooks/session_html_test.go
        - internal/hooks/subagent_start_test.go
      deps:
        - 1
      done_when:
        - SessionStart from `<repo>/.claude/worktrees/feat-x/` stores `data-project-dir` AND `sessions.project_dir` as the canonical repo root (relativized to `.` or basename)
        - SessionStart from a foreign-machine path stores both with the `unresolved:` prefix — foreign-ingest behavior preserved, queries still work
        - '`pending_subagent_starts.cwd` matches the same rule'
        - The deliberate-verbatim comment in session_html.go is updated to describe both cases
      effort: M
      risk: Med
      tests: |
        Integration (`internal/hooks/session_html_test.go`):
          TestSessionStart_FromWorktree_NormalizesProjectDir
          TestSessionStart_FromForeignPath_UnresolvedPrefix
          TestSessionStart_StoresBothSQLiteAndHTMLConsistently
        Integration (`internal/hooks/subagent_start_test.go`):
          TestSubagentStart_NormalizesCwd
        Regression: existing session HTML golden tests pass; foreign-ingest fixtures still match (foreign-origin sessions distinguishable by `unresolved:` prefix).
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      questions:
        - id: q-foreign-cwd-detection
          text: Detect foreign CWD via canonical-root mismatch — confirm?
          description: |
            Proposed: `ResolveViaGitCommonDir(cwd)` returns different root than
            the local `.wipnote/` repo's canonical root → foreign → apply
            `unresolved:` prefix. Cleanest invariant per the implementation
            critique.
      critic_revisions:
        - source: impl-critique
          severity: HIGH
          summary: Slice originally introduced CanonicalProjectDir helper, but that contract has been moved to slice-1 so slice-2 can use it too. Slice-4 now just consumes paths.NormalizeToRepoRelative and depends only on slice-1.
        - source: impl-critique
          severity: HIGH
          summary: Missed `sessions.project_dir` SQLite column at `internal/db/session_repo.go:16-23` (written at session_start.go:351). Added as a third call site. Files list updated. New done_when criterion for SQLite/HTML consistency.
    - id: slice-5
      feature_id: feat-4417b8df
      num: 5
      title: Normalize CLI --files input on workitem create
      what: |
        `cmd/wipnote/workitem_create.go:131` — `--files` is currently passed
        verbatim to `edit.SetProperty("affected_files", o.files)`.

        Change: split the comma-separated input, run each through
        `paths.NormalizeToRepoRelative`, rejoin. Outside-repo paths get the
        `unresolved:` prefix per the slice-1 contract (consistent with slice-2
        and slice-4).

        Update help text on the `--files` flag to note that paths are stored
        repo-relative.
      why: |
        `--files` is the user-facing surface for declaring affected paths.
        If a user runs `wipnote feature create --files /workspaces/wipnote/internal/foo.go`
        from a worktree, today it stores the absolute path; tomorrow from
        main repo it doesn't resolve. Small surface, easy fix, completes the
        "every writer normalizes" invariant from goal #2.
      files:
        - cmd/wipnote/workitem_create.go
        - cmd/wipnote/workitem_create_test.go
      deps:
        - 1
      done_when:
        - '`wipnote feature create --files /workspaces/wipnote/internal/foo.go` stores `affected_files: internal/foo.go`'
        - '`wipnote feature create --files internal/foo.go,internal/bar.go` is unchanged (already relative)'
        - '`wipnote feature create --files /tmp/scratch.txt` stores `affected_files: unresolved:/tmp/scratch.txt` AND prints a stderr note explaining the prefix'
        - Existing workitem create tests pass
      effort: S
      risk: Low
      tests: |
        Unit (`cmd/wipnote/workitem_create_test.go`):
          TestCreate_NormalizesAbsoluteFiles
          TestCreate_PreservesAlreadyRelative
          TestCreate_MarksOutsideRepoUnresolved — confirms identical policy to slice-2 (no drift)
        Regression: existing create tests pass.
      approved: false
      comment: ""
      approval_status: approved
      execution_status: promoted
      critic_revisions:
        - source: risk-critique
          severity: HIGH
          summary: Initial design had slice-5 using `unresolved:` prefix but slice-2 storing verbatim — inconsistent semantics for the same conceptual field (feature_files / affected_files). Slice-1 now owns a single policy; both slices inherit it identically.
    - id: slice-6
      num: 6
      title: Idempotent migration rewriter with collision detection and dirty-tree guard
      what: |
        New CLI subcommand `wipnote migrate normalize-paths` that walks
        `.wipnote/` and rewrites absolute paths to repo-relative in place.

        Safety preconditions (must pass before any write):
          a. Working tree clean — run `git -C <repoRoot> status --porcelain .wipnote/`;
             abort with a clear error if dirty. Use `--allow-dirty` to bypass
             (records audit reason).
          b. Collision check — for `feature_files` (which has
             `UNIQUE(feature_id, file_path)`), pre-scan: if two rows for the
             same feature would normalize to the same relative path, list
             them in the dry-run output. Default behavior is to MERGE (take
             earliest `first_seen`, sum sessions); `--no-merge-collisions`
             causes the migration to abort instead.

        Targets (7, corrected from initial 6):
          1. `agent_events.tool_input` — SINGLE-encoded JSON; unmarshal once,
             walk path keys, re-marshal. (Initial plan said doubly-encoded;
             that was wrong.)
          2. `feature_files.file_path` (SQLite TEXT) — with collision detection.
          3. `agent_events.input_summary` free-text — regex-replace WorktreePath embeds.
          4. `pending_subagent_starts.cwd`
          5. `sessions.project_dir` (SQLite) — newly added; missed in initial design.
          6. `<article data-project-dir>` in `.wipnote/sessions/*.html`
          7. `affected_files` properties in `.wipnote/{features,bugs,spikes}/*.html`

        Out-of-scope (documented explicitly):
          - `sessions.transcript_path` — Claude's private machine-local store.
          - `.wipnote/.active-session` — transient per-session JSON; rewritten
            on next SessionStart anyway.

        Idempotency: re-running on already-relative records is a no-op.
        Achieved by skipping any value that doesn't match `HostPathPattern`.

        Backup + dry-run + restore:
          - `--backup` (default on): copies touched HTML to `.wipnote/.backup-<timestamp>/`.
          - `--dry-run`: prints proposed changes and pending collisions; no writes.
          - Companion: `wipnote migrate restore-paths --from .wipnote/.backup-<timestamp>/`
            copies backups back into place.

        Print summary: N files rewritten, M values normalized, K skipped as
        already-relative, J marked unresolved, P collisions merged, A
        collisions aborted (if --no-merge-collisions).

        Rendering audit: confirm `wipnote feature show`, `wipnote blame`,
        `wipnote lineage`, and the dashboard template render relative paths
        correctly (resolve against current repo root for display, strip
        `unresolved:` prefix). Update each call site as needed.
      why: |
        Without migration, slices 1-5 fix the future but leave the existing
        178 records broken — `wipnote lineage` queries still hit absolute
        paths in older records. Addresses goal #4.

        Collision detection is critical because `feature_files` has a UNIQUE
        constraint; a naive `UPDATE` would silently merge rows and lose
        `first_seen` attribution.

        Dirty-tree guard prevents the migration from interleaving with
        in-progress edits. The `--backup` + `restore-paths` pair gives a
        complete rollback story.
      files:
        - cmd/wipnote/migrate_normalize.go
        - cmd/wipnote/migrate_restore.go
        - cmd/wipnote/migrate_normalize_test.go
        - internal/paths/walk_html.go
