           lineage.go only traverses graph_edges (see lineage.go:212-215) — query-time-derived
           edges are invisible to BFS. The provenance endpoint should use direct SQL JOINs for
           commit/file nodes rather than relying on BFS, OR depend on edges being materialized
           first (see q-edge-materialization). Reuse TraceCommit() and TraceFile() primitives
           from internal/db — these are existing attribution primitives.
           Response: { node: {...}, upstream: [{id, type, title, relationship}...], downstream: [...] }

        2. GET /api/graph/commits?feature=<id> — returns commits linked to a feature.
           Query: SELECT * FROM git_commits WHERE feature_id = ? ORDER BY timestamp DESC.

        3. GET /api/graph/files?feature=<id> — returns files touched by a feature.
           Query: SELECT * FROM feature_files WHERE feature_id = ? ORDER BY file_path.

        4. GET /api/graph/sessions?feature=<id> — already partially exists via
