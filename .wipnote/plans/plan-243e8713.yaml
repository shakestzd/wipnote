    critics:
        - title: DESIGN CRITIC
          sections:
            - heading: Slice Assessment
              items:
                - badge: S1
                  kind: warn
                  text: File->commit edge dropped (no FK). Commit dedup required (composite PK). File node cardinality needs cap.
