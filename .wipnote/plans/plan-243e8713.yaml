            - heading: What Exists to Leverage
              items:
                - badge: Reuse
                  kind: success
                  text: TraceCommit() and TraceFile() in internal/db — existing attribution primitives
                - badge: Reuse
                  kind: success
                  text: deduplicateEdges() at api_graph.go:493 — handles cross-source dedup for free
                - badge: Reuse
