                - badge: S7
                  kind: success
                  text: Filtering addresses the high-cardinality risk. Per-type caps and toggle UI are well-specified.
                - badge: S8
                  kind: success
                  text: Agent nodes complete the causal chain. ~10 hub nodes add minimal graph weight with high information value.
            - heading: Gaps & Missing Considerations
