    risks:
        - risk: File node cardinality explosion — 299 today, could reach 1000+
          severity: High
          mitigation: Implement per-type node count cap (e.g., 200 hottest files by modification count) — addressed by Slice 7
        - risk: Query-time derivation breaks lineage CLI and graph algorithms
          severity: High
          mitigation: Materialize edges on reindex. Add reindex step for commit/file/session edges.
        - risk: git_commits composite PK causes duplicate commit nodes
          severity: High
          mitigation: Use GROUP BY commit_hash in the query. Test with multi-session commits.
        - risk: D3 collision detection is O(n^2) — 2000 nodes = 4M distance checks per frame
          severity: Medium
          mitigation: Benchmark on 2000-node test graph. Enable d3-quadtree if >100ms per tick. Slice 7 caps reduce node count.
        - risk: Session filter relaxation could spike session nodes to 500+
          severity: Medium
          mitigation: Implement per-type node budgets — addressed by Slice 7 (sessions cap 300)
    synthesis: |
        The plan is fundamentally sound with three critical issues addressed in revision: (1) file->commit edges cannot be derived (no FK) — replaced with file->session edges, (2) edge materialization strategy must be materialize-on-reindex for CLI compatibility, (3) git_commits composite PK requires deduplication. Version 3 adds two new slices addressing gaps identified in critique: Slice 7 (filtering/caps) handles the high-cardinality risk, and Slice 8 (agent nodes) completes the causal chain with "who did the work" attribution. The remaining medium-severity risks (D3 performance, session threshold) are manageable with the per-type budgets in Slice 7.
